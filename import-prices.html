<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>価格インポート — BUDDICA TOURING</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;background:#f3f4f6;color:#1f2937;line-height:1.5}
.header{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:18pt;font-weight:700;display:flex;align-items:center;gap:10px}
.header .sub{font-size:9pt;opacity:.7;letter-spacing:.25em}
.header .actions{display:flex;gap:6px}
.act-btn{background:#fff;color:#1e3a8a;border:none;padding:6px 14px;border-radius:6px;font-size:10pt;font-weight:700;cursor:pointer}
.act-btn.warn{background:#fef3c7;color:#92400e}
.act-btn.danger{background:#fee2e2;color:#dc2626}
.act-btn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.1)}
.container{max-width:1500px;margin:0 auto;padding:14px}

/* ===== Year tabs ===== */
.year-tabs{display:flex;gap:4px;margin-bottom:6px}
.year-tab{background:#f1f5f9;color:#475569;padding:7px 16px;border:none;border-radius:8px;font-size:11pt;font-weight:700;cursor:pointer}
.year-tab.active{background:#1e3a8a;color:#fff}

/* ===== Month tabs ===== */
.month-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px}
.month-tab{background:#fff;border:1px solid #d1d5db;color:#475569;padding:6px 10px;border-radius:6px;font-size:10pt;font-weight:600;cursor:pointer;min-width:54px;text-align:center;line-height:1.3;display:flex;flex-direction:column;align-items:center;gap:1px}
.month-tab.active{background:#1e40af;color:#fff;border-color:#1e40af}
.month-tab.zero{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.month-tab.special{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.month-tab.active.special{background:#ea580c;color:#fff;border-color:#ea580c}
.month-tab .num{font-weight:800;font-size:11pt}
.month-tab .sub{font-size:7pt;opacity:.8;font-family:monospace;letter-spacing:.5px}

/* ===== Price matrix ===== */
.matrix-card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.07);margin-bottom:12px}
.matrix-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px;flex-wrap:wrap}
.matrix-head .ttl{font-size:11.5pt;font-weight:700;color:#1e3a8a;display:flex;align-items:center;gap:6px}
.matrix-head .tag{font-size:8.5pt;color:#6b7280;background:#f1f5f9;padding:2px 8px;border-radius:4px;font-weight:400}
.matrix-head .tag.special{background:#fef3c7;color:#92400e;font-weight:700}
.matrix-head .tag.reset{background:#fee2e2;color:#dc2626;font-weight:700}
.matrix-head .applyall{background:#dbeafe;color:#1e40af;border:none;padding:4px 10px;border-radius:4px;font-size:8.5pt;font-weight:600;cursor:pointer}
.matrix-table{width:100%;border-collapse:collapse}
.matrix-table th{padding:4px 6px;text-align:center;font-size:9pt;font-weight:700;border:1px solid #1d4ed8;background:#1e3a8a;color:#fff}
.matrix-table th.head{background:#374151;width:90px}
.matrix-table th.col-head{background:#1e3a8a}
.matrix-table th.col-head .typ{font-size:7.5pt;font-weight:400;opacity:.75}
.matrix-table th.col-head .cls{font-size:9.5pt;font-weight:800;background:rgba(255,255,255,.15);border-radius:3px;padding:1px 0;margin-top:1px;display:block}
.matrix-table td{border:1px solid #d1d5db;padding:2px;text-align:center}
.matrix-table tr.tier-a td:first-child{background:#fee2e2;color:#dc2626;font-weight:700}
.matrix-table tr.tier-b td:first-child{background:#dbeafe;color:#1e40af;font-weight:700}
.matrix-table tr.tier-c td:first-child{background:#f1f5f9;color:#64748b;font-weight:700}
.matrix-table tr.tier-a td{background:#fffbeb30}
.matrix-table tr.tier-b td{background:#eff6ff30}
.matrix-table tr.tier-c td{background:#f8fafc30}
/* ===== Cell layout: 入力 + 💾 + 原案 ===== */
.matrix-table td{padding:4px;vertical-align:top}
.cell-wrap{display:flex;flex-direction:column;gap:3px;align-items:stretch}
.cell-input-row{display:flex;gap:3px;align-items:center}
.matrix-table input{flex:1;min-width:0;padding:7px 6px;border:1.5px solid #d1d5db;border-radius:4px;text-align:right;font-family:"Menlo",monospace;font-size:11pt;background:#fff;font-weight:600}
.matrix-table input.special{background:#fef3c7;color:#92400e;font-weight:800;border-color:#fbbf24}
.matrix-table input.zero{background:#fee2e2;color:#dc2626}
.matrix-table input.dirty{background:#fef9c3;color:#854d0e;border:2.5px solid #fbbf24;font-weight:900;box-shadow:0 0 0 2px rgba(251,191,36,.15)}
.matrix-table input.saved{background:#dcfce7;color:#15803d;border:2.5px solid #22c55e;font-weight:800}
.cell-save-btn{background:#16a34a;color:#fff;border:none;width:30px;height:30px;border-radius:5px;font-size:13pt;cursor:pointer;display:none;flex-shrink:0;line-height:1;padding:0;box-shadow:0 1px 3px rgba(22,163,74,.4)}
.cell-save-btn:hover{background:#15803d;transform:scale(1.1)}
.cell-save-btn.show{display:inline-flex;align-items:center;justify-content:center;animation:pulseSave .5s 1}
@keyframes pulseSave{0%{transform:scale(.4)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.cell-info{display:flex;justify-content:space-between;align-items:center;gap:3px;font-size:8pt;font-family:"Menlo",monospace;color:#9ca3af;min-height:14px}
.cell-info .orig-label{font-weight:400}
.cell-info .orig-val{font-weight:700;color:#6b7280}
.cell-info.diff .orig-val{color:#dc2626}
.cell-info .reset-btn{background:none;color:#6b7280;border:none;padding:0 4px;font-size:9pt;cursor:pointer;font-family:inherit;line-height:1;display:none;border-radius:3px}
.cell-info.diff .reset-btn{display:inline;color:#dc2626;font-weight:700}
.cell-info .reset-btn:hover{background:#fee2e2}

/* ===== Version history chips ===== */
.history-bar{background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:10px 12px;margin-bottom:10px}
.history-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.history-title{font-size:11pt;font-weight:700;color:#1e3a8a;display:flex;align-items:center;gap:6px}
.history-counter{background:#dbeafe;color:#1e40af;padding:2px 8px;border-radius:10px;font-size:9pt;font-weight:700}
.history-chips{display:flex;gap:6px;flex-wrap:wrap;align-items:stretch}
.ver-chip{background:#fff;border:2px solid #e5e7eb;border-radius:8px;padding:8px 12px;cursor:pointer;min-width:130px;text-align:left;font-family:inherit;transition:all .15s;position:relative}
.ver-chip:hover{border-color:#1e40af;background:#eff6ff;transform:translateY(-1px)}
.ver-chip.active{border-color:#16a34a;background:#dcfce7}
.ver-chip.active::after{content:'◎採用中';position:absolute;top:-8px;right:-2px;background:#16a34a;color:#fff;font-size:8pt;padding:1px 6px;border-radius:4px;font-weight:700;letter-spacing:.05em}
.ver-chip.draft{border-color:#f59e0b;background:#fef3c7;border-style:dashed}
.ver-chip.draft::after{content:'編集中*';position:absolute;top:-8px;right:-2px;background:#f59e0b;color:#fff;font-size:8pt;padding:1px 6px;border-radius:4px;font-weight:700}
.ver-chip .ver-num{font-size:11pt;font-weight:800;color:#1e40af;display:block}
.ver-chip .ver-label{font-size:9.5pt;color:#374151;display:block;font-weight:600;margin-top:2px}
.ver-chip .ver-date{font-size:7.5pt;color:#9ca3af;display:block;margin-top:2px;font-family:"Menlo",monospace}
.ver-chip .ver-del{position:absolute;top:2px;right:2px;background:#fee2e2;color:#dc2626;border:none;width:18px;height:18px;border-radius:50%;font-size:9pt;cursor:pointer;display:none;line-height:1;padding:0}
.ver-chip:hover .ver-del{display:inline-flex;align-items:center;justify-content:center}
.ver-chip.protected .ver-del{display:none !important}

.btn-add-ver{background:#1e40af;color:#fff;border:none;padding:8px 14px;border-radius:6px;font-size:9.5pt;font-weight:700;cursor:pointer;border:2px dashed #93c5fd;background:#eff6ff;color:#1e40af}
.btn-add-ver:hover:not(:disabled){background:#dbeafe;border-color:#1e40af}
.btn-add-ver:disabled{opacity:.4;cursor:not-allowed}

/* ===== Action row (下部) ===== */
.month-actions{background:#fff;border:2px solid #dbeafe;border-radius:10px;padding:14px;margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
.month-actions .info{font-size:10pt;color:#475569;flex:1;min-width:160px}
.month-actions .info b{color:#1e3a8a}
.month-actions .btns{display:flex;gap:8px;flex-wrap:wrap}
.btn-apply{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;padding:10px 20px;border-radius:6px;font-size:11pt;font-weight:800;cursor:pointer;box-shadow:0 2px 4px rgba(22,163,74,.3)}
.btn-apply:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(22,163,74,.4)}
.btn-apply:disabled{background:#d1d5db;cursor:not-allowed;box-shadow:none}
.btn-snapshot{background:#fff;color:#1e40af;border:2px solid #1e40af;padding:8px 16px;border-radius:6px;font-size:10.5pt;font-weight:700;cursor:pointer}
.btn-snapshot:hover:not(:disabled){background:#eff6ff}
.btn-snapshot:disabled{opacity:.4;cursor:not-allowed;border-color:#d1d5db;color:#9ca3af}

/* Dirty indicator on month tab */
.month-tab.dirty{box-shadow:0 0 0 2px #f59e0b}
.month-tab.dirty::after{content:'●';color:#f59e0b;font-size:10pt;margin-left:2px;line-height:1}
.month-tab.active.dirty{box-shadow:0 0 0 2px #fbbf24}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#16a34a;color:#fff;padding:10px 22px;border-radius:8px;font-weight:700;font-size:11pt;box-shadow:0 4px 12px rgba(22,163,74,.4);opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.warn{background:#f59e0b}
.toast.error{background:#dc2626}

/* ===== Footer actions ===== */
.footer-actions{background:#fff;border-radius:12px;padding:14px;box-shadow:0 -2px 12px rgba(0,0,0,.08);margin-top:14px;position:sticky;bottom:8px;border:2px solid #dbeafe;display:flex;flex-direction:column;gap:8px}
.btn-import{background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;border:none;padding:14px;border-radius:10px;font-size:13pt;font-weight:800;cursor:pointer;letter-spacing:.05em}
.btn-import:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.4)}
#log{font-family:"Menlo",monospace;font-size:9.5pt;background:#0f172a;color:#e2e8f0;border-radius:8px;padding:10px;max-height:200px;overflow-y:auto;display:none;line-height:1.6}
.success{color:#10b981;font-weight:700}
.warning{color:#fbbf24}
.error{color:#f87171}

/* ===== Notice ===== */
.notice{background:#fef3c7;border-left:4px solid #f59e0b;padding:8px 12px;font-size:10.5pt;color:#92400e;border-radius:6px;line-height:1.6;margin-bottom:10px}

/* ===== Segment tabs ===== */
.seg-tabs{display:flex;gap:4px;margin-bottom:10px}
.seg-tab{background:#f1f5f9;color:#475569;padding:8px 20px;border:none;border-radius:8px;font-size:11pt;font-weight:700;cursor:pointer;transition:all .15s}
.seg-tab.active{background:#1e3a8a;color:#fff;box-shadow:0 2px 6px rgba(30,58,138,.3)}
.seg-tab.cp{border:2px solid #e9d5ff}
.seg-tab.cp.active{background:#7c3aed;border-color:#7c3aed;box-shadow:0 2px 6px rgba(124,58,237,.3)}
.seg-label{display:inline-block;font-size:8pt;background:rgba(255,255,255,.25);border-radius:4px;padding:1px 6px;margin-left:4px;vertical-align:middle}

/* ===== Calendar ===== */
.cal-section{background:#fff;border-radius:10px;box-shadow:0 2px 6px rgba(0,0,0,.07);margin-bottom:12px;overflow:hidden}
.cal-head{background:#0f172a;color:#fff;padding:10px 14px;font-size:11pt;font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.cal-head .sub{font-size:9pt;opacity:.6}
.cal-stats{font-size:9.5pt;background:rgba(255,255,255,.1);padding:3px 10px;border-radius:6px;font-family:monospace;letter-spacing:.3px}
table.cal-tbl{border-collapse:collapse;width:100%;font-size:9pt}
table.cal-tbl th{background:#1e293b;color:#fff;padding:5px 4px;text-align:center;border:1px solid #334155;font-size:9pt}
table.cal-tbl .sun{color:#fca5a5}
table.cal-tbl .sat{color:#93c5fd}
.cal-empty{background:#f8fafc;border:1px solid #e2e8f0}
.cal-day{border:1px solid #e2e8f0;padding:4px;vertical-align:top;min-width:60px}
.cal-day.tier-A{background:#fff1f2}
.cal-day.tier-B{background:#eff6ff}
.cal-day.tier-C{background:#f8fafc}
.cal-day.tier-X{background:#fff7ed}
.cal-day.holiday{opacity:.85}
.cal-num{font-size:9.5pt;font-weight:700;display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.cal-num .dn{color:#1e293b}
.cal-num .dn.sun{color:#dc2626}
.cal-num .dn.sat{color:#2563eb}
.cal-num .dn.hol{color:#dc2626}
.tier-badge{font-size:8pt;font-weight:800;padding:1px 5px;border-radius:3px}
.tb-A{background:#dc2626;color:#fff}
.tb-B{background:#1e40af;color:#fff}
.tb-C{background:#64748b;color:#fff}
.cal-ev{font-size:7.5pt;color:#92400e;background:#fef3c7;border-radius:2px;padding:1px 3px;margin-bottom:3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.cal-prices{display:flex;flex-direction:column;gap:1px}
.cal-pr-row{display:flex;justify-content:space-between;font-size:8pt}
.cal-pr-cls{font-weight:700;color:#6b7280;min-width:14px}
.cal-pr-val{font-family:monospace;font-weight:600;color:#1e293b}
.cal-pr-val.ov{color:#7c3aed;font-weight:800}

.tier-legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;font-size:9pt;align-items:center}
.tier-legend .item{padding:2px 8px;border-radius:4px;font-weight:600}
.lg-a{background:#fee2e2;color:#dc2626}
.lg-b{background:#dbeafe;color:#1e40af}
.lg-c{background:#f1f5f9;color:#64748b}
.lg-x{background:#fef3c7;color:#92400e}
.lg-0{background:#fee2e2;color:#dc2626;border:1px dashed #dc2626}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="sub">B U D D I C A &nbsp; T O U R I N G &nbsp; 高松店</div>
    <h1>💰 価格インポート確認</h1>
  </div>
  <div class="actions">
    <a class="act-btn" href="./pricing.html">← pricing.html</a>
  </div>
</div>

<div class="container">

  <div class="notice">⚠️ 実行前に必ず <a href="./pricing.html" target="_blank" style="color:#92400e;font-weight:700">pricing.html</a> を一度開いてください（初期データ作成のため）</div>

  <!-- セグメントタブ -->
  <div class="seg-tabs" id="seg-tabs">
    <button class="seg-tab active" onclick="selSeg('proper')">📗 プロパー<span class="seg-label">通常料金</span></button>
    <button class="seg-tab cp" onclick="selSeg('cp')">🎯 CP（キャンペーン）<span class="seg-label">同価格</span></button>
  </div>

  <div class="tier-legend">
    <span>凡例:</span>
    <span class="item lg-a">A 繁忙</span>
    <span class="item lg-b">B 通常</span>
    <span class="item lg-c">C 閑散</span>
    <span class="item lg-x">★ 特別期間（お盆/年末年始）</span>
    <span class="item lg-0">¥0（リセット予定）</span>
  </div>

  <div class="year-tabs" id="year-tabs"></div>
  <div class="month-tabs" id="month-tabs"></div>
  <div id="matrix-area"></div>

  <!-- カレンダービュー -->
  <div class="cal-section" id="cal-section">
    <div class="cal-head">
      <span>📅 カレンダービュー — <span id="cal-ym-label"></span></span>
      <span class="cal-stats" id="cal-stats"></span>
      <span class="sub">tier × 価格を日別に確認</span>
    </div>
    <div style="overflow-x:auto"><table class="cal-tbl"><thead><tr>
      <th class="sun">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th class="sat">土</th>
    </tr></thead><tbody id="cal-body"></tbody></table></div>
  </div>

  <div class="footer-actions">
    <button class="btn-import" onclick="doImport()">🚀 この価格表で localStorage に反映する</button>
    <div style="display:flex;gap:6px">
      <button class="act-btn" style="background:#f1f5f9;color:#475569;flex:1" onclick="verifyStorage()">🔍 localStorage 検証</button>
      <a class="act-btn" style="background:#dcfce7;color:#15803d;flex:1;text-align:center" href="./pricing.html" target="_blank">📅 pricing.html を新規タブで開く</a>
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'bt_takamatsu_seasonal_v6';
const CLASSES = ['A','B','C','H','S','F'];
const CLASS_NAMES = {A:'高級系MV',B:'一般MV',C:'コンパクトSUV',H:'セダン',S:'SUV',F:'コンパクト'};
const TIERS = [['A','繁忙','#dc2626','#fee2e2'],['B','通常','#1e40af','#dbeafe'],['C','閑散','#64748b','#f1f5f9']];
const COEF_A = 1.50, COEF_C = 0.80;

// ===== セグメント（プロパー/CP） =====
let curSegment = 'proper'; // 'proper' | 'cp'
function selSeg(seg){
  curSegment = seg;
  document.querySelectorAll('.seg-tab').forEach((b,i)=>{
    b.classList.toggle('active', (i===0&&seg==='proper')||(i===1&&seg==='cp'));
  });
  renderAll();
}

// ===== 祝日・tier スコアリング（pricing.htmlと同一ロジック） =====
const HOLIDAYS_CAL = {
  '2026-1-1':'元日','2026-1-12':'成人の日','2026-2-11':'建国記念','2026-2-23':'天皇誕生',
  '2026-3-20':'春分の日','2026-4-29':'昭和の日','2026-5-3':'憲法記念','2026-5-4':'みどり',
  '2026-5-5':'こども','2026-5-6':'振替休日','2026-7-20':'海の日','2026-8-11':'山の日',
  '2026-9-21':'敬老','2026-9-23':'秋分','2026-10-12':'スポーツ','2026-11-3':'文化','2026-11-23':'勤労感謝',
  '2027-1-1':'元日','2027-1-11':'成人の日','2027-2-11':'建国記念','2027-2-23':'天皇誕生',
  '2027-3-21':'春分の日','2027-3-22':'振替休日','2027-4-29':'昭和の日','2027-5-3':'憲法記念',
  '2027-5-4':'みどり','2027-5-5':'こども','2027-7-19':'海の日','2027-8-11':'山の日',
  '2027-9-20':'敬老','2027-9-23':'秋分','2027-10-11':'スポーツ','2027-11-3':'文化','2027-11-23':'勤労感謝',
};
function calDateKey(y,m,d){return y+'-'+m+'-'+d;}
function autoScoreT_cal(date){
  const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate(),wd=date.getDay();
  const isHoliday=!!HOLIDAYS_CAL[calDateKey(y,m,d)];
  const weekend=(wd===0||wd===6);
  if((m===12&&d>=27)||(m===1&&d<=4))return 10;
  if((m===8&&d>=10&&d<=16))return 10;
  if(y===2026&&m===4&&d>=27)return 10;if(y===2026&&m===5&&d>=1&&d<=6)return 10;
  if(y===2027&&m===4&&d>=29)return 10;if(y===2027&&m===5&&d<=5)return 10;
  if(y===2026&&m===9&&d>=19&&d<=23)return 8;if(y===2027&&m===9&&[18,19,20,23,24,25,26].includes(d))return 8;
  if(m===11&&[13,14,15].includes(d))return 9;
  if((m===7&&d>=21)||(m===8&&d>=21))return 7;
  if(m===4&&d<=15)return 7;if(m===11&&d>=1&&d<=20)return 7;
  if([[2026,1,[10,11,12]],[2027,1,[9,10,11]],[2026,3,[20,21,22]],[2026,7,[17,18,19,20]],[2026,10,[9,10,11,12]],[2026,11,[20,21,22,23]]].some(([yy,mm,ds])=>y===yy&&m===mm&&ds.includes(d)))return 7;
  if(weekend)return 4;if(isHoliday)return 5;
  if((m===1&&d>=13)||(m===2))return 1;if(m===6||(m===7&&d<=10))return 0;
  if(m===12&&d<=22)return 2;
  return 2;
}
function calScoreTier(sc){
  // 簡易判定: score>=5.5→A, >=3→B, else C
  const s=autoScoreT_cal(sc);
  if(s>=8)return'A';if(s>=5)return'B';return'C';
}
function calGetTier(date,pricingState){
  const k=calDateKey(date.getFullYear(),date.getMonth()+1,date.getDate());
  if(pricingState&&pricingState.dayTiers&&pricingState.dayTiers[k])return pricingState.dayTiers[k];
  const sc=autoScoreT_cal(date);
  if(sc>=8)return'A';if(sc>=4)return'B';return'C';
}
function calGetEvent(date){
  const k=calDateKey(date.getFullYear(),date.getMonth()+1,date.getDate());
  if(HOLIDAYS_CAL[k])return HOLIDAYS_CAL[k];
  return null;
}
function calGetPrice(date,cls,ym,pricingState){
  // editState から当月価格を取得
  const s=editState[ym];
  if(!s||s.skip||s.reset)return null;
  const tier=calGetTier(date,pricingState);
  return s[tier]?.[cls]||null;
}

// ===== カレンダー描画 =====
function renderCalendar(){
  const ym=curKey();
  const [y,m]=[curYear,curMonth];
  const label=document.getElementById('cal-ym-label');
  if(label)label.textContent=`${y}年${m}月`;
  const body=document.getElementById('cal-body');
  if(!body)return;
  // pricing.html の状態を読み込み（dayTiers 参照）
  let pState=null;
  try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)pState=JSON.parse(raw);}catch(e){}
  const s=editState[ym];
  const lastDay=new Date(y,m,0).getDate();
  const firstWd=new Date(y,m-1,1).getDay();
  const counts={A:0,B:0,C:0};
  let html='<tr>';
  for(let i=0;i<firstWd;i++)html+='<td class="cal-empty"></td>';
  const SHOW_CLASSES=['A','B','C','F']; // カレンダーで表示するクラス（4つに絞る）
  for(let d=1;d<=lastDay;d++){
    const date=new Date(y,m-1,d),wd=date.getDay();
    const tier=calGetTier(date,pState);
    counts[tier]=(counts[tier]||0)+1;
    const event=calGetEvent(date);
    const isHol=(wd===0||!!HOLIDAYS_CAL[calDateKey(y,m,d)]);
    const isSat=wd===6,isSun=wd===0;
    const dnCls=isHol?'dn hol':(isSat?'dn sat':'dn');
    let pricesHtml='';
    if(s&&!s.skip&&!s.reset){
      pricesHtml='<div class="cal-prices">';
      SHOW_CLASSES.forEach(cls=>{
        const p=s[tier]?.[cls];
        if(p==null)return;
        pricesHtml+=`<div class="cal-pr-row"><span class="cal-pr-cls">${cls}</span><span class="cal-pr-val">¥${Math.round(p/1000)}k</span></div>`;
      });
      pricesHtml+='</div>';
    }else{
      pricesHtml='<div style="font-size:8pt;color:#94a3b8;padding:4px 0">—</div>';
    }
    const evHtml=event?`<div class="cal-ev">${event}</div>`:'';
    html+=`<td class="cal-day tier-${tier}">
      <div class="cal-num"><span class="${dnCls}">${d}</span><span class="tier-badge tb-${tier}">${tier}</span></div>
      ${evHtml}${pricesHtml}</td>`;
    if(wd===6&&d!==lastDay)html+='</tr><tr>';
  }
  const lastWd2=new Date(y,m-1,lastDay).getDay();
  for(let i=lastWd2+1;i<=6;i++)html+='<td class="cal-empty"></td>';
  html+='</tr>';
  body.innerHTML=html;
  const statsEl=document.getElementById('cal-stats');
  if(statsEl)statsEl.textContent=`A:${counts.A||0} / B:${counts.B||0} / C:${counts.C||0} = ${lastDay}日`;
}

// ===== 価格提案（2026/7-12）=====
const PROPOSAL = {
  '2026-07': { B:{A:17000,B:14500,C:11500,S:11500,F:6500,H:10500}, A:null, special:null },
  '2026-08': { B:{A:17500,B:16500,C:11500,S:11500,F:6500,H:12500}, A:{A:22000,B:21500,C:21500,S:21500,F:8500,H:15500}, special:'お盆（8/12-14）' },
  '2026-09': { B:{A:17000,B:13000,C:13000,S:13000,F:6500,H:10500}, A:null, special:null },
  '2026-10': { B:{A:17000,B:16500,C:13000,S:13000,F:7000,H:11500}, A:null, special:null },
  '2026-11': { B:{A:16000,B:15500,C:13000,S:13000,F:6500,H:11500}, A:null, special:null },
  '2026-12': { B:{A:13500,B:15500,C:13000,S:13000,F:6000,H:10500}, A:{A:20000,B:21000,C:14500,S:14500,F:9000,H:15500}, special:'年末年始（12/28-1/3）' },
};

// ===== 内部状態 =====
const editState = {}; // {ym: {A:{cls:price}, B:{...}, C:{...}, special:bool}} ← 編集中のバッファ
const originalState = {}; // 原案（提案資料の値・絶対不変）
const historyState = {}; // {ym: [{id, label, savedAt, A, B, C, special, specialLabel}]} 最大5
const activeVersion = {}; // {ym: versionId} 現在採用中バージョン

const HISTORY_STORAGE_KEY = 'bt_import_history_v1';
const MAX_VERSIONS = 5;

// ===== 履歴 load/save =====
function loadHistory(){
  try{
    const raw = localStorage.getItem(HISTORY_STORAGE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    Object.assign(historyState, d.history || {});
    Object.assign(activeVersion, d.active || {});
  }catch(e){ console.warn('履歴ロード失敗', e); }
}
function persistHistory(){
  try{
    localStorage.setItem(HISTORY_STORAGE_KEY, JSON.stringify({history:historyState, active:activeVersion}));
  }catch(e){ console.warn('履歴保存失敗', e); }
}

function ensureV1FromProposal(ym){
  // V1 = 原案 を絶対1番目に保証（不変）
  if(!historyState[ym]) historyState[ym] = [];
  const v1Exists = historyState[ym].some(v => v.id === 'v1');
  if(!v1Exists && originalState[ym] && !originalState[ym].skip){
    const o = originalState[ym];
    historyState[ym].unshift({
      id: 'v1',
      label: '原案',
      savedAt: '提案資料',
      protected: true,
      A: {...o.A}, B: {...o.B}, C: {...o.C},
      special: o.special, specialLabel: o.specialLabel, reset: o.reset
    });
  }
  // 初回はV1をactiveに
  if(!activeVersion[ym] && historyState[ym].length > 0){
    activeVersion[ym] = historyState[ym][0].id;
  }
}

function getVer(ym, id){ return (historyState[ym]||[]).find(v => v.id === id); }
function getActiveVer(ym){ return getVer(ym, activeVersion[ym]); }

function isDraftDirty(ym){
  // editState と activeVersion の data に差分があるか
  const cur = editState[ym];
  const act = getActiveVer(ym);
  if(!cur || cur.skip || !act) return false;
  return ['A','B','C'].some(t => cur[t] && CLASSES.some(c => (cur[t][c]||0) !== (act[t]?.[c]||0)));
}

function buildInitial(){
  // 2026/1-6 = 空（インポート時は触らない）
  for(let m = 1; m <= 6; m++){
    const ym = '2026-' + String(m).padStart(2,'0');
    editState[ym] = { skip: true };
    originalState[ym] = { skip: true };
  }
  // 2026/7-12 = 提案価格
  Object.entries(PROPOSAL).forEach(([ym, data]) => {
    const A = {}, B = {...data.B}, C = {};
    CLASSES.forEach(c => {
      A[c] = data.A ? data.A[c] : Math.round(data.B[c] * COEF_A);
      C[c] = Math.round(data.B[c] * COEF_C);
    });
    editState[ym] = { A, B, C, special: !!data.A, specialLabel: data.special };
    // 原案（ディープコピー）
    originalState[ym] = { A:{...A}, B:{...B}, C:{...C}, special:!!data.A, specialLabel:data.special };
  });
  // 2027 全12月 = 0
  for(let m = 1; m <= 12; m++){
    const ym = '2027-' + String(m).padStart(2,'0');
    const A = {}, B = {}, C = {};
    CLASSES.forEach(c => { A[c] = 0; B[c] = 0; C[c] = 0; });
    editState[ym] = { A, B, C, special: false, reset: true };
    originalState[ym] = { A:{...A}, B:{...B}, C:{...C}, special:false, reset:true };
  }
}

let curYear = 2026, curMonth = 7;
function curKey(){ return curYear + '-' + String(curMonth).padStart(2,'0'); }

function renderYearTabs(){

}

function isMonthDirty(ym){
  // 月タブ表示用: draft 編集中 = dirty
  return isDraftDirty(ym);
}

function renderMonthTabs(){
  const el = document.getElementById('month-tabs');
  let html = '';
  for(let m = 1; m <= 12; m++){
    const ym = curYear + '-' + String(m).padStart(2,'0');
    const s = editState[ym] || {};
    const skip = s.skip;
    const reset = s.reset;

    const summary = skip ? '触らない' : (reset ? 'リセット' : (s.B ? 'A' + Math.round(s.A.A/1000) + '/B' + Math.round(s.B.A/1000) + '/C' + Math.round(s.C.A/1000) : ''));
    const cls = curMonth === m ? 'active' : '';

      <span class="sub">${summary}</span>

function selMonth(m){ curMonth = m; renderAll(); }

function showToast(msg, type){
  let t = document.getElementById('toast');
  if(!t){ t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  setTimeout(()=>t.classList.add('show'),10);
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2500);
}

    </div>`;

      <span class="ver-label">編集中</span>
      <span class="ver-date">未保存</span>

  }
  const canAdd = versions.length < MAX_VERSIONS;
  histHtml += `<button class="btn-add-ver" ${canAdd?'':'disabled'} onclick="addVersionFromDraft('${ym}')" title="${canAdd?'現在の編集内容を新規バージョンとして保存':'5バージョン上限に達しています'}">

  histHtml += `</div></div>`;

  // ============ マトリクスカード ============

      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">`;
  if(s.reset){

  }
  html += `<button class="applyall" onclick="copyToAllMonths()">📋 この月を全月に適用</button></div></div>`;

  html += `<table class="matrix-table">

      </tr>

        : (activeVer ? `<b>採用中:</b> ${escapeHtml(actLabel)}<br><span style="font-size:8.5pt;color:#6b7280">📥 pricing.html に反映済み</span>` : '<b>バージョン未選択</b>')}

function escapeHtml(s){return String(s||'').replace(/[<>&"']/g,m=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;","'":"&#39;"}[m]));}

// ===== バージョン操作 =====
function loadVersion(ym, id){
  const v = getVer(ym, id);
  if(!v) return;
  // editState を v の内容で上書き
  editState[ym].A = {...v.A};
  editState[ym].B = {...v.B};
  editState[ym].C = {...v.C};
  if(v.special !== undefined) editState[ym].special = v.special;
  if(v.specialLabel !== undefined) editState[ym].specialLabel = v.specialLabel;
  activeVersion[ym] = id;
  persistHistory();
  showToast(`📖 ${id.toUpperCase()}: ${v.label} を読み込みました`);
  renderAll();
}

function addVersionFromDraft(ym){
  const versions = historyState[ym] || [];
  if(versions.length >= MAX_VERSIONS){
    showToast(`⚠️ 上限 ${MAX_VERSIONS} バージョン到達。不要なバージョンを削除してください`,'warn');
    return;
  }
  const label = prompt('バージョンのラベルを入力してください\n（例: 値上げ案 / GW増額 / 通常運用 など）', '');
  if(label === null) return; // cancel
  if(!label.trim()){ showToast('ラベルが空です','error'); return; }
  // 次の ID
  let n = versions.length + 1;
  while(versions.some(v => v.id === 'v'+n)) n++;
  const cur = editState[ym];
  const today = new Date();
  const stamp = `${today.getMonth()+1}/${today.getDate()} ${String(today.getHours()).padStart(2,'0')}:${String(today.getMinutes()).padStart(2,'0')}`;
  const newVer = {
    id: 'v' + n,
    label: label.trim(),
    savedAt: stamp,
    A:{...cur.A}, B:{...cur.B}, C:{...cur.C},
    special: cur.special, specialLabel: cur.specialLabel, reset: cur.reset
  };
  historyState[ym].push(newVer);
  activeVersion[ym] = newVer.id;
  persistHistory();
  showToast(`✅ ${newVer.id.toUpperCase()}: ${newVer.label} を保存しました（採用中）`);
  renderAll();
}

function deleteVersion(ym, id){
  if(id === 'v1'){ showToast('V1（原案）は削除できません','error'); return; }
  const v = getVer(ym, id);
  if(!v) return;
  if(!confirm(`${id.toUpperCase()}: ${v.label} を削除しますか？\nこの操作は取り消せません。`)) return;
  historyState[ym] = historyState[ym].filter(x => x.id !== id);
  if(activeVersion[ym] === id){
    // 採用中が消えた → 直近に切替
    activeVersion[ym] = historyState[ym][historyState[ym].length-1]?.id || 'v1';
    const cur = getActiveVer(ym);
    if(cur){
      editState[ym].A = {...cur.A};
      editState[ym].B = {...cur.B};
      editState[ym].C = {...cur.C};
    }
  }
  persistHistory();
  showToast(`🗑️ ${id.toUpperCase()} を削除しました`,'warn');
  renderAll();
}

// 採用中バージョンを localStorage（pricing.html）に反映
function applyActiveToLocalStorage(ym){
  const v = getActiveVer(ym);
  if(!v){ showToast('採用バージョンなし','error'); return; }
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ showToast('pricing.html を一度開いてください','error'); return; }
  let state;
  try{ state = JSON.parse(raw); }catch(e){ showToast('JSON解析失敗','error'); return; }
  if(!state.segments?.proper){ showToast('プロパーセグメントなし','error'); return; }

  // pricing.html の ymKey は non-padded
  const [y, m] = ym.split('-');
  const key = y + '-' + parseInt(m, 10);
  const data = { A:{...v.A}, B:{...v.B}, C:{...v.C} };

  // プロパー＆CP 両方に書き込む（同じ数字を共有）
  ['proper','cp'].forEach(seg => {
    if(!state.segments[seg]) state.segments[seg] = { monthlyTierClassPrices:{} };
    if(!state.segments[seg].monthlyTierClassPrices) state.segments[seg].monthlyTierClassPrices = {};
    if(state.segments[seg].monthlyTierClassPrices[ym]) delete state.segments[seg].monthlyTierClassPrices[ym];
    state.segments[seg].monthlyTierClassPrices[key] = {...data};
  });
  if(!state.monthlyTierClassPrices) state.monthlyTierClassPrices = {};
  if(state.monthlyTierClassPrices[ym]) delete state.monthlyTierClassPrices[ym];
  state.monthlyTierClassPrices[key] = data;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  showToast(`📥 ${key} ${v.id.toUpperCase()}: ${v.label} → プロパー＆CP 両方に反映`);
}

// 入力中（oninput）= フォーカス保ちつつデータと当該セル装飾のみ更新（軽量）
function updateCellLite(input){
  const ym = input.dataset.ym;
  const tier = input.dataset.tier;
  const cls = input.dataset.cls;
  const v = parseInt(input.value) || 0;
  if(!editState[ym]) return;
  editState[ym][tier][cls] = v;
  const orig = originalState[ym]?.[tier]?.[cls] || 0;
  // active version との差分判定（💾保存判定はこちらを基準）
  const act = getActiveVer(ym);
  const activeV = act ? (act[tier]?.[cls] || 0) : 0;
  const isDiffFromActive = v !== activeV;
  const isDiffFromOrig = v !== orig;
  const info = document.getElementById('info-' + ym + '-' + tier + '-' + cls);
  const saveBtn = document.getElementById('save-' + ym + '-' + tier + '-' + cls);
  if(isDiffFromOrig){
    input.classList.add('dirty');
    input.classList.remove('saved','special','zero');
    info?.classList.add('diff');
  }else{
    input.classList.remove('dirty');
    info?.classList.remove('diff');
  }
  // 💾 ボタン: active version と異なる場合に表示（未保存変更がある状態）
  if(saveBtn){
    if(isDiffFromActive){ saveBtn.classList.add('show'); }
    else{ saveBtn.classList.remove('show'); }
  }
  // ★ renderAll() は呼ばない（呼ぶとinputが破棄されて入力中断する）
}

// セル単位で localStorage に即時保存（pricing.html に反映）
function saveCellNow(ym, tier, cls){
  const v = editState[ym]?.[tier]?.[cls];
  if(v == null){ showToast('保存失敗（データなし）','error'); return; }
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ showToast('pricing.html を一度開いてください','error'); return; }
  let state;
  try{ state = JSON.parse(raw); }catch(e){ showToast('JSON解析失敗','error'); return; }
  if(!state.segments?.proper){ showToast('プロパーセグメントなし','error'); return; }

  const [y, m] = ym.split('-');
  const key = y + '-' + parseInt(m, 10);

  // プロパー＆CP 両方のセルを更新
  ['proper','cp'].forEach(seg=>{
    if(!state.segments[seg]) state.segments[seg] = { monthlyTierClassPrices:{} };
    if(!state.segments[seg].monthlyTierClassPrices) state.segments[seg].monthlyTierClassPrices = {};
    if(state.segments[seg].monthlyTierClassPrices[ym]) delete state.segments[seg].monthlyTierClassPrices[ym];
    if(!state.segments[seg].monthlyTierClassPrices[key]) state.segments[seg].monthlyTierClassPrices[key]={A:{},B:{},C:{}};
    if(!state.segments[seg].monthlyTierClassPrices[key][tier]) state.segments[seg].monthlyTierClassPrices[key][tier]={};
    state.segments[seg].monthlyTierClassPrices[key][tier][cls] = v;
  });
  if(!state.monthlyTierClassPrices) state.monthlyTierClassPrices = {};
  if(state.monthlyTierClassPrices[ym]) delete state.monthlyTierClassPrices[ym];
  if(!state.monthlyTierClassPrices[key]) state.monthlyTierClassPrices[key] = {A:{},B:{},C:{}};
  if(!state.monthlyTierClassPrices[key][tier]) state.monthlyTierClassPrices[key][tier] = {};
  state.monthlyTierClassPrices[key][tier][cls] = v;

  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

  // active version のスナップショットも該当セルだけ更新（履歴と整合維持）
  const act = getActiveVer(ym);
  if(act && !act.protected){
    if(!act[tier]) act[tier] = {};
    act[tier][cls] = v;
    persistHistory();
  }

  // 視覚フィードバック
  const inp = document.getElementById('cell-' + ym + '-' + tier + '-' + cls);
  const saveBtn = document.getElementById('save-' + ym + '-' + tier + '-' + cls);
  if(inp){
    inp.classList.remove('dirty');
    inp.classList.add('saved');
    setTimeout(()=>inp.classList.remove('saved'), 1500);
  }
  if(saveBtn) saveBtn.classList.remove('show');
  showToast(`💾 ${key} ${tier}${tier2Label(tier)} タイプ${cls} = ¥${v.toLocaleString()} を保存`);
}

// 確定時（onchange = blur or Enter）= 全体再描画して履歴バー・月タブ等も同期
function updateCell(input){
  updateCellLite(input);
  // 軽い処理を入れて DOM 再構築をフレーム外で実行
  setTimeout(() => {
    renderMonthTabs();
    // 履歴バー・アクション行も再描画
    rerenderHistoryAndActions();
  }, 0);
}

// 履歴バーとアクション行だけ再描画（マトリクスのinputは触らない）
function rerenderHistoryAndActions(){
  const area = document.getElementById('matrix-area');
  if(!area) return;
  const ym = curKey();
  if(editState[ym]?.skip) return;
  const histBar = area.querySelector('.history-bar');
  const actBar = area.querySelector('.month-actions');
  // 簡単のためrenderMatrixを呼ぶが、ただし「現在フォーカスしている要素」を保持
  const focusEl = document.activeElement;
  const focusId = focusEl?.id;
  const selStart = focusEl?.selectionStart;
  const selEnd = focusEl?.selectionEnd;
  renderMatrix();
  if(focusId){
    const newEl = document.getElementById(focusId);
    if(newEl){
      newEl.focus();
      try{ newEl.setSelectionRange(selStart, selEnd); }catch(e){}
    }
  }
}

function resetCell(ym, tier, cls){
  const v = originalState[ym]?.[tier]?.[cls] || 0;
  editState[ym][tier][cls] = v;
  const inp = document.getElementById('cell-' + ym + '-' + tier + '-' + cls);
  if(inp){ inp.value = v; updateCell(inp); }
  showToast('↺ 原案に戻しました（¥' + v.toLocaleString() + '）','warn');
}

function tier2Label(t){return t==='A'?'繁忙':t==='B'?'通常':'閑散';}

function copyToAllMonths(){
  const ym = curKey();
  const s = editState[ym];
  if(!s || s.skip || s.reset){ alert('この月はコピー元にできません'); return; }
  if(!confirm(`${curYear}年${curMonth}月 の価格を ${curYear}年 全月（インポート対象月のみ）に適用します。OK？`)) return;
  for(let m = 1; m <= 12; m++){
    const ym2 = curYear + '-' + String(m).padStart(2,'0');
    const s2 = editState[ym2];
    if(!s2 || s2.skip || s2.reset) continue;
    if(ym2 === ym) continue;
    s2.A = {...s.A}; s2.B = {...s.B}; s2.C = {...s.C};
  }
  renderAll();
}

function renderAll(){
  renderYearTabs();
  renderMonthTabs();
  renderMatrix();
  renderCalendar();
}

function log(msg, cls){
  const logEl = document.getElementById('log');
  logEl.style.display = 'block';
  const line = document.createElement('div');
  if(cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function doImport(){
  const logEl = document.getElementById('log');
  logEl.innerHTML = '';
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ alert('❌ pricing.html を一度開いてから実行してください'); return; }
  if(!confirm('上記の価格表で localStorage に書き込みます。\n\nOKで実行しますか？')) return;

  let state;
  try{ state = JSON.parse(raw); }catch(e){ alert('❌ JSON失敗'); return; }
  if(!state.segments?.proper){ alert('❌ プロパーセグメントが見つかりません'); return; }

  // プロパー＆CP 両方初期化（同じ数字を共有）
  ['proper','cp'].forEach(seg=>{
    if(!state.segments[seg]) state.segments[seg] = { monthlyTierClassPrices:{} };
    if(!state.segments[seg].monthlyTierClassPrices) state.segments[seg].monthlyTierClassPrices = {};
  });
  const proper = state.segments.proper;
  const cpSeg = state.segments.cp;
  const tcp = proper.monthlyTierClassPrices;
  const tcpCp = cpSeg.monthlyTierClassPrices;
  if(!state.monthlyTierClassPrices) state.monthlyTierClassPrices = {};
  const tcp2 = state.monthlyTierClassPrices;

  // ★ basePrices と tierClassPrices も更新（fallback値として）
  if(!proper.tierClassPrices) proper.tierClassPrices = {A:{},B:{},C:{}};
  if(!state.tierClassPrices) state.tierClassPrices = {A:{},B:{},C:{}};

  log('===== インポート開始 =====', 'success');
  let inputCnt = 0, resetCnt = 0, skipCnt = 0;
  // ★ pricing.html の ymKey(y,m) は `${y}-${m}` でゼロパディングなし
  //   なので "2026-08" → "2026-8" に変換して書き込む
  const toUnpaddedYm = (ym) => {
    const [y, m] = ym.split('-');
    return y + '-' + parseInt(m, 10);
  };
  // 既存の padded key 残骸を一旦クリア（"2026-08" 等を削除）
  Object.keys(tcp).forEach(k => { if(/^\d{4}-0\d$/.test(k) || /^\d{4}-1[0-2]$/.test(k)) delete tcp[k]; });
  Object.keys(tcp2).forEach(k => { if(/^\d{4}-0\d$/.test(k) || /^\d{4}-1[0-2]$/.test(k)) delete tcp2[k]; });
  Object.entries(editState).forEach(([ym, s]) => {
    if(s.skip){ skipCnt++; return; }
    const data = { A:{...s.A}, B:{...s.B}, C:{...s.C} };
    const key = toUnpaddedYm(ym);  // ★ "2026-08" → "2026-8"
    tcp[key] = data;
    tcpCp[key] = {...data}; // ★ CP にも同じ価格を書き込み
    tcp2[key] = data;  // ★ top-level も同期
    if(s.reset){
      resetCnt++;
      log('  🗑️ ' + key + ' 全0リセット');
    }else{
      inputCnt++;
      log('  ✓ ' + key + (s.special?' ★':'') + ' B Aクラス=¥' + (s.B.A||0).toLocaleString());
    }
  });
  log('価格入力: ' + inputCnt + 'ヶ月 / 0リセット: ' + resetCnt + 'ヶ月 / 触らず: ' + skipCnt + 'ヶ月', 'success');

  // ★ 2026-07 の B通常 を年間tierClassPrices として設定（fallback値・全月共通価格）
  const jul = editState['2026-07'];
  if(jul && !jul.skip){
    ['A','B','C'].forEach(t => {
      proper.tierClassPrices[t] = {...jul[t]};
      state.tierClassPrices[t] = {...jul[t]};
    });
  }
  proper.basePrices = {...PROPOSAL['2026-07'].B};
  state.basePrices = {...PROPOSAL['2026-07'].B};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  log('localStorage 書き込み完了', 'success');

  // ★ 即時検証（2箇所、non-padded key で確認）
  const verifyRaw = localStorage.getItem(STORAGE_KEY);
  const verifyState = JSON.parse(verifyRaw);
  const v1jul = verifyState?.segments?.proper?.monthlyTierClassPrices?.['2026-7']?.B?.A;
  const v2jul = verifyState?.monthlyTierClassPrices?.['2026-7']?.B?.A;
  const v1aug = verifyState?.segments?.proper?.monthlyTierClassPrices?.['2026-8']?.A?.A;
  const v2aug = verifyState?.monthlyTierClassPrices?.['2026-8']?.A?.A;
  if(v1jul === 17000 && v2jul === 17000 && v1aug === 22000 && v2aug === 22000){
    log('✅ 検証OK: 2026-7 B Aクラス=¥17,000 / 2026-8 A Aクラス=¥22,000', 'success');
  }else{
    log('⚠ 検証: 7月 segments=¥' + (v1jul||0) + ' top=¥' + (v2jul||0) + ' / 8月 segments=¥' + (v1aug||0) + ' top=¥' + (v2aug||0), 'warning');
  }

  log('', '');
  log('▼ 確認手順', 'warning');
  log('1. このタブはそのまま', 'warning');
  log('2. pricing.html を【新しいタブ】で開く（既存タブは閉じる）', 'warning');
  log('3. プロパー ボタンをクリック', 'warning');
  log('4. 7月タブ → カレンダーに価格が表示される', 'warning');

  alert('✅ インポート完了\n\n' +
        '価格入力: ' + inputCnt + 'ヶ月（2026/7-12月）\n' +
        '0リセット: ' + resetCnt + 'ヶ月（2027年）\n' +
        '触らず: ' + skipCnt + 'ヶ月（2026/1-6月）\n\n' +
        '【重要】 pricing.html を必ず新しいタブで開いてください\n' +
        '（既に開いているタブは閉じてから再オープン）');
}

function verifyStorage(){
  const logEl = document.getElementById('log');
  logEl.innerHTML = '';
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ log('❌ localStorage に保存値なし', 'error'); return; }
  try{
    const state = JSON.parse(raw);
    const tcp = state?.segments?.proper?.monthlyTierClassPrices;
    if(!tcp){ log('❌ proper.monthlyTierClassPrices が見つかりません', 'error'); return; }
    log('===== 現在のlocalStorage（proper.monthlyTierClassPrices）=====', 'success');
    log('保存月数: ' + Object.keys(tcp).length);
    log('★ pricing.html は ymKey=`2026-8` 形式（ゼロパディングなし）で読みます', 'warning');
    // non-padded と padded 両方サンプル確認
    const samples = ['2026-7','2026-8','2026-12','2027-1','2026-07','2026-08'];
    samples.forEach(ym => {
      const v = tcp[ym];
      if(!v){ log('  ' + ym + ' : 未設定', 'warning'); return; }
      log('  ' + ym + ' A=' + (v.A?.A||0) + ' / B=' + (v.B?.A||0) + ' / C=' + (v.C?.A||0) + '（Aクラス）');
    });
    log('');
    log('▼ 全キー一覧 ▼');
    log(Object.keys(tcp).sort().join(', '));
    log('');
    log('▼ 全データ JSON ▼');
    log(JSON.stringify(tcp, null, 2));
  }catch(e){
    log('❌ パースエラー: ' + e.message, 'error');
  }
}

// 初期化
buildInitial();
loadHistory();
// 各月で V1=原案 を保証 + editState を採用中バージョンと同期
Object.keys(editState).forEach(ym => {
  if(editState[ym].skip) return;
  ensureV1FromProposal(ym);
  // 採用中バージョンを editState に反映（初回起動時は V1 = 原案）
  const act = getActiveVer(ym);
  if(act){
    editState[ym].A = {...act.A};
    editState[ym].B = {...act.B};
    editState[ym].C = {...act.C};
  }
});
persistHistory();
renderAll();
</script>
