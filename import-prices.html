<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>価格インポート — BUDDICA TOURING</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Hiragino Sans","Yu Gothic","Meiryo",sans-serif;background:#f3f4f6;color:#1f2937;line-height:1.5}
.header{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:18pt;font-weight:700;display:flex;align-items:center;gap:10px}
.header .sub{font-size:9pt;opacity:.7;letter-spacing:.25em}
.header .actions{display:flex;gap:6px}
.act-btn{background:#fff;color:#1e3a8a;border:none;padding:6px 14px;border-radius:6px;font-size:10pt;font-weight:700;cursor:pointer}
.act-btn.warn{background:#fef3c7;color:#92400e}
.act-btn.danger{background:#fee2e2;color:#dc2626}
.act-btn:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.1)}
.container{max-width:1500px;margin:0 auto;padding:14px}

/* ===== Year tabs ===== */
.year-tabs{display:flex;gap:4px;margin-bottom:6px}
.year-tab{background:#f1f5f9;color:#475569;padding:7px 16px;border:none;border-radius:8px;font-size:11pt;font-weight:700;cursor:pointer}
.year-tab.active{background:#1e3a8a;color:#fff}

/* ===== Month tabs ===== */
.month-tabs{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:10px}
.month-tab{background:#fff;border:1px solid #d1d5db;color:#475569;padding:6px 10px;border-radius:6px;font-size:10pt;font-weight:600;cursor:pointer;min-width:54px;text-align:center;line-height:1.3;display:flex;flex-direction:column;align-items:center;gap:1px}
.month-tab.active{background:#1e40af;color:#fff;border-color:#1e40af}
.month-tab.zero{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.month-tab.special{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
.month-tab.active.special{background:#ea580c;color:#fff;border-color:#ea580c}
.month-tab .num{font-weight:800;font-size:11pt}
.month-tab .sub{font-size:7pt;opacity:.8;font-family:monospace;letter-spacing:.5px}

/* ===== Price matrix ===== */
.matrix-card{background:#fff;border-radius:10px;padding:14px;box-shadow:0 2px 6px rgba(0,0,0,.07);margin-bottom:12px}
.matrix-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px;flex-wrap:wrap}
.matrix-head .ttl{font-size:11.5pt;font-weight:700;color:#1e3a8a;display:flex;align-items:center;gap:6px}
.matrix-head .tag{font-size:8.5pt;color:#6b7280;background:#f1f5f9;padding:2px 8px;border-radius:4px;font-weight:400}
.matrix-head .tag.special{background:#fef3c7;color:#92400e;font-weight:700}
.matrix-head .tag.reset{background:#fee2e2;color:#dc2626;font-weight:700}
.matrix-head .applyall{background:#dbeafe;color:#1e40af;border:none;padding:4px 10px;border-radius:4px;font-size:8.5pt;font-weight:600;cursor:pointer}
.matrix-table{width:100%;border-collapse:collapse}
.matrix-table th{padding:4px 6px;text-align:center;font-size:9pt;font-weight:700;border:1px solid #1d4ed8;background:#1e3a8a;color:#fff}
.matrix-table th.head{background:#374151;width:90px}
.matrix-table th.col-head{background:#1e3a8a}
.matrix-table th.col-head .typ{font-size:7.5pt;font-weight:400;opacity:.75}
.matrix-table th.col-head .cls{font-size:9.5pt;font-weight:800;background:rgba(255,255,255,.15);border-radius:3px;padding:1px 0;margin-top:1px;display:block}
.matrix-table td{border:1px solid #d1d5db;padding:2px;text-align:center}
.matrix-table tr.tier-a td:first-child{background:#fee2e2;color:#dc2626;font-weight:700}
.matrix-table tr.tier-b td:first-child{background:#dbeafe;color:#1e40af;font-weight:700}
.matrix-table tr.tier-c td:first-child{background:#f1f5f9;color:#64748b;font-weight:700}
.matrix-table tr.tier-a td{background:#fffbeb30}
.matrix-table tr.tier-b td{background:#eff6ff30}
.matrix-table tr.tier-c td{background:#f8fafc30}
/* ===== Cell layout: 入力 + 原案 + 保存ボタン ===== */
.matrix-table td{padding:3px;vertical-align:top}
.cell-wrap{display:flex;flex-direction:column;gap:2px;align-items:stretch}
.cell-input-row{display:flex;gap:2px;align-items:center}
.matrix-table input{flex:1;min-width:0;padding:5px 5px;border:1px solid #d1d5db;border-radius:3px;text-align:right;font-family:"Menlo",monospace;font-size:10pt;background:#fff}
.matrix-table input.special{background:#fef3c7;color:#92400e;font-weight:700;border-color:#fbbf24}
.matrix-table input.zero{background:#fee2e2;color:#dc2626}
.matrix-table input.dirty{background:#fef9c3;color:#854d0e;border:2px solid #fbbf24;font-weight:800}
.matrix-table input.saved{background:#dcfce7;color:#15803d;border:2px solid #22c55e;font-weight:800}
.cell-save{background:#16a34a;color:#fff;border:none;width:28px;height:28px;border-radius:4px;font-size:11pt;cursor:pointer;display:none;flex-shrink:0;line-height:1;padding:0;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.cell-save:hover{background:#15803d;transform:scale(1.08)}
.cell-save.show{display:inline-flex;align-items:center;justify-content:center;animation:pulseHi .6s 1}
@keyframes pulseHi{0%{transform:scale(.5)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.cell-info{display:flex;justify-content:space-between;align-items:center;gap:3px;font-size:7.5pt;font-family:"Menlo",monospace;color:#9ca3af;min-height:14px}
.cell-info .orig-label{font-weight:400}
.cell-info .orig-val{font-weight:700;color:#6b7280}
.cell-info.diff .orig-val{color:#dc2626}
.cell-info .reset-btn{background:none;color:#6b7280;border:none;padding:0 3px;font-size:9pt;cursor:pointer;font-family:inherit;line-height:1;display:none}
.cell-info.diff .reset-btn{display:inline;color:#dc2626;font-weight:700}
.cell-info .reset-btn:hover{background:#fee2e2;border-radius:3px}

/* Dirty indicator on month tab */
.month-tab.dirty{box-shadow:0 0 0 2px #f59e0b}
.month-tab.dirty::after{content:'●';color:#f59e0b;font-size:10pt;margin-left:2px;line-height:1}
.month-tab.active.dirty{box-shadow:0 0 0 2px #fbbf24}

.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#16a34a;color:#fff;padding:10px 22px;border-radius:8px;font-weight:700;font-size:11pt;box-shadow:0 4px 12px rgba(22,163,74,.4);opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.warn{background:#f59e0b}
.toast.error{background:#dc2626}

/* ===== Footer actions ===== */
.footer-actions{background:#fff;border-radius:12px;padding:14px;box-shadow:0 -2px 12px rgba(0,0,0,.08);margin-top:14px;position:sticky;bottom:8px;border:2px solid #dbeafe;display:flex;flex-direction:column;gap:8px}
.btn-import{background:linear-gradient(135deg,#1e40af,#2563eb);color:#fff;border:none;padding:14px;border-radius:10px;font-size:13pt;font-weight:800;cursor:pointer;letter-spacing:.05em}
.btn-import:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.4)}
#log{font-family:"Menlo",monospace;font-size:9.5pt;background:#0f172a;color:#e2e8f0;border-radius:8px;padding:10px;max-height:200px;overflow-y:auto;display:none;line-height:1.6}
.success{color:#10b981;font-weight:700}
.warning{color:#fbbf24}
.error{color:#f87171}

/* ===== Notice ===== */
.notice{background:#fef3c7;border-left:4px solid #f59e0b;padding:8px 12px;font-size:10.5pt;color:#92400e;border-radius:6px;line-height:1.6;margin-bottom:10px}

.tier-legend{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;font-size:9pt;align-items:center}
.tier-legend .item{padding:2px 8px;border-radius:4px;font-weight:600}
.lg-a{background:#fee2e2;color:#dc2626}
.lg-b{background:#dbeafe;color:#1e40af}
.lg-c{background:#f1f5f9;color:#64748b}
.lg-x{background:#fef3c7;color:#92400e}
.lg-0{background:#fee2e2;color:#dc2626;border:1px dashed #dc2626}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="sub">B U D D I C A &nbsp; T O U R I N G &nbsp; 高松店</div>
    <h1>💰 価格インポート確認</h1>
  </div>
  <div class="actions">
    <a class="act-btn" href="./pricing.html">← pricing.html</a>
  </div>
</div>

<div class="container">

  <div class="notice">⚠️ 実行前に必ず <a href="./pricing.html" target="_blank" style="color:#92400e;font-weight:700">pricing.html</a> を一度開いてください（初期データ作成のため）</div>

  <div class="tier-legend">
    <span>凡例:</span>
    <span class="item lg-a">A 繁忙</span>
    <span class="item lg-b">B 通常</span>
    <span class="item lg-c">C 閑散</span>
    <span class="item lg-x">★ 特別期間（お盆/年末年始）</span>
    <span class="item lg-0">¥0（リセット予定）</span>
  </div>

  <div class="year-tabs" id="year-tabs"></div>
  <div class="month-tabs" id="month-tabs"></div>
  <div id="matrix-area"></div>

  <div class="footer-actions">
    <button class="btn-import" onclick="doImport()">🚀 この価格表で localStorage に反映する</button>
    <div style="display:flex;gap:6px">
      <button class="act-btn" style="background:#f1f5f9;color:#475569;flex:1" onclick="verifyStorage()">🔍 localStorage 検証</button>
      <a class="act-btn" style="background:#dcfce7;color:#15803d;flex:1;text-align:center" href="./pricing.html" target="_blank">📅 pricing.html を新規タブで開く</a>
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'bt_takamatsu_seasonal_v6';
const CLASSES = ['A','B','C','H','S','F'];
const CLASS_NAMES = {A:'高級系MV',B:'一般MV',C:'コンパクトSUV',H:'セダン',S:'SUV',F:'コンパクト'};
const TIERS = [['A','繁忙','#dc2626','#fee2e2'],['B','通常','#1e40af','#dbeafe'],['C','閑散','#64748b','#f1f5f9']];
const COEF_A = 1.50, COEF_C = 0.80;

// ===== 価格提案（2026/7-12）=====
const PROPOSAL = {
  '2026-07': { B:{A:17000,B:14500,C:11500,S:11500,F:6500,H:10500}, A:null, special:null },
  '2026-08': { B:{A:17500,B:16500,C:11500,S:11500,F:6500,H:12500}, A:{A:22000,B:21500,C:21500,S:21500,F:8500,H:15500}, special:'お盆（8/12-14）' },
  '2026-09': { B:{A:17000,B:13000,C:13000,S:13000,F:6500,H:10500}, A:null, special:null },
  '2026-10': { B:{A:17000,B:16500,C:13000,S:13000,F:7000,H:11500}, A:null, special:null },
  '2026-11': { B:{A:16000,B:15500,C:13000,S:13000,F:6500,H:11500}, A:null, special:null },
  '2026-12': { B:{A:13500,B:15500,C:13000,S:13000,F:6000,H:10500}, A:{A:20000,B:21000,C:14500,S:14500,F:9000,H:15500}, special:'年末年始（12/28-1/3）' },
};

// ===== 内部状態（編集可）=====
const editState = {}; // {ym: {A:{cls:price}, B:{...}, C:{...}, special:bool}}
const originalState = {}; // 原案（提案資料の値・絶対不変）
const savedState = {}; // localStorage に書込み済の値（差分計算用）

function buildInitial(){
  // 2026/1-6 = 空（インポート時は触らない）
  for(let m = 1; m <= 6; m++){
    const ym = '2026-' + String(m).padStart(2,'0');
    editState[ym] = { skip: true };
    originalState[ym] = { skip: true };
  }
  // 2026/7-12 = 提案価格
  Object.entries(PROPOSAL).forEach(([ym, data]) => {
    const A = {}, B = {...data.B}, C = {};
    CLASSES.forEach(c => {
      A[c] = data.A ? data.A[c] : Math.round(data.B[c] * COEF_A);
      C[c] = Math.round(data.B[c] * COEF_C);
    });
    editState[ym] = { A, B, C, special: !!data.A, specialLabel: data.special };
    // 原案（ディープコピー）
    originalState[ym] = { A:{...A}, B:{...B}, C:{...C}, special:!!data.A, specialLabel:data.special };
  });
  // 2027 全12月 = 0
  for(let m = 1; m <= 12; m++){
    const ym = '2027-' + String(m).padStart(2,'0');
    const A = {}, B = {}, C = {};
    CLASSES.forEach(c => { A[c] = 0; B[c] = 0; C[c] = 0; });
    editState[ym] = { A, B, C, special: false, reset: true };
    originalState[ym] = { A:{...A}, B:{...B}, C:{...C}, special:false, reset:true };
  }
}

let curYear = 2026, curMonth = 7;
function curKey(){ return curYear + '-' + String(curMonth).padStart(2,'0'); }

function renderYearTabs(){
  const el = document.getElementById('year-tabs');
  el.innerHTML = [2026, 2027].map(y => `<button class="year-tab ${y===curYear?'active':''}" onclick="selYear(${y})">${y}年</button>`).join('');
}
function selYear(y){ curYear = y; curMonth = (y === 2026 ? 7 : 1); renderAll(); }

function isMonthDirty(ym){
  const cur = editState[ym], orig = originalState[ym];
  if(!cur || cur.skip || !orig) return false;
  return ['A','B','C'].some(t => cur[t] && CLASSES.some(c => (cur[t][c]||0) !== (orig[t]?.[c]||0)));
}

function renderMonthTabs(){
  const el = document.getElementById('month-tabs');
  let html = '';
  for(let m = 1; m <= 12; m++){
    const ym = curYear + '-' + String(m).padStart(2,'0');
    const s = editState[ym] || {};
    const skip = s.skip;
    const reset = s.reset;
    const sp = s.special;
    const summary = skip ? '触らない' : (reset ? 'リセット' : (s.B ? 'A' + Math.round(s.A.A/1000) + '/B' + Math.round(s.B.A/1000) + '/C' + Math.round(s.C.A/1000) : ''));
    const cls = curMonth === m ? 'active' : '';
    const sclass = reset ? 'zero' : (sp ? 'special' : '');
    const dclass = isMonthDirty(ym) ? 'dirty' : '';
    html += `<button class="month-tab ${cls} ${sclass} ${dclass}" onclick="selMonth(${m})">
      <span class="num">${m}月</span>
      <span class="sub">${summary}</span>
    </button>`;
  }
  el.innerHTML = html;
}
function selMonth(m){ curMonth = m; renderAll(); }

function showToast(msg, type){
  let t = document.getElementById('toast');
  if(!t){ t = document.createElement('div'); t.id = 'toast'; t.className = 'toast'; document.body.appendChild(t); }
  t.className = 'toast' + (type ? ' ' + type : '');
  t.textContent = msg;
  setTimeout(()=>t.classList.add('show'),10);
  clearTimeout(t._t);
  t._t = setTimeout(()=>t.classList.remove('show'), 2500);
}

function renderMatrix(){
  const area = document.getElementById('matrix-area');
  const ym = curKey();
  const s = editState[ym] || {};

  if(s.skip){
    area.innerHTML = `<div class="matrix-card" style="text-align:center;padding:40px 20px;color:#64748b">
      <div style="font-size:18pt;margin-bottom:10px">📅 ${ym}</div>
      <div style="font-size:11pt;font-weight:700;color:#1e3a8a">既存値そのまま（触りません）</div>
      <div style="font-size:9.5pt;margin-top:6px">提案資料に無いためインポート対象外</div>
    </div>`;
    return;
  }

  let html = `<div class="matrix-card">
    <div class="matrix-head">
      <div class="ttl">💰 ${curYear}年${curMonth}月 の価格</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap">`;
  if(s.reset){
    html += `<span class="tag reset">🗑️ 全0リセット</span>`;
  }else if(s.special){
    html += `<span class="tag special">★ 特別期間: ${s.specialLabel}</span>`;
  }else{
    html += `<span class="tag">通常運用月（A繁忙=自動係数×1.5）</span>`;
  }
  html += `<button class="applyall" onclick="copyToAllMonths()">📋 この月を全月に適用</button></div></div>`;

  html += `<table class="matrix-table">
    <thead>
      <tr>
        <th class="head">ティア＼クラス</th>
        ${CLASSES.map(c => `<th class="col-head">
          <span class="typ">タイプ${c}</span>
          <span class="cls">${CLASS_NAMES[c]}</span>
        </th>`).join('')}
      </tr>
    </thead>
    <tbody>`;

  const orig = originalState[ym] || {};
  TIERS.forEach(([tk, label]) => {
    html += `<tr class="tier-${tk.toLowerCase()}">`;
    html += `<td>${tk} ${label}</td>`;
    CLASSES.forEach(c => {
      const v = s[tk] ? s[tk][c] : 0;
      const origV = orig[tk] ? (orig[tk][c]||0) : 0;
      const isSpecial = s.special && tk === 'A';
      const isZero = v === 0;
      const isDirty = v !== origV;
      const inputCls = (isDirty ? 'dirty' : (isSpecial ? 'special' : (isZero ? 'zero' : '')));
      const diffCls = isDirty ? 'diff' : '';
      html += `<td>
        <div class="cell-wrap">
          <div class="cell-input-row">
            <input type="number" class="${inputCls}" value="${v}" id="cell-${ym}-${tk}-${c}" data-ym="${ym}" data-tier="${tk}" data-cls="${c}" oninput="updateCell(this)" onchange="updateCell(this)" min="0" step="100">
            <button class="cell-save ${isDirty?'show':''}" onclick="saveCell('${ym}','${tk}','${c}')" title="このセルだけ localStorage に保存">💾</button>
          </div>
          <div class="cell-info ${diffCls}" id="info-${ym}-${tk}-${c}">
            <span class="orig-label">原案 <span class="orig-val">¥${origV.toLocaleString()}</span></span>
            <button class="reset-btn" onclick="resetCell('${ym}','${tk}','${c}')" title="原案に戻す">↺ 戻す</button>
          </div>
        </div>
      </td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  area.innerHTML = html;
}

function updateCell(input){
  const ym = input.dataset.ym;
  const tier = input.dataset.tier;
  const cls = input.dataset.cls;
  const v = parseInt(input.value) || 0;
  if(!editState[ym]) return;
  editState[ym][tier][cls] = v;
  // 該当セルの dirty 表示を即時更新
  const orig = originalState[ym]?.[tier]?.[cls] || 0;
  const isDirty = v !== orig;
  const info = document.getElementById('info-' + ym + '-' + tier + '-' + cls);
  const saveBtn = input.parentElement.querySelector('.cell-save');
  if(isDirty){
    input.classList.add('dirty');
    input.classList.remove('saved','special','zero');
    info?.classList.add('diff');
    saveBtn?.classList.add('show');
  }else{
    input.classList.remove('dirty');
    info?.classList.remove('diff');
    saveBtn?.classList.remove('show');
  }
  renderMonthTabs();
}

function resetCell(ym, tier, cls){
  const v = originalState[ym]?.[tier]?.[cls] || 0;
  editState[ym][tier][cls] = v;
  const inp = document.getElementById('cell-' + ym + '-' + tier + '-' + cls);
  if(inp){ inp.value = v; updateCell(inp); }
  showToast('↺ 原案に戻しました（¥' + v.toLocaleString() + '）','warn');
}

// セル単位で localStorage に保存
function saveCell(ym, tier, cls){
  const v = editState[ym]?.[tier]?.[cls];
  if(v == null){ showToast('保存失敗（データなし）','error'); return; }

  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ showToast('pricing.html を一度開いてください','error'); return; }
  let state;
  try{ state = JSON.parse(raw); }catch(e){ showToast('JSON解析失敗','error'); return; }
  if(!state.segments?.proper){ showToast('プロパーセグメントなし','error'); return; }

  // pricing.html の ymKey は non-padded（"2026-8"）
  const [y, m] = ym.split('-');
  const key = y + '-' + parseInt(m, 10);

  // 既存の padded key 残骸クリア
  const proper = state.segments.proper;
  if(!proper.monthlyTierClassPrices) proper.monthlyTierClassPrices = {};
  if(!state.monthlyTierClassPrices) state.monthlyTierClassPrices = {};
  if(proper.monthlyTierClassPrices[ym]) delete proper.monthlyTierClassPrices[ym];
  if(state.monthlyTierClassPrices[ym]) delete state.monthlyTierClassPrices[ym];

  // 該当セルのみ更新
  if(!proper.monthlyTierClassPrices[key]) proper.monthlyTierClassPrices[key] = {A:{},B:{},C:{}};
  if(!proper.monthlyTierClassPrices[key][tier]) proper.monthlyTierClassPrices[key][tier] = {};
  proper.monthlyTierClassPrices[key][tier][cls] = v;
  // top-level も同期
  if(!state.monthlyTierClassPrices[key]) state.monthlyTierClassPrices[key] = {A:{},B:{},C:{}};
  if(!state.monthlyTierClassPrices[key][tier]) state.monthlyTierClassPrices[key][tier] = {};
  state.monthlyTierClassPrices[key][tier][cls] = v;

  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

  // 視覚フィードバック
  const inp = document.getElementById('cell-' + ym + '-' + tier + '-' + cls);
  if(inp){
    inp.classList.remove('dirty');
    inp.classList.add('saved');
    setTimeout(()=>inp.classList.remove('saved'), 1200);
    const saveBtn = inp.parentElement.querySelector('.cell-save');
    saveBtn?.classList.remove('show');
  }
  showToast('💾 ' + key + ' / ' + tier + tier2Label(tier) + ' / タイプ' + cls + ' = ¥' + v.toLocaleString() + ' を保存');
}

function tier2Label(t){return t==='A'?'繁忙':t==='B'?'通常':'閑散';}

function copyToAllMonths(){
  const ym = curKey();
  const s = editState[ym];
  if(!s || s.skip || s.reset){ alert('この月はコピー元にできません'); return; }
  if(!confirm(`${curYear}年${curMonth}月 の価格を ${curYear}年 全月（インポート対象月のみ）に適用します。OK？`)) return;
  for(let m = 1; m <= 12; m++){
    const ym2 = curYear + '-' + String(m).padStart(2,'0');
    const s2 = editState[ym2];
    if(!s2 || s2.skip || s2.reset) continue;
    if(ym2 === ym) continue;
    s2.A = {...s.A}; s2.B = {...s.B}; s2.C = {...s.C};
  }
  renderAll();
}

function renderAll(){
  renderYearTabs();
  renderMonthTabs();
  renderMatrix();
}

function log(msg, cls){
  const logEl = document.getElementById('log');
  logEl.style.display = 'block';
  const line = document.createElement('div');
  if(cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function doImport(){
  const logEl = document.getElementById('log');
  logEl.innerHTML = '';
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ alert('❌ pricing.html を一度開いてから実行してください'); return; }
  if(!confirm('上記の価格表で localStorage に書き込みます。\n\nOKで実行しますか？')) return;

  let state;
  try{ state = JSON.parse(raw); }catch(e){ alert('❌ JSON失敗'); return; }
  if(!state.segments?.proper){ alert('❌ プロパーセグメントが見つかりません'); return; }

  const proper = state.segments.proper;
  if(!proper.monthlyTierClassPrices) proper.monthlyTierClassPrices = {};
  const tcp = proper.monthlyTierClassPrices;
  // ★ top-level state.monthlyTierClassPrices にも書く（segment selection時の参照）
  if(!state.monthlyTierClassPrices) state.monthlyTierClassPrices = {};
  const tcp2 = state.monthlyTierClassPrices;

  // ★ basePrices と tierClassPrices も更新（fallback値として）
  if(!proper.tierClassPrices) proper.tierClassPrices = {A:{},B:{},C:{}};
  if(!state.tierClassPrices) state.tierClassPrices = {A:{},B:{},C:{}};

  log('===== インポート開始 =====', 'success');
  let inputCnt = 0, resetCnt = 0, skipCnt = 0;
  // ★ pricing.html の ymKey(y,m) は `${y}-${m}` でゼロパディングなし
  //   なので "2026-08" → "2026-8" に変換して書き込む
  const toUnpaddedYm = (ym) => {
    const [y, m] = ym.split('-');
    return y + '-' + parseInt(m, 10);
  };
  // 既存の padded key 残骸を一旦クリア（"2026-08" 等を削除）
  Object.keys(tcp).forEach(k => { if(/^\d{4}-0\d$/.test(k) || /^\d{4}-1[0-2]$/.test(k)) delete tcp[k]; });
  Object.keys(tcp2).forEach(k => { if(/^\d{4}-0\d$/.test(k) || /^\d{4}-1[0-2]$/.test(k)) delete tcp2[k]; });
  Object.entries(editState).forEach(([ym, s]) => {
    if(s.skip){ skipCnt++; return; }
    const data = { A:{...s.A}, B:{...s.B}, C:{...s.C} };
    const key = toUnpaddedYm(ym);  // ★ "2026-08" → "2026-8"
    tcp[key] = data;
    tcp2[key] = data;  // ★ 2箇所書き込み（race condition対策）
    if(s.reset){
      resetCnt++;
      log('  🗑️ ' + key + ' 全0リセット');
    }else{
      inputCnt++;
      log('  ✓ ' + key + (s.special?' ★':'') + ' B Aクラス=¥' + (s.B.A||0).toLocaleString());
    }
  });
  log('価格入力: ' + inputCnt + 'ヶ月 / 0リセット: ' + resetCnt + 'ヶ月 / 触らず: ' + skipCnt + 'ヶ月', 'success');

  // ★ 2026-07 の B通常 を年間tierClassPrices として設定（fallback値・全月共通価格）
  const jul = editState['2026-07'];
  if(jul && !jul.skip){
    ['A','B','C'].forEach(t => {
      proper.tierClassPrices[t] = {...jul[t]};
      state.tierClassPrices[t] = {...jul[t]};
    });
  }
  proper.basePrices = {...PROPOSAL['2026-07'].B};
  state.basePrices = {...PROPOSAL['2026-07'].B};
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  log('localStorage 書き込み完了', 'success');

  // ★ 即時検証（2箇所、non-padded key で確認）
  const verifyRaw = localStorage.getItem(STORAGE_KEY);
  const verifyState = JSON.parse(verifyRaw);
  const v1jul = verifyState?.segments?.proper?.monthlyTierClassPrices?.['2026-7']?.B?.A;
  const v2jul = verifyState?.monthlyTierClassPrices?.['2026-7']?.B?.A;
  const v1aug = verifyState?.segments?.proper?.monthlyTierClassPrices?.['2026-8']?.A?.A;
  const v2aug = verifyState?.monthlyTierClassPrices?.['2026-8']?.A?.A;
  if(v1jul === 17000 && v2jul === 17000 && v1aug === 22000 && v2aug === 22000){
    log('✅ 検証OK: 2026-7 B Aクラス=¥17,000 / 2026-8 A Aクラス=¥22,000', 'success');
  }else{
    log('⚠ 検証: 7月 segments=¥' + (v1jul||0) + ' top=¥' + (v2jul||0) + ' / 8月 segments=¥' + (v1aug||0) + ' top=¥' + (v2aug||0), 'warning');
  }

  log('', '');
  log('▼ 確認手順', 'warning');
  log('1. このタブはそのまま', 'warning');
  log('2. pricing.html を【新しいタブ】で開く（既存タブは閉じる）', 'warning');
  log('3. プロパー ボタンをクリック', 'warning');
  log('4. 7月タブ → カレンダーに価格が表示される', 'warning');

  alert('✅ インポート完了\n\n' +
        '価格入力: ' + inputCnt + 'ヶ月（2026/7-12月）\n' +
        '0リセット: ' + resetCnt + 'ヶ月（2027年）\n' +
        '触らず: ' + skipCnt + 'ヶ月（2026/1-6月）\n\n' +
        '【重要】 pricing.html を必ず新しいタブで開いてください\n' +
        '（既に開いているタブは閉じてから再オープン）');
}

function verifyStorage(){
  const logEl = document.getElementById('log');
  logEl.innerHTML = '';
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw){ log('❌ localStorage に保存値なし', 'error'); return; }
  try{
    const state = JSON.parse(raw);
    const tcp = state?.segments?.proper?.monthlyTierClassPrices;
    if(!tcp){ log('❌ proper.monthlyTierClassPrices が見つかりません', 'error'); return; }
    log('===== 現在のlocalStorage（proper.monthlyTierClassPrices）=====', 'success');
    log('保存月数: ' + Object.keys(tcp).length);
    log('★ pricing.html は ymKey=`2026-8` 形式（ゼロパディングなし）で読みます', 'warning');
    // non-padded と padded 両方サンプル確認
    const samples = ['2026-7','2026-8','2026-12','2027-1','2026-07','2026-08'];
    samples.forEach(ym => {
      const v = tcp[ym];
      if(!v){ log('  ' + ym + ' : 未設定', 'warning'); return; }
      log('  ' + ym + ' A=' + (v.A?.A||0) + ' / B=' + (v.B?.A||0) + ' / C=' + (v.C?.A||0) + '（Aクラス）');
    });
    log('');
    log('▼ 全キー一覧 ▼');
    log(Object.keys(tcp).sort().join(', '));
    log('');
    log('▼ 全データ JSON ▼');
    log(JSON.stringify(tcp, null, 2));
  }catch(e){
    log('❌ パースエラー: ' + e.message, 'error');
  }
}

// 初期化
buildInitial();
renderAll();
