async function loadMonthlyFleet(){
 const cfg=FLEET_CFG[STORE];const sd=cfg.sd,ed=cfg.ed;
 try{
  await ensureAuth();
  const [vehicles,kpis,reservations,fleetRows,maintenanceRows]=await Promise.all([
   sbRows(cfg.v,'code,type,active'),
   sbRows(cfg.k,'year_month,vehicle_code,active'),
   sbRows(cfg.r,'id,'+sd+','+ed+',status'),
   sbRows(cfg.f,'reservation_id,vehicle_code'),
   sbRows(cfg.m,'id,vehicle_code,start_date,end_date')
  ]);
  if(!vehicles.length)throw new Error(STORE_LABEL[STORE]+'の車両データが0件です');
  const monthKeys=Object.keys(CAL);
  const kpiByMonth={};kpis.forEach(k=>{if(!kpiByMonth[k.year_month])kpiByMonth[k.year_month]={};kpiByMonth[k.year_month][k.vehicle_code]=k.active;});
  const fleetByReservation={};fleetRows.forEach(f=>fleetByReservation[f.reservation_id]=f.vehicle_code);
  const activeReservations=reservations.filter(r=>!isCancelled(r.status)&&r[sd]&&r[ed]&&fleetByReservation[r.id]);
  for(const mo of monthKeys){
   const flags=kpiByMonth[mo]||{};
   const activeVehicles=vehicles.filter(v=>v.active!==false&&flags[v.code]!==false);
   const activeCodes=new Set(activeVehicles.map(v=>v.code));
   const byClass={};activeVehicles.forEach(v=>{const c=v.type||'未設定';(byClass[c]=byClass[c]||[]).push(v.code);});
   const C=CAL[mo];
   for(let d=1;d<=C.ndays;d++){
    const ds=`${mo}-${String(d).padStart(2,'0')}`;
    const occupied=new Set();
    activeReservations.forEach(r=>{const code=fleetByReservation[r.id];if(activeCodes.has(code)&&r[sd]<=ds&&ds<=r[ed])occupied.add(code);});
    const maintained=new Set();
    maintenanceRows.forEach(m=>{if(activeCodes.has(m.vehicle_code)&&m.start_date&&m.end_date&&m.start_date<=ds&&ds<=m.end_date&&!occupied.has(m.vehicle_code))maintained.add(m.vehicle_code);});
    const nextBooked=new Set();const tomorrow=nextDateStr(ds);
    activeReservations.forEach(r=>{const code=fleetByReservation[r.id];if(activeCodes.has(code)&&r[sd]===tomorrow&&!occupied.has(code)&&!maintained.has(code))nextBooked.add(code);});
    maintenanceRows.forEach(m=>{if(activeCodes.has(m.vehicle_code)&&m.start_date===tomorrow&&!occupied.has(m.vehicle_code)&&!maintained.has(m.vehicle_code))nextBooked.add(m.vehicle_code);});
    const classRows={};
    Object.keys(byClass).forEach(c=>{const codes=byClass[c];const out=codes.filter(code=>occupied.has(code)).length;const maint=codes.filter(code=>maintained.has(code)).length;const next=codes.filter(code=>nextBooked.has(code)).length;classRows[c]={fleet:codes.length,out,maint,next,avail:codes.length-out-maint-next};});
    DAYCLS[ds]=classRows;
    const total=activeVehicles.length;const out=occupied.size;const maint=maintained.size;const next=nextBooked.size;
    DAYTOT[ds]={...(DAYTOT[ds]||{}),fleet:total,out,maint,next,avail:total-out-maint-next,u:total?Math.round(out/total*100):null};
   }
  }
  document.getElementById('fleetSummary').textContent=STORE_LABEL[STORE]+'・空き=月次稼働対象−貸出中−メンテ中−翌日予約';
  render();
 }catch(e){console.error('[monthly fleet]',e);document.getElementById('fleetSummary').textContent=STORE_LABEL[STORE]+'・月次稼働フラグ取得失敗（固定データ表示中）';render();}
}

  var cellsByDate={};Object.keys(byDate).forEach(function(td){var out={};Object.keys(byDate[td]).forEach(function(c){var a=byDate[td][c];var mt={};T.forEach(function(n){mt[n]=_med(a.t[n]);});out[c]={t:mt,otas:Object.keys(a.otas),names:Object.keys(a.names),per:a.per};});cellsByDate[td]=out;});
