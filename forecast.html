// ==================== 定数 (FORMULA v1.2 / VARIABLES v1.4 同期) ====================

      7:1500000,8:2000000,9:1500000,10:1500000,11:1000000,12:1000000}

const HOLIDAY_BLOCKS=[
  {start:'2025-12-28',end:'2026-01-04',cat:'large',label:'年末年始',boost:0.30},

];

// BT 高単価クラス (AA/A/B/S) ※ BT クラス: AA/A/B/C/S/H/F
const PREMIUM_CLASSES={bt:['AA','A','B','S']};

// 年平均ティア係数 (BT は同じパターンを採用)
const YEAR_AVG_CBASE={bt:1.108};

// ==================== ヘルパー ====================
const fmtY=n=>n==null?'-':'¥'+Math.round(n).toLocaleString();
const fmtK=n=>n==null?'-':'¥'+Math.round(n/10000).toLocaleString()+'万';
const fmtP=n=>n==null?'-':(n*100).toFixed(1)+'%';
const parseYmd=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const ymdStr=d=>d.toISOString().slice(0,10);
const monthDays=(y,m)=>new Date(y,m,0).getDate();
const monthEnd=(y,m)=>new Date(y,m-1,monthDays(y,m));
const daysOverlap=(bs,be,ms,me)=>{const s=bs>ms?bs:ms;const e=be<me?be:me;if(e<s)return 0;return Math.round((e-s)/86400000)+1;};

// 全件ページネーション
async function fetchAll(table,opts={}){
  let all=[],offset=0;const lim=1000;
  while(true){
    let q=sb.from(table).select(opts.select||'*');
    if(opts.order)q=q.order(opts.order,{ascending:true});
    if(opts.filters)opts.filters.forEach(f=>{q=q[f[0]](f[1],f[2]);});
    q=q.range(offset,offset+lim-1);
    const{data,error}=await q;
    if(error)throw error;
    if(!data||data.length===0)break;
    all=all.concat(data);
    if(data.length<lim)break;
    offset+=lim;
  }
  return all;
}

// ==================== コアロジック ====================
function normStatus(s){
  if(!s)return 'confirmed';
  s=String(s).toLowerCase();
  if(s.includes('cancel')||s.includes('キャンセル'))return 'cancelled';
  return 'confirmed';
}

function revOf(r){
  const bp=r.base_price||0,op=r.option_price||0,disc=r.discount||0,price=r.price||0;
  if(bp===0&&op===0)return price-disc;
  return bp+op-disc;
}

function calcHolidayBoost(execDate,year,month){
  const mStart=new Date(year,month-1,1);
  const mEnd=monthEnd(year,month);
  let total=0,maxT=0;
  const breakdown=[];
  HOLIDAY_BLOCKS.forEach(b=>{
    const bs=parseYmd(b.start),be=parseYmd(b.end);
    const dInM=daysOverlap(bs,be,mStart,mEnd);
    if(!dInM)return;
    const dTotal=Math.round((be-bs)/86400000)+1;
    const futureStart=new Date(Math.max(bs.getTime(),execDate.getTime()+86400000));
    const dFuture=daysOverlap(futureStart,be,mStart,mEnd);
    const blockMax=b.boost*(dInM/dTotal);
    maxT+=blockMax;
    const blockNow=blockMax*(dInM>0?dFuture/dInM:0);
    total+=blockNow;
    breakdown.push({label:b.label,cat:b.cat,start:b.start,end:b.end,dInM,dTotal,dFuture,maxBoost:blockMax,remainingBoost:blockNow});
  });
  return{max:maxT,remaining:total,breakdown};
}

// ==================== データ集計 ====================
async function loadData(store){
  await ensureAuth();
  // BT専用テーブル (bt_プレフィックス)
  const tResv='bt_reservations';
  const tAcct='bt_accounting';
  const tVeh='bt_vehicles';
  const tKpi='bt_vehicle_monthly_kpi';
  const [resv,acct,veh,kpi]=await Promise.all([
    fetchAll(tResv,{order:'id'}),
    fetchAll(tAcct,{order:'id'}),
    fetchAll(tVeh,{order:'code'}),
    fetchAll(tKpi,{order:'vehicle_code'})
  ]);
  return{resv,acct,veh,kpi};
}

function aggregateMonthly(resv,store){
  const endCol=store==='nha'?'end_date':'return_date';
  const startCol=store==='nha'?'start_date':'lend_date';
  const byM={};
  resv.forEach(r=>{
    if(normStatus(r.status)==='cancelled')return;
    const ed=(r[endCol]||'').slice(0,10);
    if(!ed||!ed.startsWith('2026'))return;
    const ym=ed.slice(0,7);
    if(!byM[ym])byM[ym]={cnt:0,sub:0,cm:0,cmSub:0,leads:[],byCls:{},byOta:{},nights:0};
    const sub=revOf(r);
    byM[ym].cnt++;byM[ym].sub+=sub;
    const created=(r.created_at||'').slice(0,10);
    if(created&&created.slice(0,7)===ym){byM[ym].cm++;byM[ym].cmSub+=sub;}
    const cls=(r.vehicle_class||'').trim()||'?';
    const ota=(r.ota||'').trim()||'?';
    if(!byM[ym].byCls[cls])byM[ym].byCls[cls]={cnt:0,sub:0};
    byM[ym].byCls[cls].cnt++;byM[ym].byCls[cls].sub+=sub;
    if(!byM[ym].byOta[ota])byM[ym].byOta[ota]={cnt:0,sub:0};
    byM[ym].byOta[ota].cnt++;byM[ym].byOta[ota].sub+=sub;
    const sd=(r[startCol]||'').slice(0,10);
    if(created&&sd){
      try{const lt=Math.round((parseYmd(sd)-parseYmd(created))/86400000);if(lt>=0)byM[ym].leads.push(lt);}catch(e){}
      const nights=Math.max(1,Math.round((parseYmd(ed)-parseYmd(sd))/86400000));
      byM[ym].nights+=nights;
    }
  });
  return byM;
}

function snapshotAt(resv,store,targetYm,cutoffStr){
  const endCol=store==='nha'?'end_date':'return_date';
  let cnt=0,sub=0,cm=0;
  resv.forEach(r=>{
    if(normStatus(r.status)==='cancelled')return;
    const ed=(r[endCol]||'').slice(0,10);
    if(ed.slice(0,7)!==targetYm)return;
    const created=(r.created_at||'').slice(0,10);
    if(!created||created>cutoffStr)return;
    cnt++;sub+=revOf(r);
    if(created.slice(0,7)===targetYm)cm++;
  });
  return{cnt,sub,cm};
}

function extraMonthly(acct){
  const byM={};
  acct.forEach(a=>{
    if(a.type!=='extra_sales')return;
    const ym=(a.date||'').slice(0,7);
    if(!ym)return;
    byM[ym]=(byM[ym]||0)+(a.amount||0);
  });
  return byM;
}

// ==================== 4手法 ====================
function method1Target(store,year,month,execDate){
  const R_base=MONTHLY_TARGETS[store]?.[month]||0;
  if(!R_base)return null;
  const h=calcHolidayBoost(execDate,year,month);
  return{name:'M1: ターゲット+季節',value:Math.round(R_base*(1+h.remaining)),detail:{R_base,boost_remaining:h.remaining,boost_max:h.max}};
}

function method2Linear(byM,extraByM,store,year,month,execDate){
  // 旧M2線形外挿は created_at の不安定さで暴走 (APP導入時のデータ一括取込問題)
  // 新M2: 「現状予約ベース」= 既予約済の合計 (返却済 + 未返却の双方)
  const ym=`${year}-${String(month).padStart(2,'0')}`;
  const m=byM[ym]||{sub:0,cnt:0};
  const extra=extraByM[ym]||0;
  const cur=m.sub+extra;
  const mEnd=monthEnd(year,month);
  const mStart=new Date(year,month-1,1);
  let phase='current';
  if(execDate<mStart)phase='future';
  else if(execDate>mEnd)phase='past';
  const labelMap={past:'M2: 過去実績',current:'M2: 既予約済み',future:'M2: 既予約済み(将来)'};
  return{name:labelMap[phase],value:Math.round(cur),detail:{booked:cur,cnt:m.cnt,phase,note:'返却済+未返却の合計 (線形外挿は廃止)'}};
}

function method3Pattern(resv,byM,extraByM,store,year,month,execDate){
  const targetYm=`${year}-${String(month).padStart(2,'0')}`;
  const basis=ymdStr(execDate);
  const basisMonth=basis.slice(0,7);
  const mEnd=monthEnd(year,month);
  const daysLeft=Math.max(0,Math.round((mEnd-execDate)/86400000));

  // 過去月リスト
  const past=[];
  let[y,m]=PERIOD_START[store].split('-').map(Number);
  while(`${y}-${String(m).padStart(2,'0')}`<targetYm){
    past.push(`${y}-${String(m).padStart(2,'0')}`);
    m++;if(m>12){m=1;y++;}
  }
  const history=past.filter(pm=>byM[pm]&&byM[pm].cnt>0).map(pm=>({pm,final:byM[pm]}));
  if(history.length===0)return null;

  const cur=snapshotAt(resv,store,targetYm,basis);
  const extraAvg=Object.values(extraByM).slice(-3).reduce((s,v)=>s+v,0)/Math.max(1,Math.min(3,Object.keys(extraByM).length));

  if(targetYm===basisMonth){
    // 当月モデル: 同タイミング追加分
    const adds=[];
    history.forEach(({pm,final})=>{
      const[py,pmnum]=pm.split('-').map(Number);
      const pEnd=monthEnd(py,pmnum);
      const pBasis=ymdStr(new Date(pEnd.getTime()-daysLeft*86400000));
      const sp=snapshotAt(resv,store,pm,pBasis);
      if(sp.cnt<5)return;
      adds.push(Math.max(0,final.sub-sp.sub));
    });
    if(adds.length===0)return null;
    const avgAdd=adds.reduce((s,v)=>s+v,0)/adds.length;
    const maxAdd=Math.max(...adds);
    const minAdd=Math.min(...adds);
    return{
      name:'M3: パターン(当月)',
      value:Math.round(cur.sub+avgAdd+extraAvg),
      opt:Math.round(cur.sub+maxAdd+extraAvg),
      pes:Math.round(cur.sub+minAdd+extraAvg),
      detail:{confirmed:cur.sub,avgAdd:Math.round(avgAdd),pastUsed:adds.length,extraAvg:Math.round(extraAvg)}
    };
  }else if(targetYm>basisMonth){
    // 未来月モデル
    const preAdds=[];
    history.forEach(({pm,final})=>{
      const[py,pmnum]=pm.split('-').map(Number);
      const pEnd=monthEnd(py,pmnum);
      const pBasis=ymdStr(new Date(pEnd.getTime()-daysLeft*86400000));
      const sp=snapshotAt(resv,store,pm,pBasis);
      // 月初時点までの事前予約 = 前月末日時点
      const prevMonth=new Date(py,pmnum-2,monthDays(py,pmnum-1>=1?pmnum-1:12));
      const preEnd=snapshotAt(resv,store,pm,ymdStr(prevMonth));
      if(sp.cnt<3||preEnd.cnt<3)return;
      preAdds.push({addCnt:Math.max(0,preEnd.cnt-sp.cnt),addSub:Math.max(0,preEnd.sub-sp.sub)});
    });
    if(preAdds.length===0)return null;
    const avgAddCnt=preAdds.reduce((s,a)=>s+a.addCnt,0)/preAdds.length;
    const avgAddSub=preAdds.reduce((s,a)=>s+a.addSub,0)/preAdds.length;
    const preCnt=cur.cnt+avgAddCnt;
    const preSub=cur.sub+avgAddSub;
    // 当月予約率(壊れデータ=cm_rate100%除外)
    const validCm=history.filter(({final})=>final.cnt>0&&final.cm/final.cnt<0.95).map(({final})=>final.cm/final.cnt);
    const validAov=history.filter(({final})=>final.cnt>0).map(({final})=>final.sub/final.cnt);
    if(validCm.length===0||validAov.length===0)return null;
    const cmEst=validCm.slice(-2).reduce((s,v)=>s+v,0)/Math.min(2,validCm.length);
    const cmMax=Math.max(...validCm);
    const cmMin=Math.min(...validCm);
    const aovEst=validAov.slice(-2).reduce((s,v)=>s+v,0)/Math.min(2,validAov.length);
    const maxCnt=Math.max(...history.map(({final})=>final.cnt));
    const cap=maxCnt*1.1;
    const scenario=cm=>{
      let raw=cm<1?preCnt/(1-cm):preCnt;
      const cnt=Math.min(raw,cap);
      const cmN=Math.max(0,cnt-preCnt);
      return preSub+cmN*aovEst+extraAvg;
    };
    return{
      name:'M3: パターン(未来)',
      value:Math.round(scenario(cmEst)),
      opt:Math.round(scenario(cmMax)),
      pes:Math.round(scenario(cmMin)),
      detail:{preCnt:Math.round(preCnt*10)/10,preSub:Math.round(preSub),cmStd:cmEst,cmMax,cmMin,aovEst:Math.round(aovEst),maxCnt,cap:Math.round(cap),pastUsed:preAdds.length}
    };
  }else{
    // 過去月
    return{name:'M3: 過去実績',value:Math.round((byM[targetYm]?.sub||0)+extraAvg),detail:{final:byM[targetYm]?.sub||0,extraAvg:Math.round(extraAvg)}};
  }
}

function method4Trend(byM,extraByM,store,year,month){
  const targetYm=`${year}-${String(month).padStart(2,'0')}`;
  const past=Object.keys(byM).filter(ym=>ym<targetYm&&byM[ym].cnt>0).sort();
  if(past.length===0)return null;
  const recent=past.slice(-3);
  const subs=recent.map(ym=>byM[ym].sub);
  const avg=subs.reduce((s,v)=>s+v,0)/subs.length;
  const growth=subs[subs.length-1]/avg||1;
  const extraAvg=Object.values(extraByM).slice(-3).reduce((s,v)=>s+v,0)/Math.max(1,Object.values(extraByM).slice(-3).length);
  return{name:'M4: 直近トレンド',value:Math.round(avg*growth+extraAvg),detail:{recentAvg:Math.round(avg),recent,growth:Math.round(growth*1000)/1000,extraAvg:Math.round(extraAvg)}};
}

// ==================== 8制約チェック ====================
function checkConstraints(store,year,month,byM,veh,kpi,target,resv){
  const ym=`${year}-${String(month).padStart(2,'0')}`;
  const checks=[];

  // 制約① 物理供給上限
  // 配車表/解析タブと同じロジック: 全保有から「KPI管理表で除外」を引く
  const excludedCodes=new Set(kpi.filter(k=>k.year_month===ym&&k.active===false).map(k=>k.vehicle_code));
  const nActive=veh.filter(v=>v.active!==false&&!excludedCodes.has(v.code)).length;
  const mDays=monthDays(year,month);
  // 過去の平均泊数
  const avgNightsArr=Object.values(byM).filter(m=>m.cnt>0&&m.nights>0).map(m=>m.nights/m.cnt);
  const avgNights=avgNightsArr.length?avgNightsArr.reduce((s,v)=>s+v,0)/avgNightsArr.length:3;
  const physicalMax=Math.round(nActive*mDays/avgNights*0.95);
  // 必要件数 (過去客単価から逆算)
  const aovs=Object.values(byM).filter(m=>m.cnt>0).map(m=>m.sub/m.cnt);
  const aovAvg=aovs.length?aovs.reduce((s,v)=>s+v,0)/aovs.length:25000;
  const neededCnt=Math.round(target/aovAvg);
  checks.push({id:1,name:'物理供給上限',pass:neededCnt<=physicalMax,need:neededCnt,limit:physicalMax,note:`稼働${nActive}台×暦${mDays}日÷平均${avgNights.toFixed(1)}泊×95%`});

  // 制約② 過去レンジ妥当性
  const pastCnts=Object.entries(byM).filter(([y,m])=>y<ym&&m.cnt>0).map(([,m])=>m.cnt);
  const maxCnt=pastCnts.length?Math.max(...pastCnts):0;
  const rangeCap=Math.round(maxCnt*1.1);
  checks.push({id:2,name:'過去レンジ',pass:neededCnt<=rangeCap,need:neededCnt,limit:rangeCap,note:`過去最高${maxCnt}件×1.1`});

  // 制約③ クラス供給整合 (高単価クラスで取れる件数)
  const premiumSet=PREMIUM_CLASSES[store]||[];
  const premiumVeh=veh.filter(v=>v.active!==false&&premiumSet.includes((v.class||v.type||'').trim())).length;
  const premiumNeed=Math.round(neededCnt*0.5); // 高単価が約半分を占めることを期待
  const premiumMax=Math.round(premiumVeh*mDays/avgNights*0.95);
  checks.push({id:3,name:'高単価クラス供給',pass:premiumNeed<=premiumMax,need:premiumNeed,limit:premiumMax,note:`高単価${premiumVeh}台で必要${premiumNeed}件 (全体50%想定)`});

  // 制約④ リードタイム制約 (簡易: 残期間で過去レートが取れるか)
  const today=new Date(year,month-1,1);
  // 過去のリードタイム中央値
  const allLeads=[];
  Object.values(byM).forEach(m=>m.leads&&m.leads.forEach(l=>allLeads.push(l)));
  allLeads.sort((a,b)=>a-b);
  const medLT=allLeads.length?allLeads[Math.floor(allLeads.length/2)]:20;
  checks.push({id:4,name:'リードタイム妥当性',pass:true,need:medLT,limit:null,note:`中央値${medLT}日 → 残期間で取り込み可能性あり`});

  // 制約⑤ 客単価妥当性 (現在の客単価が過去レンジ内か)
  const cur=byM[ym];
  const curAov=cur&&cur.cnt>0?cur.sub/cur.cnt:0;
  const aovMin=aovs.length?Math.min(...aovs):0;
  const aovMax=aovs.length?Math.max(...aovs):999999;
  checks.push({id:5,name:'客単価妥当性',pass:curAov>=aovMin*0.85&&curAov<=aovMax*1.15,need:curAov,limit:`${Math.round(aovMin)}〜${Math.round(aovMax)}`,note:'過去レンジ内か'});

  // 制約⑥ 当月予約率妥当性
  const cmRates=Object.entries(byM).filter(([y,m])=>m.cnt>0&&m.cm/m.cnt<0.95).map(([,m])=>m.cm/m.cnt);
  const cmAvg=cmRates.length?cmRates.reduce((s,v)=>s+v,0)/cmRates.length:0.2;
  const cmNeeded=Math.round(neededCnt*cmAvg);
  const daysLeft=Math.max(0,Math.round((monthEnd(year,month)-new Date())/86400000));
  const cmPossible=daysLeft>0;
  checks.push({id:6,name:'当月予約率',pass:cmPossible,need:cmNeeded,limit:`${(cmAvg*100).toFixed(0)}%平均 残${daysLeft}日`,note:`必要${cmNeeded}件の当月発生`});

  // 制約⑦ キャンセル率補正
  const allCnt=resv.filter(r=>r.status).length;
  const cancelled=resv.filter(r=>normStatus(r.status)==='cancelled').length;
  const cancelRate=allCnt?cancelled/allCnt:0;
  checks.push({id:7,name:'キャンセル率補正',pass:cancelRate<0.15,need:cancelRate,limit:0.15,note:`過去キャンセル率 ${(cancelRate*100).toFixed(1)}%`});

  // 制約⑧ チャネル偏重
  const otas={};
  Object.values(byM).forEach(m=>{Object.entries(m.byOta||{}).forEach(([o,d])=>{otas[o]=(otas[o]||0)+d.cnt;});});
  const totalOta=Object.values(otas).reduce((s,v)=>s+v,0);
  const maxOtaShare=totalOta?Math.max(...Object.values(otas))/totalOta:0;
  checks.push({id:8,name:'チャネル偏重',pass:maxOtaShare<0.8,need:maxOtaShare,limit:0.8,note:`最大OTA構成比 ${(maxOtaShare*100).toFixed(1)}%`});

  return{checks,nActive,physicalMax,neededCnt,aovAvg,maxCnt,premiumVeh,avgNights,medLT,cancelRate};
}

// ==================== 信頼度スコア & 統合 ====================
function calcWeights(methods,nMonthsData,monthPhase,daysToStart,rank){
  const valid=methods.filter(m=>m&&m.value!=null);
  if(valid.length===0)return{};
  const w={};
  const dataScore=Math.min(1,nMonthsData/6);
  const isFarFuture=monthPhase==='future'&&daysToStart>30;
  const isPeak=rank==='AA'||rank==='A';
  valid.forEach(m=>{
    let base=0.20;
    if(m.name.startsWith('M1')){
      if(isFarFuture){base=isPeak?0.55:0.35;}
      else{base=0.20*(0.5+dataScore*0.5);}
    }
    else if(m.name.startsWith('M2')){base=isFarFuture?0.05:0.25;}
    else if(m.name.startsWith('M3')){base=isFarFuture?(isPeak?0.10:0.15):0.25+dataScore*0.05;}
    else if(m.name.startsWith('M4')){base=isFarFuture?(isPeak?0.05:0.10):0.10+dataScore*0.05;}
    else if(m.name.startsWith('M5')){
      if(isFarFuture){base=isPeak?0.25:0.35;}
      else{base=0.20;}
    }
    w[m.name]=base;
  });
  const sum=Object.values(w).reduce((s,v)=>s+v,0);
  Object.keys(w).forEach(k=>w[k]/=sum);
  return w;
}

// M5: 予約発生ペース予測
function method5Velocity(resv,store,year,month,execDate){
  const endCol=store==='nha'?'end_date':'return_date';
  const targetYm=`${year}-${String(month).padStart(2,'0')}`;
  const mEnd=monthEnd(year,month);
  if(execDate>mEnd)return null;
  const RELIABLE_FROM='2026-03-30';
  const cutoff=ymdStr(new Date(execDate.getTime()-30*86400000));
  let cntTotal=0,subTotal=0,cntRecent=0,subRecent=0;
  resv.forEach(r=>{
    if(normStatus(r.status)==='cancelled')return;
    const ed=(r[endCol]||'').slice(0,10);
    if(ed.slice(0,7)!==targetYm)return;
    const sub=revOf(r);
    cntTotal++;subTotal+=sub;
    const cr=(r.created_at||'').slice(0,10);
    if(!cr||cr<RELIABLE_FROM)return;
    if(cr>=cutoff){cntRecent++;subRecent+=sub;}
  });
  const dailyCnt=cntRecent/30;
  const dailySub=subRecent/30;
  const remain=Math.max(0,Math.round((mEnd-execDate)/86400000));
  return{
    name:'M5: 予約ペース',
    value:Math.round(subTotal+dailySub*remain),
    detail:{current_total_cnt:cntTotal,current_total_sub:subTotal,reliable_30day_cnt:cntRecent,daily_velocity:dailyCnt.toFixed(2)+'件/日',remaining_days:remain,projected_add_cnt:Math.round(dailyCnt*remain),projected_add_sub:Math.round(dailySub*remain)}
  };
}

function integrate(methods,weights){
  const valid=methods.filter(m=>m&&m.value!=null);
  if(valid.length===0)return{value:0,methods:valid};
  const weighted=valid.reduce((s,m)=>s+(weights[m.name]||0)*m.value,0);
  const values=valid.map(m=>m.value);
  const mean=values.reduce((s,v)=>s+v,0)/values.length;
  const sorted=[...values].sort((a,b)=>a-b);
  const median=sorted[Math.floor(sorted.length/2)];
  const min=Math.min(...values),max=Math.max(...values);
  const stdev=Math.sqrt(values.reduce((s,v)=>s+(v-mean)**2,0)/values.length);
  const cv=mean?stdev/mean:0;
  let conf='STRONG';
  if(values.length===1)conf='WEAK_SINGLE';
  else if(cv>0.15)conf='WEAK';
  else if(cv>0.05)conf='MEDIUM';
  return{
    value:Math.round(weighted),
    mean:Math.round(mean),
    median:Math.round(median),
    min,max,stdev:Math.round(stdev),cv,
    confidence:conf,n:values.length
  };
}

  html+=`<details open><summary>📈 過去月実績 (PERIOD_START ${PERIOD_START[store]} 以降)</summary><div class="detail-body"><table class="t"><thead><tr><th>月</th><th class="num">件数</th><th class="num">売上</th><th class="num">客単価</th><th class="num">当月予約率</th><th class="num">当月発生売上</th><th class="num">平均泊数</th></tr></thead><tbody>`;
  pastMonths.forEach(pm=>{
    const m=byM[pm];const aov=m.cnt?m.sub/m.cnt:0;const cmR=m.cnt?m.cm/m.cnt:0;const nights=m.cnt?m.nights/m.cnt:0;
    const cur=pm===ym;
    html+=`<tr${cur?' style="background:#fef9c3;font-weight:700"':''}><td>${pm}${cur?' 🔥対象':''}</td><td class="num">${m.cnt}</td><td class="num">${fmtY(m.sub)}</td><td class="num">${fmtY(aov)}</td><td class="num">${fmtP(cmR)} <span style="color:#94a3b8;font-size:.85em">(${m.cm||0}件)</span></td><td class="num">${fmtY(m.cmSub||0)}</td><td class="num">${nights.toFixed(1)}泊</td></tr>`;
  });
  html+=`</tbody></table></div></details>`;

  // クラス別 (対象月)
  if(Object.keys(cur.byCls||{}).length>0){
    // 過去平均クラス別
    const clsAvg={};
    pastMonths.filter(pm=>pm<ym).slice(-3).forEach(pm=>{
      const bcl=byM[pm].byCls||{};
      Object.entries(bcl).forEach(([cls,d])=>{
        if(!clsAvg[cls])clsAvg[cls]={cnt:0,sub:0,n:0};
        clsAvg[cls].cnt+=d.cnt;clsAvg[cls].sub+=d.sub;clsAvg[cls].n++;
      });
    });
    Object.keys(clsAvg).forEach(c=>{clsAvg[c].cnt/=clsAvg[c].n;clsAvg[c].sub/=clsAvg[c].n;});
    const premiumSet=PREMIUM_CLASSES[store]||[];

    const allCls=Array.from(new Set([...Object.keys(cur.byCls),...Object.keys(clsAvg)])).sort();
    allCls.forEach(cls=>{
      const c=cur.byCls[cls]||{cnt:0,sub:0};
      const a=clsAvg[cls]||{cnt:0,sub:0};
      const prog=a.cnt>0?c.cnt/a.cnt:0;
      const isPrem=premiumSet.includes(cls);
      const cls2=prog>=1?'ok':(prog>=0.5?'warn':'ng');
      html+=`<tr><td>${isPrem?'⭐':''} ${cls}</td><td class="num">${c.cnt}</td><td class="num">${fmtY(c.sub)}</td><td class="num">${a.cnt.toFixed(1)}</td><td class="num">${fmtY(a.sub)}</td><td class="num ${cls2}">${fmtP(prog)}</td></tr>`;
    });
    html+=`</tbody></table></div></details>`;
  }

  return html;
}

// ==================== スナップショット保存 (日次予測の蓄積) ====================
const SNAPSHOT_KEY='forecast_snapshots_v1';

function loadSnapshots(){
  try{return JSON.parse(localStorage.getItem(SNAPSHOT_KEY)||'{}');}catch(e){return{};}
}
function saveSnapshot(store,year,month,execDate,integrated,methods,target,curSub,curCnt,boost){
  const all=loadSnapshots();
  const key=`${store}_${year}-${String(month).padStart(2,'0')}`;
  if(!all[key])all[key]=[];
  const dateStr=ymdStr(execDate);
  // 同日重複は更新（最新を残す）
  all[key]=all[key].filter(s=>s.date!==dateStr);
  all[key].push({
    date:dateStr,
    prediction:integrated.value,
    median:integrated.median,
    min:integrated.min,
    max:integrated.max,
    confidence:integrated.confidence,
    confirmed:curSub,
    confirmed_cnt:curCnt,
    target,
    boost_remaining:boost.remaining,
    boost_max:boost.max,
    methods:methods.filter(m=>m).map(m=>({name:m.name,value:m.value})),
    saved_at:new Date().toISOString()
  });
  // 日付昇順
  all[key].sort((a,b)=>a.date.localeCompare(b.date));
  // 同月のデータは最大100件まで
  if(all[key].length>100)all[key]=all[key].slice(-100);
  localStorage.setItem(SNAPSHOT_KEY,JSON.stringify(all));
}

// 🎯 命中率サマリー (要約)
function computeAccuracySummary(d){
  const{store,byM,resv,acct,veh,kpi,execDate}=d;
  const extraByMm=extraMonthly(acct);
  const curYm2=`${execDate.getFullYear()}-${String(execDate.getMonth()+1).padStart(2,'0')}`;
  const closedMonths=Object.keys(byM).filter(ym=>ym<curYm2&&byM[ym].cnt>0).sort();
  if(closedMonths.length===0)return null;
  const pastAvgAovs=closedMonths.map(pm=>byM[pm].cnt?byM[pm].sub/byM[pm].cnt:0).filter(v=>v>0);
  const pastAov=pastAvgAovs.length?pastAvgAovs.reduce((s,v)=>s+v,0)/pastAvgAovs.length:25000;
  const kpiAcc={rev:[],cnt:[],aov:[],util:[],perVeh:[]};
  closedMonths.forEach(ym=>{
    const[y,m]=ym.split('-').map(Number);
    const mStart=new Date(y,m-1,1);
    const mEnd=monthEnd(y,m);
    const mMid=new Date(mStart.getTime()+14*86400000);
    const mData=byM[ym];
    const actualRev=(mData.sub||0)+(extraByMm[ym]||0);
    const actualCnt=mData.cnt||0;
    const actualAov=actualCnt>0?mData.sub/actualCnt:0;
    if(actualRev===0)return;
    const rank2=RANKS[store]?.[m]||'B';
    const _exc=new Set((kpi||[]).filter(kk=>kk.year_month===ym&&kk.active===false).map(kk=>kk.vehicle_code));
    const _active=(veh||[]).filter(v=>v.active!==false&&!_exc.has(v.code)).length;
    const mDaysC=monthDays(y,m);
    const supplyDays=_active*mDaysC;
    const avgNights=actualCnt>0?mData.nights/actualCnt:3;
    const actualUtil=supplyDays>0?(actualCnt*avgNights/supplyDays):0;
    const actualPerVeh=_active>0?actualRev/_active:0;
    [mStart,mMid,mEnd].forEach(date=>{
      const _m1=method1Target(store,y,m,date);
      const _m2=method2Linear(byM,extraByMm,store,y,m,date);
      const _m3=method3Pattern(resv,byM,extraByMm,store,y,m,date);
      const _m4=method4Trend(byM,extraByMm,store,y,m);
      const _m5=method5Velocity(resv,store,y,m,date);
      const allM=[_m1,_m2,_m3,_m4,_m5];
      let phase='current';
      if(date<mStart)phase='future';
      else if(date>mEnd)phase='past';
      const dts=phase==='future'?Math.round((mStart-date)/86400000):0;
      const w=calcWeights(allM,6,phase,dts,rank2);
      const valid=allM.filter(x=>x&&x.value!=null);
      const predRev=valid.reduce((s,mm)=>s+(w[mm.name]||0)*mm.value,0);
      const predCnt=pastAov>0?predRev/pastAov:0;
      const predUtil=supplyDays>0?(predCnt*avgNights/supplyDays):0;
      const predPerVeh=_active>0?predRev/_active:0;
      const calcA=(p,a)=>a>0?Math.max(0,100-Math.abs((p-a)/a*100)):0;
      kpiAcc.rev.push(calcA(predRev,actualRev));
      kpiAcc.cnt.push(calcA(predCnt,actualCnt));
      kpiAcc.aov.push(calcA(pastAov,actualAov));
      kpiAcc.util.push(calcA(predUtil,actualUtil));
      kpiAcc.perVeh.push(calcA(predPerVeh,actualPerVeh));
    });
  });
  const avgs={};
  Object.entries(kpiAcc).forEach(([k,arr])=>{avgs[k]=arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:0;});
  return{avgs,nMonths:closedMonths.length};
}

      const accs=preds.map(p=>computeAcc(p[row.key],row.actual));
      const avgAcc=accs.reduce((s,a)=>s+a.acc,0)/accs.length;
      kpiAcc[row.key].push(avgAcc);
      html+=`<tr><td><b>${row.label}</b></td><td class="num"><b>${row.fmt(row.actual)}</b></td>`;
      preds.forEach((p,i)=>{
        const a=accs[i];
        const errCls=Math.abs(a.err)<5?'#059669':Math.abs(a.err)<15?'#d97706':'#dc2626';

        html+=`<td class="num">${row.fmt(p[row.key])}<br><span style="font-size:9.5px;color:${errCls};font-weight:700">${sign}${a.err.toFixed(1)}% / ${a.acc.toFixed(0)}%</span></td>`;
      });
      const aC=avgAcc>=85?'#059669':avgAcc>=70?'#d97706':'#dc2626';
      html+=`<td class="num" style="color:${aC};font-weight:700;font-size:13px">${avgAcc.toFixed(1)}%</td></tr>`;
    });
    html+=`</tbody></table></div></div>`;
  });
  html+=`<div style="padding:12px 16px;background:#1e293b;color:#fff;border-radius:10px;margin-top:12px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">📊 KPI別 全月平均命中率 (${closedMonths.length}ヶ月)</div><div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px">`;
  const labels={rev:'💰 売上',cnt:'📋 件数',aov:'💵 単価',util:'🚗 稼働率',perVeh:'🏆 台/売上'};
  Object.entries(kpiAcc).forEach(([k,arr])=>{
    const avg=arr.length?arr.reduce((s,v)=>s+v,0)/arr.length:0;
    const col=avg>=85?'#22c55e':avg>=70?'#fbbf24':'#ef4444';
    html+=`<div style="text-align:center;padding:8px;background:#334155;border-radius:8px"><div style="font-size:11px;color:#cbd5e1;margin-bottom:4px">${labels[k]}</div><div style="font-size:18px;font-weight:800;color:${col}">${avg.toFixed(1)}%</div></div>`;
  });
  html+=`</div></div>`;
  html+=`<div style="margin-top:12px;padding:10px 14px;background:#f9fafb;border-radius:8px;font-size:11.5px;color:#475569;line-height:1.7"><b>📖 読み方</b><br>• 月初/月中/月末 = 各時点で予測を再計算 (バックテスト)<br>• 誤差% = (予測 − 実績) ÷ 実績 × 100 ・ 命中% = 100 − |誤差%|<br>• 🟢85%以上=高精度 / 🟡70-85%=要改善 / 🔴70%未満=破綻<br>• <b>命中率が低いKPI/月の予測ロジック改善で全体精度向上</b></div>`;
  return html;
}

function renderTimelineSection(d,integrated,target){
  const key=`${d.store}_${d.year}-${String(d.month).padStart(2,'0')}`;
  const snaps=loadSnapshots()[key]||[];

  let html=`<div class="alert info">📈 過去の予測スナップショット履歴 — ${snaps.length}件 / 自動保存（forecast.html を開いた日に記録）</div>`;

  if(snaps.length===0){
    html+=`<div class="alert warn">💡 まだスナップショットがありません。今日の予測が初回保存されます。明日以降、毎日 forecast.html を開くと自動的に予測の推移が見えるようになります。</div>`;
    return html;
  }

  // 表示用統計
  const preds=snaps.map(s=>s.prediction);
  const minPred=Math.min(...preds);
  const maxPred=Math.max(...preds);
  const meanPred=preds.reduce((s,v)=>s+v,0)/preds.length;
  const latest=snaps[snaps.length-1];
  const first=snaps[0];
  const trend=latest.prediction-first.prediction;
  const trendPct=first.prediction?trend/first.prediction*100:0;

  html+=`<div class="card-grid">`;
  html+=`<div class="card"><div class="label">最新予測</div><div class="value">${fmtY(latest.prediction)}</div><div class="sub">${latest.date}</div></div>`;
  html+=`<div class="card"><div class="label">初回予測</div><div class="value">${fmtY(first.prediction)}</div><div class="sub">${first.date}</div></div>`;
  const trendCls=Math.abs(trendPct)<5?'':(trend>0?'success':'danger');
  html+=`<div class="card ${trendCls}"><div class="label">予測の推移</div><div class="value">${trend>=0?'+':''}${fmtK(trend)}</div><div class="sub">${trendPct>=0?'+':''}${trendPct.toFixed(1)}% (${snaps.length}日間)</div></div>`;
  html+=`<div class="card"><div class="label">予測レンジ</div><div class="value" style="font-size:13pt">${fmtK(minPred)} 〜 ${fmtK(maxPred)}</div><div class="sub">幅 ${fmtK(maxPred-minPred)} / 平均 ${fmtK(meanPred)}</div></div>`;
  html+=`</div>`;

  // 時系列テーブル
  html+=`<details open><summary>📋 日次予測スナップショット (${snaps.length}件)</summary><div class="detail-body"><table class="t"><thead><tr><th>日付</th><th class="num">予測</th><th class="num">確定済売上</th><th class="num">確定件数</th><th class="num">連休加点残</th><th class="num">vs 目標</th><th>信頼度</th><th>前日比</th></tr></thead><tbody>`;
  snaps.slice().reverse().forEach((s,i,arr)=>{
    const prev=i<arr.length-1?arr[i+1]:null;
    const diff=prev?s.prediction-prev.prediction:0;
    const diffPct=prev&&prev.prediction?diff/prev.prediction*100:0;
    const vsTar=s.target?s.prediction/s.target*100:0;
    const isLatest=s.date===latest.date;
    html+=`<tr${isLatest?' style="background:#fef9c3;font-weight:700"':''}><td>${s.date}${isLatest?' 🔥':''}</td><td class="num">${fmtY(s.prediction)}</td><td class="num">${fmtY(s.confirmed)}</td><td class="num">${s.confirmed_cnt}</td><td class="num">+${(s.boost_remaining*100).toFixed(1)}%</td><td class="num ${vsTar>=100?'ok':vsTar>=90?'warn':'ng'}">${vsTar.toFixed(1)}%</td><td><span class="conf ${s.confidence==='STRONG'?'strong':s.confidence==='MEDIUM'?'medium':'weak'}" style="font-size:8.5pt;padding:2px 6px">${s.confidence}</span></td><td class="num" style="${diff>0?'color:#16a34a':diff<0?'color:#dc2626':''}">${prev?(diff>=0?'+':'')+fmtK(diff)+' ('+diffPct.toFixed(1)+'%)':'-'}</td></tr>`;
  });
  html+=`</tbody></table></div></details>`;

  // 簡易折れ線グラフ (SVG)
  const W=720,H=160,P=30;
  const xs=snaps.map((_,i)=>P+(W-2*P)*i/Math.max(1,snaps.length-1));
  const yMin=Math.min(minPred,target)*0.95;
  const yMax=Math.max(maxPred,target)*1.05;
  const ys=snaps.map(s=>H-P-(H-2*P)*(s.prediction-yMin)/(yMax-yMin));
  const yTar=H-P-(H-2*P)*(target-yMin)/(yMax-yMin);
  const pathD=xs.map((x,i)=>`${i===0?'M':'L'}${x},${ys[i]}`).join(' ');
  const confPath=xs.map((x,i)=>{const y=H-P-(H-2*P)*(snaps[i].confirmed-yMin)/(yMax-yMin);return`${i===0?'M':'L'}${x},${y}`;}).join(' ');
  html+=`<details open><summary>📊 予測推移グラフ (赤=予測 / 緑=確定済売上 / 点線=目標)</summary><div class="detail-body" style="background:white"><svg width="${W}" height="${H}" style="background:#fafbfc;border:1px solid #e5e7eb;border-radius:6px;display:block">`;
  html+=`<line x1="${P}" y1="${yTar}" x2="${W-P}" y2="${yTar}" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>`;
  html+=`<text x="${W-P-5}" y="${yTar-4}" font-size="9" fill="#64748b" text-anchor="end">目標 ${fmtK(target)}</text>`;
  html+=`<path d="${pathD}" fill="none" stroke="#dc2626" stroke-width="2.5"/>`;
  html+=`<path d="${confPath}" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="3 2"/>`;
  xs.forEach((x,i)=>{html+=`<circle cx="${x}" cy="${ys[i]}" r="3" fill="#dc2626"/>`;});
  // X軸ラベル (適度に間引き)
  const stride=Math.max(1,Math.floor(snaps.length/10));
  snaps.forEach((s,i)=>{if(i%stride!==0&&i!==snaps.length-1)return;html+=`<text x="${xs[i]}" y="${H-10}" font-size="8" fill="#64748b" text-anchor="middle">${s.date.slice(5)}</text>`;});
  html+=`</svg></div></details>`;

  return html;
}

// ==================== 5KPI × 12ヶ月 計算 ====================
function getActiveCountForMonth(ym,kpi,veh){
  const mk=(kpi||[]).filter(k=>k.year_month===ym);
  if(mk.length>0){
    const ex=new Set(mk.filter(k=>k.active===false).map(k=>k.vehicle_code));
    return(veh||[]).filter(v=>v.active!==false&&!ex.has(v.code)).length;
  }
  const allMs=[...new Set((kpi||[]).map(k=>k.year_month).filter(Boolean))].sort();
  const latest=allMs.filter(yy=>yy<=ym).pop();
  if(!latest)return(veh||[]).filter(v=>v.active!==false).length;
  const ex=new Set((kpi||[]).filter(k=>k.year_month===latest&&k.active===false).map(k=>k.vehicle_code));
  return(veh||[]).filter(v=>v.active!==false&&!ex.has(v.code)).length;
}

function compute12MonthKpis(store,year,resv,acct,byM,veh,kpi,execDate){
  // 各月の目標売上から、他4KPI目標を派生計算
  const targets=MONTHLY_TARGETS[store];
  if(!targets)return null;

  // 過去実績から派生目標の基準を計算
  const pastMs=Object.keys(byM).filter(ym=>ym<ymdStr(execDate).slice(0,7)).sort().slice(-3);
  let aovTarget=25000,nightsTarget=3;
  if(pastMs.length>0){
    const aovs=pastMs.map(pm=>byM[pm].cnt?byM[pm].sub/byM[pm].cnt:0).filter(v=>v>0);
    const nights=pastMs.map(pm=>byM[pm].cnt?byM[pm].nights/byM[pm].cnt:0).filter(v=>v>0);
    if(aovs.length)aovTarget=aovs.reduce((s,v)=>s+v,0)/aovs.length;
    if(nights.length)nightsTarget=nights.reduce((s,v)=>s+v,0)/nights.length;
  }

  const result=[];
  for(let m=1;m<=12;m++){
    const ym=`${year}-${String(m).padStart(2,'0')}`;
    const revTar=targets[m]||0;
    const mDays=monthDays(year,m);
    const nActive=getActiveCountForMonth(ym,kpi,veh);

    // 目標
    const cntTar=aovTarget>0?Math.round(revTar/aovTarget):0;
    const utilTar=nActive>0?Math.min(1,cntTar*nightsTarget/(nActive*mDays)):0;
    const perVehTar=nActive>0?Math.round(revTar/nActive):0;

    // 実績
    const mData=byM[ym]||{cnt:0,sub:0,nights:0};
    const revAct=mData.sub;
    const cntAct=mData.cnt;
    const aovAct=cntAct>0?mData.sub/cntAct:0;
    const utilAct=nActive>0?mData.nights/(nActive*mDays):0;
    const perVehAct=nActive>0?mData.sub/nActive:0;

    // 予測: run() と同じアンサンブル (5手法+重み付き統合) で整合性確保
    const extraByM=extraMonthly(acct);
    const mStart=new Date(year,m-1,1);
    const mEnd=monthEnd(year,m);
    let phase='future';
    if(execDate>=mStart&&execDate<=mEnd)phase='current';
    else if(execDate>mEnd)phase='past';
    const daysToStart=phase==='future'?Math.round((mStart-execDate)/86400000):0;
    const rank2=RANKS[store]?.[m]||'B';
    const m1=method1Target(store,year,m,execDate);
    const m2=method2Linear(byM,extraByM,store,year,m,execDate);
    const m3=method3Pattern(resv,byM,extraByM,store,year,m,execDate);
    const m4=method4Trend(byM,extraByM,store,year,m);
    const m5=method5Velocity(resv,store,year,m,execDate);
    const allMethods=[m1,m2,m3,m4,m5];
    const nMonthsData=Object.keys(byM).filter(ym=>ym<`${year}-${String(m).padStart(2,'0')}`).length;
    const weights=calcWeights(allMethods,nMonthsData,phase,daysToStart,rank2);
    let revFcst=revAct;
    const validMethods=allMethods.filter(x=>x&&x.value!=null);
    if(validMethods.length>0){
      revFcst=validMethods.reduce((s,mm)=>s+(weights[mm.name]||0)*mm.value,0);
    }
    let _cv=0,_conf='WEAK_SINGLE',_remainDays=0;
    if(validMethods.length>1){
      const vals=validMethods.map(x=>x.value);
      const _mean=vals.reduce((s,v)=>s+v,0)/vals.length;
      const _std=Math.sqrt(vals.reduce((s,v)=>s+(v-_mean)*(v-_mean),0)/vals.length);
      _cv=_mean>0?_std/_mean:0;
      _conf=_cv<0.05?'STRONG':_cv<0.15?'MEDIUM':'WEAK';
    }
    if(phase==='current'||phase==='future'){
      _remainDays=Math.max(0,Math.round((mEnd-execDate)/86400000));
    }

    // 予測派生
    const cntFcst=aovAct>0?Math.round(revFcst/aovAct):(aovTarget>0?Math.round(revFcst/aovTarget):0);
    const aovFcst=cntFcst>0?revFcst/cntFcst:aovTarget;
    const utilFcst=nActive>0?Math.min(1,cntFcst*nightsTarget/(nActive*mDays)):0;
    const perVehFcst=nActive>0?revFcst/nActive:0;

    const methodDetails={};
    allMethods.forEach(mm=>{if(mm&&mm.value!=null)methodDetails[mm.name]={value:mm.value,weight:weights[mm.name]||0};});
    const _vals=validMethods.map(x=>x.value);
    const _minPred=_vals.length?Math.min(..._vals):0;
    const _maxPred=_vals.length?Math.max(..._vals):0;
    result.push({
      month:m,ym,phase,nActive,mDays,remainDays:_remainDays,confidence:_conf,cv:_cv,nMethods:validMethods.length,methodDetails,daysToStart,isFarFuture:phase==='future'&&daysToStart>30,minPred:_minPred,maxPred:_maxPred,
      target:{rev:revTar,cnt:cntTar,aov:aovTarget,util:utilTar,perVeh:perVehTar},
      actual:{rev:revAct,cnt:cntAct,aov:aovAct,util:utilAct,perVeh:perVehAct},
      forecast:{rev:revFcst,cnt:cntFcst,aov:aovFcst,util:utilFcst,perVeh:perVehFcst},
      rank:RANKS[store]?.[m]||'?'
    });
  }
  return{kpis:result,aovTarget,nightsTarget,nActive:result[0]?.nActive||0};
}

// ==================== 根本データ: 車両稼働 ====================
function renderVehicleRoot(d,kpiData){
  const{veh,kpi,store,year,month}=d;
  // クラス別稼働台数 (対象月)
  const ym=`${year}-${String(month).padStart(2,'0')}`;
  // 配車表/解析タブと同じロジック: 全保有から「KPI管理表で active=false」を引く
  const excludedCodes=new Set(kpi.filter(k=>k.year_month===ym&&k.active===false).map(k=>k.vehicle_code));
  const isActiveFn=v=>v.active!==false&&!excludedCodes.has(v.code);
  // クラス別集計
  const byCls={};
  veh.forEach(v=>{
    const cls=(v.class||v.type||'?').trim();
    if(!byCls[cls])byCls[cls]={total:0,active:0,codes:[],activeCodes:[],excluded:[]};
    byCls[cls].total++;byCls[cls].codes.push(v.code);
    if(isActiveFn(v)){byCls[cls].active++;byCls[cls].activeCodes.push(v.code);}
    else if(excludedCodes.has(v.code)){byCls[cls].excluded.push(v.code);}
  });
  const totalVeh=veh.length;
  const totalActive=veh.filter(isActiveFn).length;
  const totalExcluded=excludedCodes.size;
  const premiumSet=PREMIUM_CLASSES[store]||[];

  let html=`<div style="font-size:13px;color:#6b7280;margin-bottom:12px">配車表 / 解析タブと同じロジック (全保有 − KPI管理表で active=false の車両 = 稼働)</div>`;

  // 4メトリック
  let prem=0,premTotal=0;
  Object.entries(byCls).forEach(([c,v])=>{if(premiumSet.includes(c)){prem+=v.active;premTotal+=v.total;}});
  const mDays=monthDays(year,month);
  html+=`<div class="metrics">`;
  html+=`<div class="metric"><div class="ml">🚗 グロス稼働台数</div><div class="mv">${totalActive} <span style="font-size:13px;font-weight:500;color:#9ca3af">台</span></div><div class="ms">全保有 ${totalVeh}台 − 除外 ${totalExcluded}台</div></div>`;
  html+=`<div class="metric"><div class="ml">⭐ 高単価クラス稼働</div><div class="mv">${prem} <span style="font-size:13px;font-weight:500;color:#9ca3af">台</span></div><div class="ms">${PREMIUM_CLASSES[store].join('/')} (全${premTotal}台)</div></div>`;
  html+=`<div class="metric"><div class="ml">📦 クラス数</div><div class="mv">${Object.keys(byCls).length}</div><div class="ms">${Object.keys(byCls).sort().join(' / ')}</div></div>`;
  html+=`<div class="metric"><div class="ml">🛏 月内総供給日数</div><div class="mv">${(totalActive*mDays).toLocaleString()}</div><div class="ms">${totalActive}台 × ${mDays}日</div></div>`;
  html+=`</div>`;

  // クラス別テーブル
  html+=`<div style="margin-top:14px;font-size:13px;color:#6b7280;font-weight:500;margin-bottom:6px">クラス別 稼働内訳</div>`;
  html+=`<table class="t"><thead><tr><th>クラス</th><th class="num">保有</th><th class="num">稼働</th><th class="num">除外</th><th class="num">稼働率</th><th>稼働車両</th><th>除外車両</th><th class="num">供給日数</th></tr></thead><tbody>`;
  Object.keys(byCls).sort().forEach(cls=>{
    const c=byCls[cls];
    const r=c.total>0?c.active/c.total:0;
    const isPrem=premiumSet.includes(cls);
    html+=`<tr><td>${isPrem?'⭐ ':''}<b>${cls}</b></td><td class="num">${c.total}</td><td class="num ok">${c.active}</td><td class="num ${c.excluded.length>0?'ng':''}">${c.excluded.length}</td><td class="num ${r>=1?'ok':r>=0.7?'warn':'ng'}">${(r*100).toFixed(0)}%</td><td style="font-size:11px;color:#6b7280">${c.activeCodes.join(', ')||'-'}</td><td style="font-size:11px;color:#dc2626">${c.excluded.join(', ')||'-'}</td><td class="num">${(c.active*mDays).toLocaleString()}</td></tr>`;
  });
  html+=`</tbody></table>`;

  return html;
}

// ==================== 株価チャート風 SVG ====================
function renderStockChart(d,kpiData){
  const{kpis}=kpiData;
  const W=1100,H=320,P=50,BAR_H=50;
  const chartH=H-BAR_H-P;

  // データ抽出
  const targets=kpis.map(k=>k.target.rev);
  const actuals=kpis.map(k=>k.actual.rev);
  const forecasts=kpis.map(k=>k.phase==='past'?k.actual.rev:k.forecast.rev);
  const nActives=kpis.map(k=>k.nActive);

  const yMax=Math.max(...targets,...forecasts)*1.1;
  const yMin=0;

  const xs=kpis.map((_,i)=>P+(W-2*P)*i/11);
  const yAt=v=>P+(chartH-P)*(1-(v-yMin)/(yMax-yMin));

  let html=`<div class="chart-wrap" style="overflow-x:auto">`;
  html+=`<svg width="${W}" height="${H}" style="display:block">`;

  // Y軸グリッド (薄いライン)
  for(let i=0;i<=4;i++){
    const v=yMax*i/4;
    const y=yAt(v);
    html+=`<line x1="${P}" y1="${y}" x2="${W-20}" y2="${y}" stroke="#f3f4f6" stroke-width="1"/>`;
    html+=`<text x="${P-5}" y="${y+4}" font-size="10" fill="#9ca3af" text-anchor="end">${fmtK(v)}</text>`;
  }

  // 目標ライン (黄・破線)
  const tarPath=xs.map((x,i)=>`${i===0?'M':'L'}${x},${yAt(targets[i])}`).join(' ');
  html+=`<path d="${tarPath}" fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3"/>`;
  xs.forEach((x,i)=>{html+=`<circle cx="${x}" cy="${yAt(targets[i])}" r="3" fill="#f59e0b"/>`;});

  // 実績/予測
  const pastIdx=kpis.map((k,i)=>k.phase==='past'?i:-1).filter(i=>i>=0);
  const curIdx=kpis.findIndex(k=>k.phase==='current');
  const lastPastIdx=pastIdx.length?pastIdx[pastIdx.length-1]:-1;

  // 過去（実績・緑実線）
  if(pastIdx.length>0){
    const pastPath=pastIdx.map((i,j)=>`${j===0?'M':'L'}${xs[i]},${yAt(actuals[i])}`).join(' ');
    html+=`<path d="${pastPath}" fill="none" stroke="#10b981" stroke-width="2.5"/>`;
    pastIdx.forEach(i=>{html+=`<circle cx="${xs[i]}" cy="${yAt(actuals[i])}" r="4" fill="#10b981"/>`;});
  }
  // 現在月
  if(curIdx>=0){
    html+=`<circle cx="${xs[curIdx]}" cy="${yAt(actuals[curIdx])}" r="4" fill="#f59e0b"/>`;
    html+=`<circle cx="${xs[curIdx]}" cy="${yAt(forecasts[curIdx])}" r="6" fill="#3b82f6" stroke="#fff" stroke-width="2"/>`;
    if(lastPastIdx>=0){
      html+=`<line x1="${xs[lastPastIdx]}" y1="${yAt(actuals[lastPastIdx])}" x2="${xs[curIdx]}" y2="${yAt(actuals[curIdx])}" stroke="#10b981" stroke-width="2.5"/>`;
    }
    html+=`<line x1="${xs[curIdx]}" y1="${yAt(actuals[curIdx])}" x2="${xs[curIdx]}" y2="${yAt(forecasts[curIdx])}" stroke="#3b82f6" stroke-width="2" stroke-dasharray="3 2"/>`;
  }
  // 将来 (予測・青破線)
  const futIdx=kpis.map((k,i)=>k.phase==='future'?i:-1).filter(i=>i>=0);
  if(futIdx.length>0){
    let pts=futIdx.slice();
    if(curIdx>=0)pts.unshift(curIdx);
    const futPath=pts.map((i,j)=>`${j===0?'M':'L'}${xs[i]},${yAt(forecasts[i])}`).join(' ');
    html+=`<path d="${futPath}" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="6 3"/>`;
    futIdx.forEach(i=>{html+=`<circle cx="${xs[i]}" cy="${yAt(forecasts[i])}" r="4" fill="#3b82f6"/>`;});
  }

  // X軸ラベル
  kpis.forEach((k,i)=>{
    const cur=k.month===d.month;
    html+=`<text x="${xs[i]}" y="${chartH+15}" font-size="11" fill="${cur?'#92400e':'#6b7280'}" text-anchor="middle" font-weight="${cur?'700':'500'}" style="cursor:pointer" onclick="document.getElementById('month').value=${k.month};run();">${k.month}月</text>`;
    html+=`<text x="${xs[i]}" y="${chartH+28}" font-size="9" fill="#9ca3af" text-anchor="middle">${k.rank}</text>`;
  });

  // 稼働台数バー (下部・薄いグレー)
  const maxVeh=Math.max(...nActives,1);
  kpis.forEach((k,i)=>{
    const barH=(k.nActive/maxVeh)*BAR_H;
    const y=H-P-barH;
    const isCur=k.month===d.month;
    html+=`<rect x="${xs[i]-12}" y="${y}" width="24" height="${barH}" fill="${isCur?'#f59e0b':'#d1d5db'}" rx="2"/>`;
    html+=`<text x="${xs[i]}" y="${H-P+12}" font-size="9" fill="#9ca3af" text-anchor="middle">${k.nActive}台</text>`;
  });

  // 凡例
  html+=`<g transform="translate(${P},10)">`;
  html+=`<line x1="0" y1="6" x2="20" y2="6" stroke="#f59e0b" stroke-width="2" stroke-dasharray="5 3"/><text x="25" y="10" font-size="11" fill="#374151">目標</text>`;
  html+=`<line x1="70" y1="6" x2="90" y2="6" stroke="#10b981" stroke-width="2.5"/><text x="95" y="10" font-size="11" fill="#374151">実績</text>`;
  html+=`<line x1="140" y1="6" x2="160" y2="6" stroke="#3b82f6" stroke-width="2.5" stroke-dasharray="6 3"/><text x="165" y="10" font-size="11" fill="#374151">予測</text>`;
  html+=`<rect x="215" y="2" width="12" height="9" fill="#d1d5db"/><text x="230" y="10" font-size="11" fill="#374151">稼働台数</text>`;
  html+=`</g>`;

  html+=`</svg></div>`;
  return html;
}

function renderAnnualOverview(d,kpiData){
  const{kpis,aovTarget,nightsTarget}=kpiData;
  // 年間サマリー
  const yearTar={rev:0,cnt:0};
  const yearAct={rev:0,cnt:0};
  const yearFcst={rev:0,cnt:0};
  kpis.forEach(k=>{
    yearTar.rev+=k.target.rev;yearTar.cnt+=k.target.cnt;
    yearAct.rev+=k.actual.rev;yearAct.cnt+=k.actual.cnt;
    yearFcst.rev+=k.phase==='past'?k.actual.rev:k.forecast.rev;
    yearFcst.cnt+=k.phase==='past'?k.actual.cnt:k.forecast.cnt;
  });
  const yearGap=yearFcst.rev-yearTar.rev;
  const yearAch=yearTar.rev>0?yearFcst.rev/yearTar.rev*100:0;

  // KPI行ごとの構成
  const KPI_ROWS=[
    {key:'rev',label:'💰 売上総額',fmt:v=>fmtK(v),color:'#fbbf24'},
    {key:'cnt',label:'📋 予約本数',fmt:v=>v.toFixed(0)+'件',color:'#60a5fa'},
    {key:'aov',label:'💵 予約単価',fmt:v=>fmtY(v),color:'#a78bfa'},
    {key:'util',label:'🚗 稼働率',fmt:v=>(v*100).toFixed(1)+'%',color:'#34d399'},
    {key:'perVeh',label:'🏆 台/売上',fmt:v=>fmtY(v),color:'#f472b6'},
  ];

  let html=`<div class="overview"><h2>🏛 ${d.store.toUpperCase()} ${d.year}年 年間オーバービュー<span class="ovh-sub">5KPI × 12ヶ月 / 目標 vs 実績 vs 予測</span></h2>`;
  // 年間サマリー
  html+=`<div class="ov-stats">`;
  html+=`<div class="ov-stat tgt"><div class="ovl">年間目標 売上</div><div class="ovv">${fmtK(yearTar.rev)}</div><div class="ovs">${yearTar.cnt.toLocaleString()}件 / 客単価¥${Math.round(aovTarget).toLocaleString()}</div></div>`;
  html+=`<div class="ov-stat act"><div class="ovl">確定済み 売上</div><div class="ovv">${fmtK(yearAct.rev)}</div><div class="ovs">${yearAct.cnt.toLocaleString()}件 (過去月のみ)</div></div>`;
  html+=`<div class="ov-stat fcst"><div class="ovl">予測 年間売上</div><div class="ovv">${fmtK(yearFcst.rev)}</div><div class="ovs">${yearFcst.cnt.toLocaleString()}件 / 達成率 ${yearAch.toFixed(1)}%</div></div>`;
  const gapCls=yearGap>=0?'act':'gap';
  html+=`<div class="ov-stat ${gapCls}"><div class="ovl">目標との差</div><div class="ovv">${yearGap>=0?'+':''}${fmtK(yearGap)}</div><div class="ovs">${(yearGap/yearTar.rev*100).toFixed(1)}%</div></div>`;
  html+=`</div>`;

  // 12ヶ月セルグリッド (売上のみ・大きく)
  html+=`<div style="margin-bottom:12px;font-size:9.5pt;color:#cbd5e1;font-weight:700">📊 12ヶ月セル (クリックで詳細表示・🟧=対象月 / 過去=実績 / 将来=予測)</div>`;
  html+=`<div class="ov-grid">`;
  kpis.forEach(k=>{
    const cur=k.month===d.month;
    const phaseClass=k.phase==='current'?'current':k.phase==='past'?'past':'future';
    const dispRev=k.phase==='past'?k.actual.rev:k.forecast.rev;
    const ach=k.target.rev>0?dispRev/k.target.rev*100:0;
    const achCls=ach>=100?'ok':(ach>=90?'warn':'ng');
    const rankColor={AA:'#dc2626',A:'#ea580c',B:'#ca8a04',C:'#2563eb'}[k.rank]||'#94a3b8';
    html+=`<div class="ov-cell ${phaseClass}" onclick="document.getElementById('month').value=${k.month};run();" title="${k.ym}">`;
    html+=`<div class="mlabel">${k.month}月 <span class="mrank" style="background:${rankColor}">${k.rank}</span></div>`;
    html+=`<div class="mtgt">目 ${fmtK(k.target.rev)}</div>`;
    if(k.phase==='past'){html+=`<div class="mact">実 ${fmtK(k.actual.rev)}</div>`;}
    else if(k.phase==='current'){
      html+=`<div class="mact">実 ${fmtK(k.actual.rev)}</div>`;
      html+=`<div class="mfcst">予 ${fmtK(k.forecast.rev)}</div>`;
    }else{
      html+=`<div class="mfcst">予 ${fmtK(k.forecast.rev)}</div>`;
    }
    html+=`<div class="mach ${achCls}">${ach.toFixed(0)}%</div>`;
    html+=`</div>`;
  });
  html+=`</div>`;

  // 5KPI 全体テーブル
  html+=`<div class="ov-chart"><div style="font-size:10pt;color:#fbbf24;font-weight:700;margin-bottom:8px">📐 5KPI × 12ヶ月 (目標 / 実績 or 予測 / 達成率)</div>`;
  html+=`<table class="t" style="background:transparent;color:#e2e8f0;font-size:9.5pt"><thead><tr><th style="background:#334155">KPI</th>`;
  for(let m=1;m<=12;m++){
    const cur=m===d.month;
    html+=`<th class="center" style="background:${cur?'#7c2d12':'#1e293b'};color:${cur?'#fed7aa':'#94a3b8'};min-width:62px;cursor:pointer" onclick="document.getElementById('month').value=${m};run();">${m}月</th>`;
  }
  html+=`</tr></thead><tbody>`;
  KPI_ROWS.forEach(row=>{
    // 目標行
    html+=`<tr><td style="font-weight:700;color:${row.color};border-bottom-color:#334155">${row.label} 目標</td>`;
    kpis.forEach(k=>{html+=`<td class="num" style="color:#fde68a;border-bottom-color:#334155">${row.fmt(k.target[row.key])}</td>`;});
    html+=`</tr>`;
    // 実績/予測行
    html+=`<tr><td style="color:#cbd5e1;border-bottom-color:#334155">　 実/予</td>`;
    kpis.forEach(k=>{
      const v=k.phase==='past'?k.actual[row.key]:k.forecast[row.key];
      const t=k.target[row.key];
      const ach=t>0?v/t*100:0;
      const col=k.phase==='past'?'#86efac':k.phase==='current'?'#fb923c':'#60a5fa';
      const achCol=ach>=100?'#22c55e':ach>=90?'#fbbf24':'#ef4444';
      html+=`<td class="num" style="color:${col};border-bottom-color:#334155">${row.fmt(v)}<br><span style="font-size:8pt;color:${achCol}">${ach.toFixed(0)}%</span></td>`;
    });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;

  html+=`</div>`;
  return html;
}

// ==================== 予測チャートセクション ====================
function renderForecastChartSection(d,mNum,k,tgtCntV){
  var endCol=d.store==='nha'?'end_date':'return_date';
  var ymStr=d.year+'-'+String(mNum).padStart(2,'0');
  var mD=monthDays(d.year,mNum);
  var execYm=ymdStr(d.execDate).slice(0,7);
  var todayIdx=execYm===ymStr?Math.min(d.execDate.getDate()-1,mD-1):(execYm>ymStr?mD-1:-1);
  var dailyS=new Array(mD).fill(0),dailyC=new Array(mD).fill(0);
  d.resv.forEach(function(r){
    if(normStatus(r.status)==='cancelled')return;
    var ed=(r[endCol]||'').slice(0,10);
    if(ed.slice(0,7)!==ymStr)return;
    var di=parseInt(ed.slice(8,10))-1;
    if(di<0||di>=mD)return;
    dailyS[di]+=revOf(r);dailyC[di]++;
  });
  var cumS=[],cumC=[],sumS=0,sumC=0;
  for(var i=0;i<mD;i++){sumS+=dailyS[i];sumC+=dailyC[i];cumS.push(sumS);cumC.push(sumC);}
  var confS=k.actual.rev,confC=k.actual.cnt,fcstS=k.forecast.rev,fcstC=k.forecast.cnt,tgtS=k.target.rev;
  var dispS,dispC;
  if(todayIdx<0){
    dispS=cumS.slice();dispC=cumC.slice();
  }else if(cumS[todayIdx]>0){
    var _scS=confS/cumS[todayIdx],_scC=confC/Math.max(1,cumC[todayIdx]);
    dispS=cumS.map(function(v,i){return i<todayIdx?Math.round(v*_scS):(i===todayIdx?confS:v);});
    dispC=cumC.map(function(v,i){return i<todayIdx?Math.round(v*_scC):(i===todayIdx?confC:v);});
  }else{
    dispS=cumS.slice();dispC=cumC.slice();
  }
  var ftS=[],ftC=[];
  for(var i=0;i<mD;i++){
    var t,e;
    if(todayIdx<0){
      t=(i+1)/mD;ftS.push(fcstS*t);ftC.push(Math.round(fcstC*t));
    }else if(i<=todayIdx){
      ftS.push(dispS[i]);ftC.push(dispC[i]);
    }else{
      t=(i-todayIdx)/(mD-todayIdx);e=t<.5?2*t*t:-1+(4-2*t)*t;
      ftS.push(confS+(fcstS-confS)*e);ftC.push(Math.round(confC+(fcstC-confC)*e));
    }
  }
  function mkSVG(aD,fD,tgt,fmt,ttl,col){
    var W=560,H=200,PX=52,PY=24,PB=28,cH=H-PY-PB;
    var yMx=Math.max.apply(null,[].concat(aD,fD,[tgt]))*1.10;if(!yMx)yMx=1;
    function yA(v){return PY+cH*(1-v/yMx);}
    function xA(i){return PX+(W-PX-12)*i/(mD-1);}
    var yT=yA(tgt);
    var aP=todayIdx>=0
      ?Array.from({length:todayIdx+1},function(_,i){return(i===0?'M':'L')+xA(i).toFixed(1)+','+yA(aD[i]).toFixed(1);}).join(' ')
      :Array.from({length:mD},function(_,i){return(i===0?'M':'L')+xA(i).toFixed(1)+','+yA(aD[i]).toFixed(1);}).join(' ');
    var fs=Math.max(0,todayIdx>=0?todayIdx:0);
    var fP=Array.from({length:mD-fs},function(_,i){var idx=i+fs;return(i===0?'M':'L')+xA(idx).toFixed(1)+','+yA(fD[idx]).toFixed(1);}).join(' ');
    var yLs=[0,.25,.5,.75,1].map(function(t){return{v:yMx*t,y:yA(yMx*t)};});
    var xTs=[];for(var d2=0;d2<mD;d2+=Math.max(1,Math.floor(mD/6)))xTs.push(d2);if(xTs[xTs.length-1]!==mD-1)xTs.push(mD-1);
    return '<div style="flex:1;min-width:240px">'
      +'<div style="font-size:11px;font-weight:700;color:#374151;margin-bottom:5px">'+ttl+'</div>'
      +'<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;border:1px solid #e5e7eb;border-radius:6px;background:#fafbfc">'
      +yLs.map(function(l){return'<line x1="'+PX+'" y1="'+l.y.toFixed(1)+'" x2="'+(W-12)+'" y2="'+l.y.toFixed(1)+'" stroke="#f1f5f9" stroke-width="1"/>'
        +'<text x="'+(PX-4)+'" y="'+(l.y+3.5).toFixed(1)+'" font-size="9" fill="#9ca3af" text-anchor="end">'+fmt(l.v)+'</text>';}).join('')
      +'<line x1="'+PX+'" y1="'+yT.toFixed(1)+'" x2="'+(W-12)+'" y2="'+yT.toFixed(1)+'" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3"/>'
      +'<text x="'+(W-14)+'" y="'+(yT-3).toFixed(1)+'" font-size="8.5" fill="#ef4444" text-anchor="end">目標 '+fmt(tgt)+'</text>'
      +(aP?'<path d="'+aP+'" fill="none" stroke="#10b981" stroke-width="2.5"/>':'')
      +(fP?'<path d="'+fP+'" fill="none" stroke="'+col+'" stroke-width="2" stroke-dasharray="'+(todayIdx>=0?'5 3':'')+'" />':'')
      +(todayIdx>=0?'<line x1="'+xA(todayIdx).toFixed(1)+'" y1="'+PY+'" x2="'+xA(todayIdx).toFixed(1)+'" y2="'+(PY+cH)+'" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3 2"/>'
        +'<text x="'+xA(todayIdx).toFixed(1)+'" y="'+(PY-4)+'" font-size="8.5" fill="#f59e0b" text-anchor="middle">今日</text>':'')
      +xTs.map(function(d2){return'<text x="'+xA(d2).toFixed(1)+'" y="'+(H-8)+'" font-size="8.5" fill="#9ca3af" text-anchor="middle">'+mNum+'/'+(d2+1)+'</text>';}).join('')
      +'</svg>'
      +'<div style="display:flex;gap:12px;margin-top:4px;font-size:10px;color:#6b7280">'
      +'<span style="color:#ef4444">— 目標</span>'
      +(todayIdx>=0?'<span style="color:#10b981">— 速報</span>':'')
      +'<span style="color:'+col+'">'+(todayIdx>=0?'--- 予測':'— 予測')+'</span>'
      +(todayIdx>=0?'<span style="color:#f59e0b">| 今日</span>':'')
      +'</div>'
      +'</div>';
  }
  var achP=tgtS>0?(fcstS/tgtS*100).toFixed(1)+'%':'-';
  var rC={AA:'#dc2626',A:'#ea580c',B:'#d97706',C:'#2563eb'}[k.rank]||'#94a3b8';
  var snaps=loadSnapshots()[d.store+'_'+ymStr]||[];
  var logH='';
  if(snaps.length>0){
    logH='<details style="margin-top:12px"><summary style="font-size:11px;font-weight:600;color:#374151;padding:6px 0;cursor:pointer;user-select:none;list-style:none">🗓 予測ログ履歴（'+snaps.length+'日分）<span style="font-size:10px;color:#9ca3af;font-weight:400;margin-left:6px">シミュレート実行ごとに自動保存</span></summary>'
      +'<div style="overflow-x:auto;margin-top:6px"><table style="width:100%;border-collapse:collapse;font-size:11px">'
      +'<thead><tr style="background:#f9fafb">'
      +'<th style="text-align:left;padding:4px 8px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">実行日</th>'
      +'<th style="text-align:right;padding:4px 8px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">予測売上</th>'
      +'<th style="text-align:right;padding:4px 8px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">前日比</th>'
      +'<th style="text-align:right;padding:4px 8px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">速報売上</th>'
      +'<th style="text-align:right;padding:4px 8px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">件数</th>'
      +'<th style="text-align:right;padding:4px 8px;color:#6b7280;font-weight:600;border-bottom:1px solid #e5e7eb">達成率</th>'
      +'</tr></thead><tbody>';
    var rv=snaps.slice().reverse();
    rv.forEach(function(s,i){
      var prev=i<rv.length-1?rv[i+1]:null;
      var diff=prev?s.prediction-prev.prediction:0;
      var ach=s.target>0?(s.prediction/s.target*100).toFixed(1)+'%':'-';
      var isLt=i===0;
      var dC=diff>0?'#10b981':diff<0?'#ef4444':'#6b7280';
      logH+='<tr style="'+(isLt?'background:#eff6ff;font-weight:700':'')+'"><td style="padding:4px 8px;color:#6b7280;border-bottom:1px solid #f1f5f9">'+s.date+(isLt?' ← 本日':'')+'</td>'
        +'<td style="text-align:right;padding:4px 8px;border-bottom:1px solid #f1f5f9;color:#1e40af;font-variant-numeric:tabular-nums">'+fmtY(s.prediction)+'</td>'
        +'<td style="text-align:right;padding:4px 8px;border-bottom:1px solid #f1f5f9;color:'+dC+';font-variant-numeric:tabular-nums">'+(prev?(diff>=0?'+':'')+fmtK(diff):'-')+'</td>'
        +'<td style="text-align:right;padding:4px 8px;border-bottom:1px solid #f1f5f9;font-variant-numeric:tabular-nums">'+fmtY(s.confirmed)+'</td>'
        +'<td style="text-align:right;padding:4px 8px;border-bottom:1px solid #f1f5f9">'+s.confirmed_cnt+'件</td>'
        +'<td style="text-align:right;padding:4px 8px;border-bottom:1px solid #f1f5f9">'+ach+'</td>'
        +'</tr>';
    });
    logH+='</tbody></table></div></details>';
  }else{
    logH='<div style="margin-top:10px;font-size:11px;color:#9ca3af">💡 まだログがありません。毎日シミュレートを実行すると予測推移が記録されます。</div>';
  }
  return '<div class="section" style="margin-bottom:16px">'
    +'<div class="section-head"><h2 style="display:flex;align-items:center;gap:10px">'
    +'<span>'+mNum+'月</span>'
    +'<span style="padding:2px 8px;border-radius:5px;background:'+rC+';color:#fff;font-size:11px;font-weight:700">'+k.rank+'</span>'
    +'<span style="font-size:12px;font-weight:400;color:#6b7280">'+(k.phase==='past'?'完了':k.phase==='current'?'進行中':'未来')+' / 稼働'+k.nActive+'台</span></h2>'
    +'<span class="sub" style="display:flex;gap:10px">'
    +'<span style="color:#ef4444">目標 '+fmtK(tgtS)+'</span>'
    +'<span style="color:#10b981">速報 '+fmtK(confS)+' / '+confC+'件</span>'
    +'<span style="color:#2563eb">予測 '+fmtK(fcstS)+' ('+achP+')</span>'
    +'</span></div>'
    +'<div class="section-body">'
    +'<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px">'
    +'<div style="background:#f8fafc;border-radius:8px;padding:10px 12px;border-left:3px solid #ef4444"><div style="font-size:10px;color:#9ca3af;margin-bottom:2px">🎯 目標</div><div style="font-size:17px;font-weight:800">'+fmtK(tgtS)+'</div><div style="font-size:11px;color:#6b7280">'+tgtCntV+'件</div></div>'
    +'<div style="background:#f8fafc;border-radius:8px;padding:10px 12px;border-left:3px solid #10b981"><div style="font-size:10px;color:#9ca3af;margin-bottom:2px">📋 速報（'+ymdStr(d.execDate)+'）</div><div style="font-size:17px;font-weight:800">'+fmtK(confS)+'</div><div style="font-size:11px;color:#6b7280">'+confC+'件</div></div>'
    +'<div style="background:#f8fafc;border-radius:8px;padding:10px 12px;border-left:3px solid #3b82f6"><div style="font-size:10px;color:#9ca3af;margin-bottom:2px">🤖 予測（月末着地）</div><div style="font-size:17px;font-weight:800">'+fmtK(fcstS)+'</div><div style="font-size:11px;color:#6b7280">'+Math.round(fcstC)+'件 / '+achP+'</div></div>'
    +'<div style="background:#fff7ed;border-radius:8px;padding:10px 12px;border:1px solid #fed7aa"><div style="font-size:10px;color:#92400e;margin-bottom:2px">⚠️ 乖離</div><div style="font-size:16px;font-weight:800;color:#92400e">'+(tgtS>fcstS?'▼ '+fmtK(tgtS-fcstS):'✅ 達成圏')+'</div><div style="font-size:11px;color:#92400e">'+(tgtS>fcstS?'あと'+Math.max(0,tgtCntV-confC)+'件必要':'')+'</div></div>'
    +'</div>'
    +'<div style="display:flex;gap:14px;flex-wrap:wrap">'
    +mkSVG(dispS,ftS,tgtS,function(v){return'¥'+(v/10000).toFixed(0)+'万';},'💰 売上推移（累積 / '+mNum+'月）','#3b82f6')
    +mkSVG(dispC,ftC,tgtCntV,function(v){return Math.round(v)+'件';},'🎫 件数推移（累積 / '+mNum+'月）','#8b5cf6')
    +'</div>'
    +logH
    +'</div></div>';
}

        // 📊 予測命中率 (オーナー定義 2026-05-26): 速報(グロス) ÷ 予測 × 100

        html+=`<div class="hero-card ${achCls}"><div class="h-label">📊 達成見込み</div><div class="h-value">${achV.toFixed(1)}%</div><div class="h-sub">${isPast?'実績':'予測'} ÷ 目標${isPast?'':` · 残${remainD}日`}</div></div>`;
        const _minP=k.minPred||0,_maxP=k.maxPred||0;

          const reasonParts=[];

      return{cards,rank,seasonalMult,holidayBoost,contextMult};
    })();
    html+=`<div class="section monthly-only"><div class="section-head"><h2>🔍 KPI整合性チェック</h2><span class="sub">シーズナル(${kpiCheck.rank}=${kpiCheck.seasonalMult.toFixed(2)}x) + 連休加点(+${(kpiCheck.holidayBoost*100).toFixed(0)}%) を踏まえた正常レンジ判定</span></div><div class="section-body">`;
    html+=`<div class="alert info" style="margin-bottom:10px"><b>${d.month}月の文脈:</b> シーズナルランク <span class="rank ${kpiCheck.rank}">${kpiCheck.rank}</span> (係数 ${kpiCheck.seasonalMult.toFixed(2)}x) ・ 連休加点 最大 +${(kpiCheck.holidayBoost*100).toFixed(1)}% ・ <b>過去の${(kpiCheck.contextMult*100).toFixed(0)}%まで</b> が正常レンジ</div>`;
    html+=`<table class="t"><thead><tr><th>KPI</th><th class="num">目標</th><th class="num">現在 (速報)</th><th class="num">予測</th><th class="num">過去平均</th><th class="num">過去レンジ</th><th class="center">妥当性</th></tr></thead><tbody>`;
    let badCount=0;
    kpiCheck.cards.forEach(k=>{
      if(k.status==='🚨'||k.status==='⚠️')badCount++;
      const rng=k.past?`${k.fmt(k.past.min)} 〜 ${k.fmt(k.past.max)}`:'-';
      const avgD=k.past?k.fmt(k.past.avg):'-';
      html+=`<tr><td><b>${k.label}</b></td><td class="num">${k.fmt(k.target||0)}</td><td class="num" style="color:#c2410c">${k.fmt(k.cur||0)}</td><td class="num" style="color:#1e40af;font-weight:700">${k.fmt(k.fcst||0)}</td><td class="num">${avgD}</td><td class="num" style="font-size:10.5px">${rng}</td><td class="center" style="color:${k.color};font-weight:700">${k.status} <span style="font-size:9.5px;font-weight:400">${k.label}</span></td></tr>`;
    });
    html+=`</tbody></table>`;
    if(badCount>0){html+=`<div class="alert danger" style="margin-top:12px"><b>🚨 ${badCount}個のKPIが正常レンジ外</b> · ${kpiCheck.rank}シーズナル+連休を加味してもこの予測は破綻の疑い</div>`;}
    else{html+=`<div class="alert success" style="margin-top:12px"><b>🟢 全KPIが正常レンジ内</b> · ${kpiCheck.rank}シーズナル(${kpiCheck.seasonalMult.toFixed(2)}x) + 連休(+${(kpiCheck.holidayBoost*100).toFixed(0)}%)を加味した予測として妥当 (レール上を走っている状態)</div>`;}
    html+=`</div></div>`;

    // ========== 予測の根拠 (残期間の +件数×単価) ==========
    if(addCnt>0||addRev>0){
      html+=`<div class="monthly-only" style="margin:0 0 16px;padding:14px 18px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border:1px solid #3b82f6;border-radius:10px">`;
      html+=`<div style="font-size:12px;color:#1e40af;font-weight:700;margin-bottom:8px">📐 予測の内訳（残${daysLeft}日で何件 × 何円 で売上がこうなる）</div>`;
      html+=`<div style="font-size:14px;color:#1e40af;line-height:1.8;font-variant-numeric:tabular-nums">`;
      html+=`<b>速報</b> ${fmtY(curRev)} (${curCnt}件) <span style="color:#64748b">+</span> `;
      html+=`<b>残期間</b> ${fmtY(addRev)} (<b style="color:#0891b2">+${addCnt}件</b> × <b style="color:#0891b2">${fmtY(addAov)}</b>) <span style="color:#64748b">＝</span> `;
      html+=`<b>最終予測</b> <span style="color:#dc2626;font-size:16px">${fmtY(fcstRev)}</span> (${fcstCnt}件)`;
      html+=`</div>`;
      const dailyAdd=daysLeft>0?addCnt/daysLeft:0;
      const pastDailyPattern=pastMs.length>0?(()=>{
        const cnts=pastMs.map(pm=>d.byM[pm].cnt);
        const avgCnt=cnts.reduce((s,v)=>s+v,0)/cnts.length;
        return avgCnt/30;
      })():0;
      const paceRatio=pastDailyPattern>0?dailyAdd/pastDailyPattern*100:0;
      const paceCls=paceRatio>150?'#dc2626':paceRatio>110?'#d97706':paceRatio>=70?'#059669':'#0891b2';
      const paceLabel=paceRatio>150?'⚠️ 過大予測の疑い':paceRatio>110?'🟡 やや強気':paceRatio>=70?'🟢 妥当':'🔵 控えめ';
      if(pastDailyPattern>0){
        html+=`<div style="margin-top:8px;padding-top:8px;border-top:1px solid #93c5fd;font-size:11.5px;color:#475569">`;
        html+=`必要ペース: <b>${dailyAdd.toFixed(2)}件/日</b> (残${daysLeft}日) ・ 過去平均: <b>${pastDailyPattern.toFixed(2)}件/日</b> ・ `;
        html+=`<span style="color:${paceCls};font-weight:700">${paceLabel} (過去の${paceRatio.toFixed(0)}%)</span>`;
        html+=`</div>`;
      }
      html+=`</div>`;
    }

    // ========== [2] 全KPI × 12ヶ月 整合性ビュー ==========
    if(kpiData){
      const ks=kpiData.kpis;
      const yT={rev:0,cnt:0},yA={rev:0,cnt:0},yF={rev:0,cnt:0};
      ks.forEach(k=>{
        yT.rev+=k.target.rev;yT.cnt+=k.target.cnt;
        yA.rev+=k.actual.rev;yA.cnt+=k.actual.cnt;
        yF.rev+=k.phase==='past'?k.actual.rev:k.forecast.rev;
        yF.cnt+=k.phase==='past'?k.actual.cnt:k.forecast.cnt;
      });
      const yAch=yT.rev>0?yF.rev/yT.rev*100:0;
      const KROWS=[
        {key:'rev',label:'💰 売上',fmt:v=>fmtK(v),colorTarget:'#92400e',colorActual:'#059669',colorFcst:'#2563eb'},
        {key:'cnt',label:'📋 予約件数',fmt:v=>Math.round(v).toLocaleString()+'件',colorTarget:'#92400e',colorActual:'#059669',colorFcst:'#2563eb'},
        {key:'aov',label:'💵 客単価',fmt:v=>fmtY(v),colorTarget:'#92400e',colorActual:'#059669',colorFcst:'#2563eb'},
        {key:'util',label:'🚗 稼働率',fmt:v=>(v*100).toFixed(1)+'%',colorTarget:'#92400e',colorActual:'#059669',colorFcst:'#2563eb'},
        {key:'perVeh',label:'🏆 台/売上',fmt:v=>fmtY(v),colorTarget:'#92400e',colorActual:'#059669',colorFcst:'#2563eb'},
      ];
      const pastStats={};
      KROWS.forEach(row=>{
        const vals=ks.filter(k=>k.phase==='past'&&k.actual[row.key]>0).map(k=>k.actual[row.key]);
        if(vals.length>0){
          const sorted=[...vals].sort((a,b)=>a-b);
          pastStats[row.key]={min:sorted[0],max:sorted[sorted.length-1],avg:vals.reduce((s,v)=>s+v,0)/vals.length};
        }
      });
      const cellStatus=(row,k)=>{
        if(k.phase==='past')return{status:'',color:''};
        const v=k.forecast[row.key];
        const s=pastStats[row.key];
        if(!s)return{status:'',color:''};
        const seasonalMult={AA:1.5,A:1.3,B:1.0,C:0.85}[k.rank]||1.0;
        const expectedMax=s.max*seasonalMult*1.1;
        const expectedMin=s.min*0.7;
        if(v>expectedMax*1.2)return{status:'🚨',color:'#fee2e2'};
        if(v>expectedMax)return{status:'⚠️',color:'#fef3c7'};
        if(v<expectedMin&&k.rank!=='C')return{status:'⚠️',color:'#fef3c7'};
        return{status:'',color:''};
      };
      html+=`<details class="monthly-only" style="margin-bottom:18px;border:1px solid #e5e7eb;border-radius:12px;background:#fff"><summary style="background:#f9fafb;border-radius:12px 12px 0 0">📊 ${d.year}年 全KPI 整合性ビュー — 主要5KPI × 12ヶ月で目標/実績/予測の整合性をチェック</summary><div class="section-body">`;
      html+=`<div class="alert info" style="margin-bottom:14px"><b>年合計:</b> 目標 ${fmtK(yT.rev)} / 実績(過去月) ${fmtK(yA.rev)} / 予測(年合計) ${fmtK(yF.rev)} (${yAch.toFixed(1)}%) <span style="margin-left:12px;font-size:11px;color:#64748b">月クリックで該当月の詳細表示</span></div>`;
      html+=`<div style="overflow-x:auto"><table class="t" style="font-size:11.5px"><thead>`;
      html+=`<tr><th style="position:sticky;left:0;background:#f9fafb;z-index:2;min-width:80px">KPI</th><th class="center" style="background:#f3f4f6">区分</th>`;
      ks.forEach(k=>{
        const cur=k.month===d.month;
        const rankColor={AA:'#dc2626',A:'#ea580c',B:'#d97706',C:'#2563eb'}[k.rank]||'#94a3b8';
        html+=`<th class="center" style="cursor:pointer;background:${cur?'#fef3c7':'#f9fafb'};color:${cur?'#92400e':'#374151'};min-width:74px" onclick="document.getElementById('month').value=${k.month};run();">${k.month}月<br><span style="display:inline-block;padding:1px 5px;border-radius:3px;background:${rankColor};color:#fff;font-size:9px;font-weight:600">${k.rank}</span></th>`;
      });
      html+=`<th class="center" style="background:#1e293b;color:#fff;min-width:80px">年合計</th></tr></thead><tbody>`;
      KROWS.forEach((row,idx)=>{
        const isSep=idx>0;
        html+=`<tr style="background:#fafbfc${isSep?';border-top:2px solid #e5e7eb':''}"><td rowspan="3" style="font-weight:700;position:sticky;left:0;background:#fafbfc;z-index:1;border-right:1px solid #e5e7eb;vertical-align:middle">${row.label}</td>`;
        html+=`<td class="center" style="font-size:10px;color:#92400e;font-weight:600;background:#fffbeb">🎯 目標</td>`;
        let yearTar=0;
        ks.forEach(k=>{const v=k.target[row.key]||0;yearTar+=v;html+=`<td class="num" style="color:${row.colorTarget}">${row.fmt(v)}</td>`;});
        if(row.key==='rev'||row.key==='cnt'){html+=`<td class="num" style="background:#fef3c7;color:#92400e;font-weight:700">${row.fmt(yearTar)}</td>`;}
        else{html+=`<td class="num" style="background:#fef3c7;color:#92400e;font-weight:700">${row.fmt(yearTar/12)}<br><span style="font-size:9px;opacity:.7">月平均</span></td>`;}
        html+=`</tr>`;
        html+=`<tr><td class="center" style="font-size:10px;color:#374151;font-weight:600;background:#f9fafb">📊 実/予</td>`;
        let yearAct=0,yearFcst=0;
        ks.forEach(k=>{
          const isPast=k.phase==='past';
          const v=isPast?k.actual[row.key]:k.forecast[row.key];
          const cur=k.month===d.month;
          if(isPast)yearAct+=v;
          yearFcst+=isPast?k.actual[row.key]:k.forecast[row.key];
          const cellSt=cellStatus(row,k);
          const col=isPast?row.colorActual:(cur?'#d97706':row.colorFcst);
          html+=`<td class="num" style="color:${col};background:${cellSt.color||(cur?'#fffbeb':'')}">${row.fmt(v||0)}${cellSt.status?' '+cellSt.status:''}</td>`;
        });
        if(row.key==='rev'||row.key==='cnt'){html+=`<td class="num" style="background:#1e293b;color:#fff;font-weight:700">${row.fmt(yearFcst)}</td>`;}
        else{html+=`<td class="num" style="background:#1e293b;color:#fff;font-weight:700">${row.fmt(yearFcst/12)}<br><span style="font-size:9px;opacity:.7">月平均</span></td>`;}
        html+=`</tr>`;
        html+=`<tr style="border-bottom:1px solid #e5e7eb"><td class="center" style="font-size:10px;color:#374151;font-weight:600;background:#f9fafb">✓ 達成%</td>`;
        ks.forEach(k=>{
          const isPast=k.phase==='past';
          const v=isPast?k.actual[row.key]:k.forecast[row.key];
          const t=k.target[row.key]||0;
          const ach=t>0?v/t*100:0;
          const aC=ach>=100?'#059669':ach>=90?'#d97706':'#dc2626';
          const cur=k.month===d.month;
          html+=`<td class="num" style="color:${aC};font-weight:600;font-size:11px;background:${cur?'#fffbeb':''}">${ach>0?ach.toFixed(0)+'%':'-'}</td>`;
        });
        const yearAch2=yearTar>0?yearFcst/yearTar*100:0;
        const yAC=yearAch2>=100?'#22c55e':yearAch2>=90?'#fbbf24':'#ef4444';
        html+=`<td class="num" style="background:#1e293b;color:${yAC};font-weight:700">${yearAch2.toFixed(1)}%</td>`;
        html+=`</tr>`;
      });
      html+=`</tbody></table></div>`;
      let anomalies=0;
      KROWS.forEach(row=>{ks.forEach(k=>{const st=cellStatus(row,k);if(st.status)anomalies++;});});
      if(anomalies>0){html+=`<div class="alert warn" style="margin-top:12px"><b>⚠️ ${anomalies}個のセルで異常値検出</b> · シーズナル+連休を加味しても過去レンジを超える予測値あり (🚨マーク赤背景=危険 / ⚠️黄背景=要確認)</div>`;}
      else{html+=`<div class="alert success" style="margin-top:12px"><b>🟢 全KPI × 12ヶ月で異常値なし</b> · 全ての予測値が過去レンジ + シーズナル補正範囲内 (レール上)</div>`;}
      html+=`</div></details>`;
    }

    // ========== [3] 詳細セクション (折り畳み・必要時に開く) ==========
    // 詳細セクション (折り畳み・重複セクション削除済み)
    html+=`<details class="monthly-only"><summary>🏗️ 車両稼働 (商品・全ての起点) — グロス/クラス別/除外車両</summary><div class="detail-body">`;
    if(kpiData)html+=renderVehicleRoot(d,kpiData);
    html+=`</div></details>`;

    html+=`<details class="monthly-only"><summary>⚙️ ALGORITHM - 予測の根拠 (5手法 + 8制約 + 重み付け)</summary><div class="detail-body">`;
    html+=renderAlgorithmSection(d,methods,weights,integrated,constraints);
    html+=`</div></details>`;

    html+=`<details class="monthly-only"><summary>📡 PROGRESS - 当月の日次累積進捗</summary><div class="detail-body">`;
    html+=renderProgressSection(d);
    html+=`</div></details>`;

    html+=`<details class="monthly-only"><summary>📅 TIMELINE - 予測の日次推移 (毎日自動保存)</summary><div class="detail-body">`;
    html+=renderTimelineSection(d,integrated,target);
    html+=`</div></details>`;

    document.getElementById('content').innerHTML=html;
    document.getElementById('status').textContent='✅ 完了 ('+new Date().toLocaleTimeString()+')';
  }catch(e){
    document.getElementById('content').innerHTML='<div class="alert danger">⚠️ エラー: '+e.message+'</div>';
    document.getElementById('status').textContent='⚠️ エラー';
    console.error(e);
  }
}

// ビューモード切替
let _viewMode='monthly';
function setView(mode){
  _viewMode=mode;
  const mBtn=document.getElementById('viewMonthlyBtn');
  const aBtn=document.getElementById('viewAnnualBtn');
  const cBtn=document.getElementById('viewChartBtn');
  const active='#2563eb',inactive='#e5e7eb',actC='#fff',inactC='#374151';
  mBtn.style.background=mode==='monthly'?active:inactive; mBtn.style.color=mode==='monthly'?actC:inactC;
  aBtn.style.background=mode==='annual'?active:inactive; aBtn.style.color=mode==='annual'?actC:inactC;
  if(cBtn){cBtn.style.background=mode==='chart'?active:inactive; cBtn.style.color=mode==='chart'?actC:inactC;}
  const sBtn=document.getElementById('viewSimBtn');
  if(sBtn){sBtn.style.background=mode==='sim'?'#2563eb':'#e5e7eb'; sBtn.style.color=mode==='sim'?'#fff':'#374151';}
  const style=document.getElementById('viewModeStyle')||document.createElement('style');
  style.id='viewModeStyle';
  if(mode==='sim'){
    var _sf=document.getElementById('simFrame');
    if(_sf&&!_sf.dataset.loaded){_sf.src='sim.html?t='+Date.now();_sf.dataset.loaded='1';}
    style.textContent=`#content,.hero,.monthly-only,details{display:none!important}.chart-view-section{display:none!important}.sim-view-section{display:block!important}`;
  }else if(mode==='annual'){
    style.textContent=`.hero,.monthly-only,details{display:none!important}.chart-view-section{display:none!important}.sim-view-section{display:none!important}`;
  }else if(mode==='chart'){
    style.textContent=`.hero,.monthly-only,details{display:none!important}.chart-view-section{display:block!important}.sim-view-section{display:none!important}`;
  }else{
    style.textContent=`.chart-view-section{display:none!important}.sim-view-section{display:none!important}`;
  }
  if(!style.parentNode)document.head.appendChild(style);
}

// 初期化
function init(){
  const ms=document.getElementById('month');
  for(let m=1;m<=12;m++){const o=document.createElement('option');o.value=m;o.text=m+'月';ms.appendChild(o);}
  const today=new Date();
  // デフォルト: 今月+1 (将来月予測)、当日
  ms.value=today.getMonth()+1;
  document.getElementById('asOf').value=today.toISOString().slice(0,10);
  // URLパラメータから初期値
  const u=new URLSearchParams(location.search);
  if(u.get('store'))document.getElementById('store').value=u.get('store');
  if(u.get('month'))ms.value=u.get('month');
  if(u.get('asOf'))document.getElementById('asOf').value=u.get('asOf');
  document.getElementById('status').textContent='ボタンを押してください';
  run().then(function(){if(u.get('view')==='chart')setView('chart');});
}
init();
</script>
