        const REMOVE_IDS=['s5','s6','s7','s8','s9','s10'];
        let migrated=false;
        parsed.forEach(sec=>{
          const before=sec.items.length;
          sec.items=sec.items.filter(function(i){return !REMOVE_IDS.includes(i.id);});
          if(sec.items.length!==before)migrated=true;
        });
        // マイグレーション②: standalone → group変換（大テーマ化 2026-05-01）
        // s1/s4/s11/s12/s13/s14 が g:true でなければグループに変換
        // s1(社会保険)/c2(保険)は自動計算行なのでgroupに変換しない
        const TO_GROUP={
          s4:'s4a',s11:'s11a',s12:'s12a',s13:'s13a',s14:'s14a'
          // c3/c4/c5は会計実績自動計算のため除外
        };
        // s1/c2/c3/c4/c5がグループになっていたら単独行に戻す（自動計算を復元）
        parsed.forEach(function(sec){(sec.items||[]).forEach(function(item){
          if(['s1','c2','c3','c4','c5'].includes(item.id)&&item.g){item.g=false;delete item.subs;migrated=true;}
        });});
        parsed.forEach(function(sec){
          (sec.items||[]).forEach(function(item){
            if(TO_GROUP[item.id]&&!item.g){
              item.g=true;
              if(!item.subs||!item.subs.length){
                item.subs=[{id:TO_GROUP[item.id],n:item.n+'①'}];
              }
              migrated=true;
            }
          });
        });
        // マイグレーション③: c7（その他原価）を c5（修理）の直後に移動
        parsed.forEach(function(sec){
          var cg=sec.id==='cg';if(!cg)return;
          var items=sec.items||[];
          var i7=items.findIndex(function(x){return x.id==='c7';});
          var i5=items.findIndex(function(x){return x.id==='c5';});
          if(i7>-1&&i5>-1&&i7!==i5+1){
            var item7=items.splice(i7,1)[0];
            var ni5=items.findIndex(function(x){return x.id==='c5';});
            items.splice(ni5+1,0,item7);
            sec.items=items;migrated=true;
          }
        });
        if(migrated){localStorage.setItem(stKey(),JSON.stringify(parsed));}
        return parsed;
      }
    }
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT[store]));
}

async function sbg(t,k){try{const r=await fetch(`${SU}/rest/v1/${t}?key=eq.${encodeURIComponent(k)}&select=key,value`,{headers:{apikey:SK,'Authorization':authHeader()}});const d=await r.json();return Array.isArray(d)&&d[0]?d[0].value:null;}catch(e){return null;}}

async function init(){
  const tbl='bt_app_settings';
  if(!localStorage.getItem(stKey())){
    const sbSt=await sbg(tbl,'cm_st_'+store);
    if(sbSt){try{const parsed=JSON.parse(sbSt);if(Array.isArray(parsed)&&parsed.length>0){localStorage.setItem(stKey(),sbSt);}}catch(e){}}
  }
  ST=loadST();
  const acctKey=store==='tkm'?'bt_accounting':'spk_accounting';
  const vTbl=store==='tkm'?'bt_vehicles':'vehicles';
  const logsTable=store==='tkm'?'bt_logs':'logs';
  const logsStoreFilter=store==='tkm'?'':'&store_id=eq.sapporo';
  // 会計実績・車両保険・整備記録を並列取得
  const [ps2,budgetPs2,acctRaw,vehRaw,logsRaw]=await Promise.all([
    Promise.all(MS.map(m=>sbg(tbl,`cm_${store}_${year}-${m}`))),           // 実績
    Promise.all(MS.map(m=>sbg(tbl,`cm_budget_${store}_${year}-${m}`))),    // 予算
    sbqA(acctKey,`type=in.(card_pay,cash_out)&date=gte.${year}-01-01&date=lte.${year}-12-31&select=type,category,amount,date`),
    sbqA(vTbl,`select=code,name,plate_no,type,active,insurance_annual,lease_monthly,car_tax,shaken_cost,tenken_cost&active=eq.true&order=type,code`),
    sbqA(logsTable,`select=type,cost,date${logsStoreFilter}&date=gte.${year}-01-01&date=lte.${year}-12-31&type=in.(inspection,semi_annual,repair,other,oil)`)
  ]);
  const ps=ps2;
  // 会計実績: {ym: {card: {cat: amt}, cash: {cat: amt}}}
  window._acctData={};
  (acctRaw||[]).forEach(r=>{
    const m=(r.date||'').slice(0,7);
    if(!window._acctData[m])window._acctData[m]={card:{},cash:{}};
    const grp=r.type==='card_pay'?'card':'cash';
    const cat=r.category||'その他';
    window._acctData[m][grp][cat]=(window._acctData[m][grp][cat]||0)+(r.amount||0);
  });
  // ★ 車両マスター連動（全コスト項目を月額換算）
  const _vehs=(vehRaw||[]).filter(v=>v.active!==false);
  window._vehicleIns=_vehs.reduce((s,v)=>s+(Number(v.insurance_annual)||0),0); // 月額
  window._vehicleTaxMonth=Math.round(_vehs.reduce((s,v)=>s+(Number(v.car_tax)||0),0)/12); // 年額÷12
  window._vehicleShakenMonth=Math.round(_vehs.reduce((s,v)=>s+(Number(v.shaken_cost)||0),0)/24); // 2年周期÷24
  window._vehicleTenkenMonth=Math.round(_vehs.reduce((s,v)=>s+(Number(v.tenken_cost)||0),0)/6); // 半年×2/年→÷6
  // ★ クラス定義取得（bt_classes でクラス名・色・順序を取得）
  let _classDefs=[];
  try{
    const r=await fetch(`${SU}/rest/v1/bt_classes?store_id=eq.tkm&order=sort_order&select=*`,{headers:{apikey:SK,'Authorization':authHeader()}});
    const d=await r.json();
    if(Array.isArray(d))_classDefs=d;
  }catch(e){}
  const _classMap={};_classDefs.forEach(c=>{_classMap[c.id]={name:c.name,color:c.color,sort:c.sort_order};});
  // ★ リース: 車両ごとに sub を動的生成 + クラス別グルーピング
  window._vehicleLeaseMap={};
  // クラス順 → 車両コード順 でソート
  const _sortedVehs=[..._vehs].sort((a,b)=>{
    const sa=_classMap[a.type]?.sort||999;
    const sb=_classMap[b.type]?.sort||999;
    if(sa!==sb)return sa-sb;
    return (a.code||'').localeCompare(b.code||'');
  });
  const _leaseSubs=[];
  let _prevClass=null;
  _sortedVehs.forEach(v=>{
    // クラスが変わったらヘッダ追加
    if(v.type!==_prevClass){
      const cls=_classMap[v.type]||{name:v.type||'未分類',color:'#64748b'};
      _leaseSubs.push({id:'cls_header_'+v.type,n:`${v.type} ${cls.name}`,_auto:'class_header',_color:cls.color});
      _prevClass=v.type;
    }
    const id='lease_'+v.code;
    window._vehicleLeaseMap[id]=Number(v.lease_monthly)||0;
    const nm=v.name||v.code;
    const no=v.plate_no?' '+v.plate_no:'';
    _leaseSubs.push({id,n:nm+no,_auto:'lease'});
  });
  // ST.cg.c1 のサブを動的置換（リース/ローン合計）
  // ★ 自動連動以外の legacy hardcoded subs(A,B,C,D,E,c1a-e等)は破棄。マスター連動のみ表示
  (ST||[]).forEach(function(sec){
    if(sec.id!=='cg')return;
    (sec.items||[]).forEach(function(item){
      if(item.code==='cogs_lease'){
        item.subs=_leaseSubs;
        item.g=true;
      }
    });
  });
  // ★ 税金: s11 (sga_tax) に自動車税 sub を追加
  (ST||[]).forEach(function(sec){
    if(sec.id!=='sg')return;
    (sec.items||[]).forEach(function(item){
      if(item.code==='sga_tax'){
        const manual=(item.subs||[]).filter(s=>!s._auto);
        item.subs=[{id:'auto_car_tax',n:'🚗 自動車税（マスター連動）',_auto:'car_tax'}].concat(manual);
        item.g=true;
      }
    });
  });
  // ★ 整備記録（bt_logs/hm_logs）から車検・点検・修理を月別集計（車両タブ 月別推移と同じ値）
  window._maintData={inspection:{},maintenance:{},repair:{},other:{}};
  (logsRaw||[]).forEach(function(r){
    var m=(r.date||'').slice(0,7);
    var cost=Number(r.cost||0);
    if(r.type==='inspection') window._maintData.inspection[m]=(window._maintData.inspection[m]||0)+cost;
    if(r.type==='semi_annual') window._maintData.maintenance[m]=(window._maintData.maintenance[m]||0)+cost;
    if(r.type==='repair') window._maintData.repair[m]=(window._maintData.repair[m]||0)+cost;
    if(r.type==='other'||r.type==='oil') window._maintData.other[m]=(window._maintData.other[m]||0)+cost;
  });
  // 会計実績インジケータ更新
  var acctCnt=Object.keys(window._acctData||{}).length;
  var acctInd=document.getElementById('acct_indicator');
  if(acctInd)acctInd.textContent=acctCnt>0?'📊 会計実績 '+acctCnt+'ヶ月':'📊 会計実績なし';
  vals={};
  ps2.forEach((raw,i)=>{if(!raw)return;try{const d=JSON.parse(raw);Object.entries(d).forEach(([id,a])=>{if(!vals[id])vals[id]={};vals[id][`${year}-${MS[i]}`]=a;});}catch(e){}});
  budgetVals={};
  budgetPs2.forEach((raw,i)=>{if(!raw)return;try{const d=JSON.parse(raw);Object.entries(d).forEach(([id,a])=>{if(!budgetVals[id])budgetVals[id]={};budgetVals[id][`${year}-${MS[i]}`]=a;});}catch(e){}});
  // ★ localStorageキャッシュをマージ（画面遷移前のオートセーブ未完分を救済）
  try{
    var _lsVals=localStorage.getItem('cm_vals_'+store+'_'+year);
    var _lsTs=parseInt(localStorage.getItem('cm_vals_ts_'+store+'_'+year)||'0');
    var _sbMaxTs=0;ps2.forEach(function(raw){if(raw){var d=JSON.parse(raw||'{}');if(d._ts&&d._ts>_sbMaxTs)_sbMaxTs=d._ts;}});
    if(_lsVals&&_lsTs>_sbMaxTs){var _lv=JSON.parse(_lsVals);Object.entries(_lv).forEach(function([id,months]){if(!vals[id])vals[id]={};Object.assign(vals[id],months);});}
  }catch(e){}
  // ★ 旧スタンドアロン値 → 新サブItemへ自動移行（グループ化対応）
  // グループ化前に親IDで保存された値を子IDに移し、gv()が正しく拾えるようにする
  var MIGRATE_VALS={s4:'s4a',s11:'s11a',s12:'s12a',s13:'s13a',s14:'s14a',c3:'c3a',c4:'c4a',c5:'c5a'};
  var valsMigrated=false;
  Object.entries(MIGRATE_VALS).forEach(function([oldId,newId]){
    if(vals[oldId]&&!vals[newId]){vals[newId]=vals[oldId];delete vals[oldId];valsMigrated=true;}
  });
  // 移行後は即autosaveして cm_bt_${ym} を上書き（次回も正しく読める）
  if(valsMigrated)setTimeout(function(){autoSave();saveAccountCodeKeys();},100);
  render();
  // monthly.html連携用: ST構造とcost_*キーを自動更新
  saveST(); // ST構造をSupabaseに保存（カスタム項目含む）
  setTimeout(saveAccountCodeKeys, 300);
}

function _maintVal(code,ym){
  var mk=code==='cogs_inspection'?'inspection':code==='cogs_maintenance'?'maintenance':code==='cogs_other'?'other':'repair';

// 社会保険 = 給与合計（s2）× 15% 自動計算
function getSocialInsurance_(ym){
  var sgaSec=ST.find(function(s){return s.id==='sg';});
  if(!sgaSec)return 0;
  var salaryItem=(sgaSec.items||[]).find(function(i){return i.id==='s2';});
  if(!salaryItem)return 0;
  return Math.round(gv(salaryItem,ym)*0.15);
}
function _getV(id,ym){
  // ★ マスタ自動連動値（リース・自動車税）
  if(window._vehicleLeaseMap&&Object.prototype.hasOwnProperty.call(window._vehicleLeaseMap,id))return window._vehicleLeaseMap[id]||0;
  if(id==='auto_car_tax')return window._vehicleTaxMonth||0;
  return mode==='yosan'?((budgetVals[id]&&budgetVals[id][ym])||0):((vals[id]&&vals[id][ym])||0);
}
function gv(item,ym){
  if(item.g)return(item.subs||[]).reduce((s,b)=>s+_getV(b.id,ym),0);
  if(item.code==='sga_social_ins')return getSocialInsurance_(ym);
  if(item.code==='cogs_insurance')return window._vehicleIns||0;
  // ★ マスタ自動: 車検（÷24）・半年点検（÷6）
  if(item.code==='cogs_inspection')return mode==='yosan'?_getV(item.id,ym):(window._vehicleShakenMonth||0);
  if(item.code==='cogs_maintenance')return mode==='yosan'?_getV(item.id,ym):(window._vehicleTenkenMonth||0);
  if(_isMaintCode(item.code))return mode==='yosan'?_getV(item.id,ym):_maintVal(item.code,ym);
  return _getV(item.id,ym);
}
function ga(item){
  if(item.g)return MS.reduce((s,m)=>s+gv(item,year+'-'+m),0);
  if(item.code==='sga_social_ins')return MS.reduce((s,m)=>s+getSocialInsurance_(year+'-'+m),0);
  if(item.code==='cogs_insurance')return (window._vehicleIns||0)*12;
  if(_isMaintCode(item.code))return mode==='yosan'?MS.reduce((s,m)=>s+_getV(item.id,year+'-'+m),0):MS.reduce((s,m)=>s+_maintVal(item.code,year+'-'+m),0);
  return MS.reduce((s,m)=>s+gv(item,`${year}-${m}`),0);
}

// 🗑️ 完全リセット（DB+localStorage全クリア）
async function completeReset(){
  if(!confirm('⚠️ コスト内訳の全データを削除します（DB + ブラウザキャッシュ）\n\n実行しますか？'))return;
  try{
    // 1. localStorage の cm_* キーを全削除
    const removed=[];
    for(let i=localStorage.length-1;i>=0;i--){
      const k=localStorage.key(i);
      if(k&&(k.startsWith('cm_')||k.startsWith('cost_'))){removed.push(k);localStorage.removeItem(k);}
    }
    console.log('[reset] localStorage cleared:',removed);
    // 2. DB の cm_*/cost_*/cm_budget_* を削除
    const patterns=['cm_tkm_*','cost_tkm_*','cm_budget_tkm_*','cm_spk_*','cost_spk_*','cm_budget_spk_*'];
    for(const p of patterns){
      await fetch(`${SU}/rest/v1/bt_app_settings?key=like.${encodeURIComponent(p)}`,{
        method:'DELETE',
        headers:{apikey:SK,'Authorization':authHeader()}
      });
    }
    alert('✅ 完全リセット完了\nページを再読込します');
    // 3. autoSaveを止めてからリロード（再書込み防止）
    clearTimeout(autoSaveTimer);
    clearTimeout(window._autoSaveT2);
    window._cmResetting=true;
    setTimeout(()=>{location.reload();},300);
  }catch(e){
    alert('❌ リセット失敗: '+e.message);
    console.error('[reset]',e);
  }
}

var autoSaveTimer=null;

  if(window._cmResetting)return; // リセット中は保存しない
  clearTimeout(autoSaveTimer);
  autoSaveTimer=setTimeout(function(){
    var tbl='bt_app_settings';
    var promises=[];
    MS.forEach(function(m){
      var ym=year+'-'+m;
      var mv={};
      ST.forEach(function(sec){sec.items.forEach(function(item){

        else if(vals[item.id]&&vals[item.id][ym])mv[item.id]=vals[item.id][ym];
      });});
      if(Object.keys(mv).length>0)promises.push(sbu(tbl,'cm_'+store+'_'+ym,JSON.stringify(mv)));
    });
    Promise.all(promises).then(function(){

function editNm(secId,itemId,subId,spanEl){
  const cur=spanEl.textContent.trim();
  const inp=document.createElement('input');
  inp.className='nm-edit';inp.value=cur;
  spanEl.parentNode.insertBefore(inp,spanEl);
  spanEl.style.display='none';inp.focus();inp.select();
  function done(){
    const nv=inp.value.trim();
    if(nv){
      ST.forEach(sec=>{if(sec.id!==secId)return;
        if(subId)sec.items.forEach(i=>{if(i.id===itemId)(i.subs||[]).forEach(s=>{if(s.id===subId)s.n=nv;});});
        else sec.items.forEach(i=>{if(i.id===itemId)i.n=nv;});
      });
      saveST();
    }
    inp.remove();spanEl.style.display='';
    if(nv)spanEl.textContent=nv;
  }
  collectInputs();
  inp.onblur=done;
  inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();done();}if(e.key==='Escape'){inp.remove();spanEl.style.display='';}};
}

  // ★ theadにサマリー行を含める → スクロール時も日付・コスト合計が常に固定表示
  // 各行のtop値: 行1=0px、行2〜5は前行の高さを累積
  var T0=27,TS=20; // col-header行高さ / サマリー行高さ（近似値）
  let h=`<table><thead>`;
  // 行1: 日付ヘッダー（top:0）
  h+=`<tr><th class="ic">項目</th>`;
  MS.forEach(m=>h+=`<th>${year}/${parseInt(m)}月</th>`);
  h+=`<th class="tc">年計</th></tr>`;
  // 行2-4: コスト3行（theadに配置 → sticky）
  (function(){
    var sRows=[
      {id:'ts_sg',bg:'#fff5f5',tc:'#991b1b',icon:'📋',label:'販管費①（手動入力）',vals:_sg0,t:T0},
      {id:'ts_ac',bg:'#eff6ff',tc:'#1e40af',icon:'📊',label:'販管費②（会計実績）',vals:_acctM,t:T0+TS},
      {id:'ts_cg',bg:'#fffbeb',tc:'#92400e',icon:'📦',label:'売上原価（リース/保険/修理等）',vals:_cg0,t:T0+TS*2},
    ];
    sRows.forEach(function(r){
      var ann=r.vals.reduce(function(s,v){return s+v;},0);
      var cs='position:sticky;top:'+r.t+'px;border-bottom:1px solid #e2e8f0;border-right:1px solid #e2e8f0;z-index:10;';
      h+='<tr style="background:'+r.bg+'">';
      h+='<th class="ic" style="'+cs+'background:'+r.bg+'!important;text-align:left;padding:3px 10px;font-size:10px;font-weight:700;color:'+r.tc+';z-index:21">'+r.icon+' '+r.label+'</th>';
      r.vals.forEach(function(v,i){h+='<th id="'+r.id+'_'+MS[i]+'" style="'+cs+'background:'+r.bg+';color:'+r.tc+';font-size:10px;font-weight:'+(v>0?700:400)+'">'+(v>0?'¥'+v.toLocaleString():'—')+'</th>';});
      h+='<th id="'+r.id+'_ann" style="'+cs+'background:'+r.bg+';color:'+r.tc+';font-size:10px;font-weight:800;background:'+r.bg+'!important">'+(ann>0?'¥'+ann.toLocaleString():'—')+'</th></tr>';
    });
    // 行5: 🔴 総支出
    var ttVals=MS.map(function(_,i){return _sg0[i]+(_acctM[i]||0)+_cg0[i];});
    var ttAnn=ttVals.reduce(function(s,v){return s+v;},0);
    var ttT=T0+TS*3;
    var cs2='position:sticky;top:'+ttT+'px;border-bottom:2px solid #7f1d1d;border-right:1px solid rgba(255,255,255,.2);z-index:10;';
    h+='<tr style="background:#7f1d1d">';
    h+='<th class="ic" style="'+cs2+'background:#7f1d1d!important;text-align:left;padding:4px 10px;font-size:11px;font-weight:900;color:#fff;letter-spacing:.03em;z-index:21">🔴 総支出（販管費①②＋売上原価）</th>';
    ttVals.forEach(function(v,i){h+='<th id="ts_tt_'+MS[i]+'" style="'+cs2+'background:#7f1d1d;color:#fff;font-size:11px;font-weight:900">'+(v>0?'¥'+v.toLocaleString():'—')+'</th>';});
    h+='<th id="ts_tt_ann" style="'+cs2+'background:rgba(0,0,0,.25)!important;color:#fff;font-size:11px;font-weight:900">'+(ttAnn>0?'¥'+ttAnn.toLocaleString():'—')+'</th></tr>';
  })();
  h+=`</thead><tbody>`;

  ST.forEach(sec=>{
    // セクションヘッダー（クリックで折りたたみ）
    // 返済(rg)は総支出の後に独立描画するのでループ内ではスキップ
    if(sec.id==='rg')return;
    const isCollapsed=!!_collapsed[sec.id];
    const arrow=isCollapsed?'▶':'▼';
    h+=`<tr style="cursor:pointer" onclick="toggleCollapse('${sec.id}')"><td colspan="${ncols+1}" style="padding:7px 10px;font-weight:800;font-size:11px;background:${sec.c}18;color:${sec.c};border-bottom:1px solid ${sec.c}30;letter-spacing:.05em;user-select:none">${arrow} ${sec.t}</td></tr>`;
    if(isCollapsed){
      // 折りたたみ中：合計行だけ表示
      var secLabel=sec.id==='sg'?'📋 販管費①（手動入力）合計':sec.id==='cg'?'📦 売上原価 合計':'🏦 返済 合計';
      var _cmV=MS.map(function(m){var ym=year+'-'+m;return sec.items.reduce(function(s,i){return s+gv(i,ym);},0);});
      _secM[sec.id]=_cmV;
      h+=`<tr class="tr-row" style="background:${sec.c}"><td class="ic" style="background:${sec.c};font-size:11px">${secLabel}</td>`;
      _cmV.forEach(function(v){h+=`<td>${fmtT(v)}</td>`;});
      h+=`<td style="background:rgba(0,0,0,.15)">${fmtT(_cmV.reduce(function(s,v){return s+v;},0))}</td></tr>`;
      h+=`<tr><td colspan="${ncols+1}" style="height:4px;background:transparent;border:none"></td></tr>`;
      // 会計実績の折りたたみ合計（sgの場合）
      if(sec.id==='sg'){
        var aData2=window._acctData||{},yr2=String(year);
        var tot2=MS.map(function(m){
          var c=Object.values((aData2[yr2+'-'+m]||{}).card||{}).reduce(function(s,v){return s+v;},0);
          var h2=Object.values((aData2[yr2+'-'+m]||{}).cash||{}).reduce(function(s,v){return s+v;},0);
          return c+h2;
        });
        var ann2=tot2.reduce(function(s,v){return s+v;},0);
        if(ann2>0){
          h+='<tr class="tr-row" style="background:#1e40af"><td class="ic" style="background:#1e40af;font-size:11px">📊 販管費②（会計実績）合計</td>';
          tot2.forEach(function(v){h+='<td>'+(v>0?'¥'+v.toLocaleString():'—')+'</td>';});
          h+='<td style="background:rgba(0,0,0,.2)">'+(ann2>0?'¥'+ann2.toLocaleString():'—')+'</td></tr>';
          h+='<tr><td colspan="'+(ncols+1)+'" style="height:4px;background:transparent;border:none"></td></tr>';
        }
      }
      return;
    }

    sec.items.forEach(item=>{
      if(item.g){
        // グループ合計行（クリックで折りたたみ）
        const icKey=sec.id+'_'+item.id;
        const icCollapsed=!!_itemCollapsed[icKey];
        const icArrow=icCollapsed?'▶':'▼';
        h+=`<tr class="gr" style="cursor:pointer" onclick="toggleItemCollapse('${sec.id}','${item.id}')"><td class="ic"><div class="nm-cell">
          <span style="color:${sec.c};flex-shrink:0;margin-right:2px;font-size:10px">${icArrow}</span>
          <span class="nm-txt" ondblclick="editNm('${sec.id}','${item.id}',null,this);event.stopPropagation();" title="ダブルクリックで編集">${item.n}</span>
          <span style="font-size:9px;color:#94a3b8;flex-shrink:0;margin-left:2px">合計</span>
          <div class="nm-ops" onclick="event.stopPropagation()">
            <button class="op add" onclick="addItem('${sec.id}','${item.id}','${item.id}')" title="サブ行を追加">＋</button>
            <button class="op del" onclick="delItem('${sec.id}','${item.id}',null)">✕</button>
          </div>
        </div></td>`;
        MS.forEach(m=>{const ym=`${year}-${m}`;const v=gv(item,ym);h+=`<td><span id="gc_${item.id}_${m}" style="color:${v>0?sec.c:'#94a3b8'}">${v>0?('¥'+v.toLocaleString()):'—'}</span></td>`;});
        h+=`<td style="font-weight:700;color:#374151"><span id="an_${item.id}">${fmt(ga(item))}</span></td></tr>`;
        // サブ行（折りたたみ時は非表示）
        if(!icCollapsed)(item.subs||[]).forEach(sub=>{
          // ★ クラスヘッダ行（_auto:'class_header'）はラベル行として描画
          if(sub._auto==='class_header'){
            h+=`<tr class="sr"><td colspan="${MS.length+2}" style="padding:5px 10px 4px 18px;background:linear-gradient(90deg,${sub._color||'#94a3b8'}15,#fff);border-left:3px solid ${sub._color||'#94a3b8'};font-size:10px;font-weight:800;color:${sub._color||'#374151'};letter-spacing:.05em">▸ ${sub.n}</td></tr>`;
            return;
          }
          // ★ 自動連動 sub は読み取り専用表示
          const isAuto=!!sub._auto;
          const padL=isAuto?12:4;
          h+=`<tr class="sr"><td class="ic"><div class="nm-cell" style="padding-left:${padL}px">
            <span style="color:#94a3b8;flex-shrink:0;margin-right:2px">└</span>
            <span class="nm-txt"${isAuto?'':` ondblclick="editNm('${sec.id}','${item.id}','${sub.id}',this)"`}>${sub.n}${isAuto?' <span style="font-size:9px;color:#6366f1;font-weight:600;background:#eef2ff;padding:1px 4px;border-radius:3px;margin-left:4px">🔗マスタ</span>':''}</span>
            ${isAuto?'':`<div class="nm-ops"><button class="op del" onclick="delItem('${sec.id}','${item.id}','${sub.id}')">✕</button></div>`}
          </div></td>`;
          if(isAuto){
            // 自動値: 全月同額表示・入力欄なし
            MS.forEach(m=>{const ym=`${year}-${m}`;const v=_getV(sub.id,ym);
              h+=`<td style="text-align:right;padding:4px 6px;color:#6366f1;font-weight:600;background:#f8fafc">${v>0?'¥'+v.toLocaleString():'—'}</td>`;});
            h+=`<td style="color:#374151;font-weight:700">${fmt(ga({id:sub.id,g:false}))}</td></tr>`;
          }else{
            MS.forEach(m=>{const ym=`${year}-${m}`;const v=_getV(sub.id,ym);const dv=v>0?v.toLocaleString():'';
              h+=`<td><input type="text" inputmode="numeric" class="ci" id="inp_${sub.id}_${m}" data-id="${sub.id}" data-ym="${ym}" value="${dv}" oninput="(mode==='yosan'?onchBudget:onch)('${sub.id}','${ym}',this.value)"></td>`;});
            h+=`<td style="color:#64748b"><span id="an_${sub.id}">${fmt(ga({id:sub.id,g:false}))}</span></td></tr>`;
          }
        });
      }else if(item.code==='sga_social_ins'){
        // 社会保険：給与合計×15% 自動計算（読み取り専用）
        h+=`<tr style="background:#fdf2f8"><td class="ic" style="background:#fdf2f8!important"><div class="nm-cell">
          <span style="width:14px;flex-shrink:0"></span>
          <span class="nm-txt">${item.n}</span>
          <span style="font-size:9px;background:#fce7f3;color:#be185d;border-radius:3px;padding:1px 5px;margin-left:5px;white-space:nowrap">💴 給与×15%</span>
        </div></td>`;
        MS.forEach(m=>{const v=getSocialInsurance_(year+'-'+m);h+=`<td id="si_${m}" style="color:#be185d;font-weight:600;background:#fdf2f8;text-align:right;padding:4px 5px">${v>0?'¥'+v.toLocaleString():'—'}</td>`;});
        const siAnn=MS.reduce((s,m)=>s+getSocialInsurance_(year+'-'+m),0);
        h+=`<td id="si_ann" style="color:#be185d;font-weight:800;background:#fce7f3;text-align:right;padding:4px 5px">${siAnn>0?'¥'+siAnn.toLocaleString():'—'}</td></tr>`;
      }else if(_isMaintCode(item.code)){
        // 車検・点検・修理：整備記録から自動反映（読み取り専用）
        const yrS=String(year);
        // ★ 車両費合計ヘッダー（cogs_inspectionの前にのみ挿入）
        if(item.code==='cogs_inspection'){
          const totM=MS.map(m=>['cogs_inspection','cogs_maintenance','cogs_repair','cogs_other'].reduce((s,c)=>s+_maintVal(c,yrS+'-'+m),0));
          const totAnn=totM.reduce((s,v)=>s+v,0);
          h+=`<tr style="background:#166534"><td class="ic" style="background:#166534!important;color:#fff;font-weight:900;padding:7px 10px;font-size:11px;letter-spacing:.04em">🚗 車両費合計（車検・点検・修理・その他）</td>`;
          totM.forEach(v=>h+=`<td style="background:#166534;color:${v>0?'#86efac':'#4ade80'};font-weight:${v>0?800:400};text-align:right;padding:5px">${v>0?'¥'+v.toLocaleString():'—'}</td>`);
          h+=`<td style="background:#14532d;color:${totAnn>0?'#86efac':'#94a3b8'};font-weight:900;text-align:right;padding:5px">${totAnn>0?'¥'+totAnn.toLocaleString():'—'}</td></tr>`;
        }
        h+=`<tr style="background:#f0fdf4"><td class="ic" style="background:#f0fdf4!important"><div class="nm-cell">
          <span style="width:20px;flex-shrink:0"></span>
          <span class="nm-txt">${item.n}</span>
          <span style="font-size:9px;background:#dcfce7;color:#15803d;border-radius:3px;padding:1px 5px;margin-left:5px;white-space:nowrap">🚗 車両記録</span>
        </div></td>`;
        MS.forEach(m=>{const v=_maintVal(item.code,yrS+'-'+m);h+=`<td style="color:#15803d;font-weight:600;background:#f0fdf4;text-align:right;padding:4px 5px">${v>0?'¥'+v.toLocaleString():'—'}</td>`;});
        const ann=MS.reduce((s,m)=>s+_maintVal(item.code,yrS+'-'+m),0);
        h+=`<td style="color:#15803d;font-weight:800;background:#dcfce7;text-align:right;padding:4px 5px">${ann>0?'¥'+ann.toLocaleString():'—'}</td></tr>`;
      }else if(item.code==='cogs_insurance'){
        // 保険行：車両タブから自動反映（読み取り専用）
        const ins=window._vehicleIns||0;
        h+=`<tr style="background:#faf5ff"><td class="ic" style="background:#faf5ff!important"><div class="nm-cell">
          <span style="width:14px;flex-shrink:0"></span>
          <span class="nm-txt">${item.n}</span>
          <span style="font-size:9px;background:#ede9fe;color:#7c3aed;border-radius:3px;padding:1px 5px;margin-left:5px;white-space:nowrap">🚗 車両タブ</span>
        </div></td>`;
        MS.forEach(()=>{h+=`<td style="color:#7c3aed;font-weight:600;background:#faf5ff;text-align:right;padding:4px 5px">${ins>0?'¥'+ins.toLocaleString():'—'}</td>`;});
        h+=`<td style="color:#7c3aed;font-weight:800;background:#ede9fe;text-align:right;padding:4px 5px">${ins>0?'¥'+(ins*12).toLocaleString():'—'}</td></tr>`;
      }else{
        // 通常の単独行
        h+=`<tr><td class="ic"><div class="nm-cell">
          <span style="width:14px;flex-shrink:0"></span>
          <span class="nm-txt" ondblclick="editNm('${sec.id}','${item.id}',null,this)">${item.n}</span>
          <div class="nm-ops">
            <button class="op del" onclick="delItem('${sec.id}','${item.id}',null)">✕</button>
          </div>
        </div></td>`;
        MS.forEach(m=>{const ym=`${year}-${m}`;const v=_getV(item.id,ym);const dv=v>0?v.toLocaleString():'';
          h+=`<td><input type="text" inputmode="numeric" class="ci" id="inp_${item.id}_${m}" data-id="${item.id}" data-ym="${ym}" value="${dv}" oninput="(mode==='yosan'?onchBudget:onch)('${item.id}','${ym}',this.value)"></td>`;});
        h+=`<td style="color:#64748b"><span id="an_${item.id}">${fmt(ga(item))}</span></td></tr>`;
      }
    });

    // 行追加ボタン
    h+=`<tr class="add-row"><td class="ic" style="padding:4px 8px"><button class="add-btn" onclick="openAddModal('${sec.id}',null,null)">＋ 行を追加</button></td><td colspan="${ncols}" style="border:none"></td></tr>`;

    // ★合計行（販管費①/売上原価/返済 でラベル分け）
    var secLabel=sec.id==='sg'?'📋 販管費①（手動入力）合計':sec.id==='cg'?'📦 売上原価 合計':'🏦 返済 合計';
    var _mVals=MS.map(function(m){var ym=year+'-'+m;return sec.items.reduce(function(s,i){return s+gv(i,ym);},0);});
    _secM[sec.id]=_mVals;
    h+=`<tr class="tr-row" style="background:${sec.c}"><td class="ic" style="background:${sec.c};font-size:11px">${secLabel}</td>`;
    _mVals.forEach(function(v,i){h+=`<td id="st_${sec.id}_${MS[i]}">${fmtT(v)}</td>`;});
    h+=`<td id="sta_${sec.id}" style="background:rgba(0,0,0,.15)">${fmtT(_mVals.reduce(function(s,v){return s+v;},0))}</td></tr>`;
    h+=`<tr><td colspan="${ncols+1}" style="height:6px;background:transparent;border:none"></td></tr>`;

    // ★ 販管費(sg)の直後に会計実績を挿入
    if(sec.id==='sg'){
      var aData=window._acctData||{};
      var yr=String(year);
      var cardCats={},cashCats={};
      MS.forEach(function(m){
        var a=aData[yr+'-'+m];if(!a)return;
        Object.keys(a.card||{}).forEach(function(c){cardCats[c]=1;});
        Object.keys(a.cash||{}).forEach(function(c){cashCats[c]=1;});
      });
      // 売上原価行に個別反映済みのカテゴリは会計実績枠から除外（整備記録で計上済）
      var ACCT_EXCLUDE=function(c){return c.includes('修理')||c.includes('車検')||c.includes('点検')||c.includes('整備');};
      var _acctSum=function(obj){return Object.entries(obj||{}).filter(function(e){return !ACCT_EXCLUDE(e[0]);}).reduce(function(s,e){return s+e[1];},0);};
      var cKeys=Object.keys(cardCats).filter(function(c){return !ACCT_EXCLUDE(c);}).sort();
      var hKeys=Object.keys(cashCats).filter(function(c){return !ACCT_EXCLUDE(c);}).sort();
      if(cKeys.length>0||hKeys.length>0){
        var acctCol=!!_collapsed['acct'];
        var acctArr=acctCol?'▶':'▼';
        h+='<tr style="cursor:pointer" onclick="toggleCollapse(\'acct\')"><td colspan="'+(ncols+1)+'" style="padding:7px 10px;font-weight:800;font-size:11px;background:#eff6ff;color:#1d4ed8;border-top:2px solid #bfdbfe;border-bottom:2px solid #bfdbfe;letter-spacing:.05em;user-select:none">'+acctArr+' 📊 会計実績（自動取得）</td></tr>';
        if(acctCol){
          // 折りたたみ：合計行だけ（整備カテゴリ除外）
          var tot2c=MS.map(function(m){
            var cc=_acctSum((aData[yr+'-'+m]||{}).card);
            var hh=_acctSum((aData[yr+'-'+m]||{}).cash);
            return cc+hh;
          });
          var ann2c=tot2c.reduce(function(s,v){return s+v;},0);
          h+='<tr class="tr-row" style="background:#1e40af"><td class="ic" style="background:#1e40af;font-size:11px">📊 販管費②（会計実績）合計</td>';
          tot2c.forEach(function(v){h+='<td>'+(v>0?'¥'+v.toLocaleString():'—')+'</td>';});
          h+='<td style="background:rgba(0,0,0,.2)">'+(ann2c>0?'¥'+ann2c.toLocaleString():'—')+'</td></tr>';
          h+='<tr><td colspan="'+(ncols+1)+'" style="height:4px;background:transparent;border:none"></td></tr>';
        } else {
        if(cKeys.length>0){
          var cTots=MS.map(function(m){return _acctSum((aData[yr+'-'+m]||{}).card);});
          var cAnn=cTots.reduce(function(s,v){return s+v;},0);
          h+='<tr class="gr"><td class="ic" style="background:#eff6ff!important"><div class="nm-cell"><span style="color:#1d4ed8;margin-right:4px">💳</span><span class="nm-txt" style="color:#1d4ed8;font-weight:700">カード支払</span><span style="font-size:9px;color:#94a3b8;margin-left:3px">合計</span></div></td>';
          cTots.forEach(function(v){h+='<td style="color:#1d4ed8;font-weight:700;background:#eff6ff;text-align:right;padding:4px 5px;border-right:1px solid #dbeafe">'+(v>0?'¥'+v.toLocaleString():'—')+'</td>';});
          h+='<td style="font-weight:800;color:#1d4ed8;background:#dbeafe;text-align:right;padding:4px 5px">'+(cAnn>0?'¥'+cAnn.toLocaleString():'—')+'</td></tr>';
          cKeys.forEach(function(cat){
            var cvs=MS.map(function(m){return((aData[yr+'-'+m]||{}).card||{})[cat]||0;});
            var cT=cvs.reduce(function(s,v){return s+v;},0);
            h+='<tr class="sr"><td class="ic" style="background:#eff6ff!important"><div class="nm-cell" style="padding-left:4px"><span style="color:#94a3b8;margin-right:3px">└</span><span class="nm-txt" style="color:#374151">'+cat+'</span></div></td>';
            cvs.forEach(function(v){h+='<td style="background:#eff6ff;text-align:right;color:#374151;padding:4px 5px;border-right:1px solid #dbeafe">'+(v>0?'¥'+v.toLocaleString():'')+'</td>';});
            h+='<td style="background:#eff6ff;text-align:right;color:#64748b;padding:4px 5px">'+(cT>0?'¥'+cT.toLocaleString():'')+'</td></tr>';
          });
        }
        if(hKeys.length>0){
          var hTots=MS.map(function(m){return _acctSum((aData[yr+'-'+m]||{}).cash);});
          var hAnn=hTots.reduce(function(s,v){return s+v;},0);
          h+='<tr class="gr"><td class="ic" style="background:#fff7ed!important"><div class="nm-cell"><span style="color:#c2410c;margin-right:4px">💰</span><span class="nm-txt" style="color:#c2410c;font-weight:700">現金出金</span><span style="font-size:9px;color:#94a3b8;margin-left:3px">合計</span></div></td>';
          hTots.forEach(function(v){h+='<td style="color:#c2410c;font-weight:700;background:#fff7ed;text-align:right;padding:4px 5px;border-right:1px solid #fed7aa">'+(v>0?'¥'+v.toLocaleString():'—')+'</td>';});
          h+='<td style="font-weight:800;color:#c2410c;background:#fed7aa;text-align:right;padding:4px 5px">'+(hAnn>0?'¥'+hAnn.toLocaleString():'—')+'</td></tr>';
          hKeys.forEach(function(cat){
            var cvs=MS.map(function(m){return((aData[yr+'-'+m]||{}).cash||{})[cat]||0;});
            var cT=cvs.reduce(function(s,v){return s+v;},0);
            h+='<tr class="sr"><td class="ic" style="background:#fff7ed!important"><div class="nm-cell" style="padding-left:4px"><span style="color:#94a3b8;margin-right:3px">└</span><span class="nm-txt" style="color:#374151">'+cat+'</span></div></td>';
            cvs.forEach(function(v){h+='<td style="background:#fff7ed;text-align:right;color:#374151;padding:4px 5px;border-right:1px solid #fed7aa">'+(v>0?'¥'+v.toLocaleString():'')+'</td>';});
            h+='<td style="background:#fff7ed;text-align:right;color:#64748b;padding:4px 5px">'+(cT>0?'¥'+cT.toLocaleString():'')+'</td></tr>';
          });
        }
        // ★ 販管費② 合計（カード＋現金・整備カテゴリ除外）
        var tot2=MS.map(function(m){
          return _acctSum((aData[yr+'-'+m]||{}).card)+_acctSum((aData[yr+'-'+m]||{}).cash);
        });
        var ann2=tot2.reduce(function(s,v){return s+v;},0);
        h+='<tr class="tr-row" style="background:#1e40af"><td class="ic" style="background:#1e40af;font-size:11px">📊 販管費②（会計実績）合計</td>';
        tot2.forEach(function(v){h+='<td>'+(v>0?'¥'+v.toLocaleString():'—')+'</td>';});
        h+='<td style="background:rgba(0,0,0,.2)">'+(ann2>0?'¥'+ann2.toLocaleString():'—')+'</td></tr>';
        h+='<tr><td colspan="'+(ncols+1)+'" style="height:8px;background:transparent;border:none"></td></tr>';
        } // end else (acct expanded)
      }
    }
  });

  // ★ 返済(rg)の月別合計を先に計算（ループをスキップしたため）
  var _rgSec=ST.find(function(s){return s.id==='rg';});
  var _rgPre=_rgSec?MS.map(function(m){var ym=year+'-'+m;return _rgSec.items.reduce(function(s,i){return s+gv(i,ym);},0);}):MS.map(function(){return 0;});
  _secM.rg=_rgPre;

  // ★ グランドトータル — 内訳明示してから合計
  var _sg=_secM.sg||MS.map(function(){return 0;});
  var _cg=_secM.cg||MS.map(function(){return 0;});
  var _rg=_secM.rg||MS.map(function(){return 0;});

  h+='<tr><td colspan="'+(ncols+1)+'" style="height:6px;background:transparent;border:none"></td></tr>';

  // ★ 返済セクション（総支出の下に独立配置）
  if(_rgSec){
    var rgCol=!!_collapsed['rg'];
    var rgArr=rgCol?'▶':'▼';
    h+='<tr style="cursor:pointer" onclick="toggleCollapse(\'rg\')"><td colspan="'+(ncols+1)+'" style="padding:7px 10px;font-weight:800;font-size:11px;background:'+_rgSec.c+'18;color:'+_rgSec.c+';border-bottom:1px solid '+_rgSec.c+'30;letter-spacing:.05em;user-select:none">'+rgArr+' '+_rgSec.t+'</td></tr>';
    if(!rgCol){
      _rgSec.items.forEach(function(item){
        h+='<tr><td class="ic"><div class="nm-cell"><span style="width:14px;flex-shrink:0"></span><span class="nm-txt" ondblclick="editNm(\'rg\',\''+item.id+'\',null,this)">'+item.n+'</span><div class="nm-ops"><button class="op del" onclick="delItem(\'rg\',\''+item.id+'\',null)">✕</button></div></div></td>';
        MS.forEach(function(m){var ym=year+'-'+m;var v=_getV(item.id,ym);var dv=v>0?v.toLocaleString():'';
          h+='<td><input type="text" inputmode="numeric" class="ci" id="inp_'+item.id+'_'+m+'" data-id="'+item.id+'" data-ym="'+ym+'" value="'+dv+'" oninput="(mode===\'yosan\'?onchBudget:onch)(\''+item.id+'\',\''+ym+'\',this.value)"></td>';});
        h+='<td style="color:#64748b"><span id="an_'+item.id+'">'+fmt(ga(item))+'</span></td></tr>';
      });
      h+='<tr class="add-row"><td class="ic" style="padding:4px 8px"><button class="add-btn" onclick="openAddModal(\'rg\',null,null)">＋ 行を追加</button></td><td colspan="'+ncols+'" style="border:none"></td></tr>';
    }
    var rgAnn=_rgPre.reduce(function(s,v){return s+v;},0);
    h+='<tr class="tr-row" style="background:'+_rgSec.c+'"><td class="ic" style="background:'+_rgSec.c+';font-size:11px">🏦 返済 合計</td>';
    _rgPre.forEach(function(v){h+='<td>'+fmtT(v)+'</td>';});
    h+='<td style="background:rgba(0,0,0,.15)">'+fmtT(rgAnn)+'</td></tr>';
  }
  h+='<tr><td colspan="'+(ncols+1)+'" style="height:24px;background:transparent;border:none"></td></tr>';

  h+='</tbody></table>';
  document.getElementById('ct').innerHTML=h;
}

// sticky headerのtopを動的計算
function updateStickyTop(){
  const hdr=document.querySelector('.hdr');
  const ctrl=document.querySelector('.ctrl');
  const tblWrap=document.querySelector('.tbl-wrap');
  if(hdr&&ctrl){
    // ctrl.getBoundingClientRect().bottom = hdr+ctrl の合計高さ（viewport基準）
    const bottom=Math.ceil(ctrl.getBoundingClientRect().bottom);
    document.documentElement.style.setProperty('--hdr-h', bottom+'px');
    // height（max-heightではなく）で固定 → 常にoverflow → stickyが確実に動作する
    if(tblWrap){
      tblWrap.style.height=(window.innerHeight-bottom)+'px';
      tblWrap.style.overflow='auto';
    }
  }
}
window.addEventListener('load',updateStickyTop);
window.addEventListener('resize',updateStickyTop);

// ★ 画面離脱時に確実に保存（iOS Safari対応）
function _emergencySave(){
  collectInputs(); // フォーカス中の入力を回収
  try{localStorage.setItem('cm_vals_'+store+'_'+year,JSON.stringify(vals));localStorage.setItem('cm_vals_ts_'+store+'_'+year,String(Date.now()));}catch(e){}
}
window.addEventListener('beforeunload',_emergencySave);
document.addEventListener('visibilitychange',function(){if(document.hidden)_emergencySave();});
window.addEventListener('pagehide',_emergencySave);

const STORE_LABEL='BUDDICA TOURISM_高松店';

// === CSV出力（コスト内訳） ===
function exportCSV() {
  const tbl = document.querySelector('#ct table');
  if (!tbl) { alert('データが読み込まれていません'); return; }
  if (typeof collectInputs === 'function') collectInputs();
  let csv = '\uFEFF';
  tbl.querySelectorAll('tr').forEach(tr => {
    const cells = [];
    tr.querySelectorAll('th,td').forEach(td => {
      const inp = td.querySelector('input');
      let v;
      if (inp) {
        v = inp.value || '0';
      } else {
        v = td.innerText.replace(/\r?\n/g, ' ').trim();
      }
      if (v.includes(',') || v.includes('"') || v.includes('\n')) {
        v = '"' + v.replace(/"/g, '""') + '"';
      }
      cells.push(v);
    });
    csv += cells.join(',') + '\n';
  });
  const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = STORE_LABEL + '_コスト内訳_' + year + '_' + new Date().toISOString().slice(0,10) + '.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
