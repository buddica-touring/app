<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>📜 反映履歴 — BUDDICA TOURING</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Hiragino Sans",sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
.header{padding:24px;text-align:center;border-bottom:1px solid #1e293b}
.header .brand{font-size:9pt;letter-spacing:.3em;color:#64748b;margin-bottom:6px}
.header h1{font-size:18pt;font-weight:800;color:#fff}
.header .sub{font-size:9pt;color:#64748b;margin-top:4px}
.back{display:inline-block;margin-top:8px;color:#94a3b8;text-decoration:none;font-size:9pt}
.back:hover{text-decoration:underline;color:#0ea5e9}
.container{max-width:1000px;margin:0 auto;padding:20px 16px 60px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:18px 20px;margin-bottom:16px}
.card-title{font-size:12pt;font-weight:800;color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.actions{display:flex;gap:8px;margin-bottom:14px}
.btn{border:none;border-radius:8px;padding:8px 14px;font-size:9pt;font-weight:800;cursor:pointer;color:#fff;font-family:inherit}
.btn.sec{background:#475569}
.btn.sec:hover{background:#334155}
.btn.danger{background:#991b1b}
.btn.danger:hover{background:#7f1d1d}
.h-list{display:flex;flex-direction:column;gap:10px}
.h-item{background:#0f172a;border:1px solid #334155;border-radius:10px;padding:14px 16px}
.h-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px}
.h-date{font-size:10pt;color:#fff;font-weight:800;font-family:Menlo,monospace}
.h-month-count{background:#1e40af;color:#fff;padding:2px 10px;border-radius:6px;font-size:8.5pt;font-weight:700}
.h-meta{font-size:8.5pt;color:#94a3b8;margin-bottom:8px}
.h-meta strong{color:#cbd5e1}
.h-summary{background:#0b1020;border:1px solid #1e293b;border-radius:6px;padding:10px 12px;font-family:Menlo,monospace;font-size:8pt;color:#cbd5e1;line-height:1.6;white-space:pre-wrap;word-break:break-all}
.muted{color:#64748b;text-align:center;padding:24px}
</style>
</head>
<body>

<div class="header">
  <div class="brand">B U D D I C A &nbsp; T O U R I N G</div>
  <h1>📜 反映履歴</h1>
  <div class="sub">Goサインで反映した推奨価格の履歴（直近50件）</div>
  <a href="price-hub.html" class="back">← 価格戦略マスター TOP に戻る</a>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">📊 履歴一覧</div>
    <div class="actions">
      <button class="btn sec" onclick="render()">🔄 更新</button>
      <button class="btn sec" onclick="exportHistory()">⬇️ JSONダウンロード</button>
      <button class="btn danger" onclick="clearHistory()">🗑 履歴を全削除</button>
    </div>
    <div id="list" class="h-list"></div>
  </div>
</div>

<script src="apply-decision.js"></script>
<script>
function render(){
  const hist = ApplyDecision.loadHistory();
  const el = document.getElementById('list');
  if(!hist.length){ el.innerHTML = '<div class="muted">（履歴なし）</div>'; return; }
  el.innerHTML = hist.map(h=>{
    const d = new Date(h.at).toLocaleString('ja-JP');
    const months = (h.months||[]).map(ApplyDecision.fmtMonth).join(' / ');
    const mapStr = Object.entries(h.mapping||{}).map(([s,t])=>`${s}→${t}`).join(' / ');
    return `<div class="h-item">
      <div class="h-head">
        <div class="h-date">${d}</div>
        <div class="h-month-count">${(h.months||[]).length} ヶ月分</div>
      </div>
      <div class="h-meta"><strong>対象月:</strong> ${months}</div>
      <div class="h-meta"><strong>マッピング:</strong> ${mapStr}</div>
      <div class="h-summary">${h.summary || '(サマリなし)'}</div>
    </div>`;
  }).join('');
}
function exportHistory(){
  const hist = ApplyDecision.loadHistory();
  const blob = new Blob([JSON.stringify(hist, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `bt_tkm_apply_history_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}
function clearHistory(){
  if(!confirm('反映履歴を全削除します。\n本当に実行しますか？')) return;
  localStorage.removeItem(ApplyDecision.HISTORY_KEY);
  render();
}
render();
</script>
</body>
</html>
