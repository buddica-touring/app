<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>シーズナル設定 — BUDDICA TOURING</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"Hiragino Sans",sans-serif;background:#f3f4f6;color:#1f2937;line-height:1.5}
.header{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header-left .brand{font-size:9pt;opacity:.7;letter-spacing:.25em}
.header-left h1{font-size:17pt;font-weight:700}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.hbtn{color:#fff;border:1px solid rgba(255,255,255,.3);padding:6px 14px;border-radius:6px;font-size:10pt;font-weight:700;cursor:pointer;text-decoration:none;background:rgba(255,255,255,.15)}
.hbtn.home{background:#fff;color:#1e3a8a}
.container{max-width:1100px;margin:0 auto;padding:14px}
.area-badge{display:inline-flex;align-items:center;gap:6px;background:#dbeafe;color:#1e3a8a;padding:4px 12px;border-radius:20px;font-size:10pt;font-weight:700;margin-bottom:12px}

/* ===== 年度タブ ===== */
.year-tabs{display:flex;gap:4px;margin-bottom:14px}
.year-tab{padding:8px 22px;border:none;border-radius:8px;font-size:11.5pt;font-weight:700;cursor:pointer;background:#e2e8f0;color:#475569;transition:all .15s}
.year-tab.active{background:#1e3a8a;color:#fff;box-shadow:0 2px 8px rgba(30,58,138,.3)}

/* ===== セクションカード ===== */
.sec-card{background:#fff;border-radius:12px;box-shadow:0 2px 6px rgba(0,0,0,.07);margin-bottom:14px;overflow:hidden}
.sec-head{background:#f8fafc;border-bottom:1px solid #e2e8f0;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none}
.sec-head h3{font-size:11pt;font-weight:800;color:#1e293b;display:flex;align-items:center;gap:8px;margin:0}
.sec-head .arr{color:#94a3b8;font-size:10pt;transition:transform .15s}
.sec-body{padding:14px 16px}
.sec-hidden{display:none}

/* ===== 期間プリセットテーブル ===== */
.period-tbl{width:100%;border-collapse:collapse;font-size:10.5pt;margin-bottom:12px}
.period-tbl th{background:#1e293b;color:#fff;padding:7px 10px;text-align:left;font-weight:600;font-size:9.5pt}
.period-tbl th.c{text-align:center}
.period-tbl td{border-bottom:1px solid #f1f5f9;padding:6px 8px;vertical-align:middle}
.period-tbl tr:hover td{background:#f8fafc}
.period-tbl input[type=text]{border:1px solid #d1d5db;border-radius:5px;padding:5px 8px;font-size:10pt;width:100%}
.period-tbl input[type=number]{border:1px solid #d1d5db;border-radius:5px;padding:5px 6px;font-size:10pt;width:50px;text-align:center}
.tier-sel{padding:5px 10px;border:2px solid #e5e7eb;border-radius:6px;font-size:10.5pt;font-weight:700;cursor:pointer;min-width:80px}
.tier-A{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
.tier-B{background:#fef3c7;color:#92400e;border-color:#fbbf24}
.tier-C{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
.btn-del{background:#fee2e2;color:#dc2626;border:none;width:28px;height:28px;border-radius:6px;font-size:13pt;cursor:pointer;line-height:1}
.btn-add{background:#dbeafe;color:#1e40af;border:none;padding:7px 16px;border-radius:7px;font-size:10pt;font-weight:700;cursor:pointer;margin-bottom:14px}
.enabled-chk{width:18px;height:18px;cursor:pointer;accent-color:#1e40af}

/* ===== 一括適用ボタン ===== */
.apply-bar{background:#f0f9ff;border:2px solid #bae6fd;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.apply-info{font-size:10pt;color:#0369a1}
.apply-info b{color:#0c4a6e}
.btn-apply-all{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:#fff;border:none;padding:11px 26px;border-radius:8px;font-size:11.5pt;font-weight:800;cursor:pointer;box-shadow:0 2px 8px rgba(30,58,138,.3)}
.btn-apply-all:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(30,58,138,.4)}
.btn-clear{background:#fee2e2;color:#dc2626;border:none;padding:9px 16px;border-radius:7px;font-size:10pt;font-weight:700;cursor:pointer}

/* ===== スコアリング設定 ===== */
.score-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
.score-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px}
.score-label{font-size:9pt;font-weight:700;color:#374151;margin-bottom:6px;display:flex;justify-content:space-between}
.score-label span{color:#64748b;font-weight:400}
.score-input{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:11pt;font-family:monospace;font-weight:700;text-align:right}
.thresh-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.thresh-item{border:2px solid #e5e7eb;border-radius:8px;padding:10px 12px;text-align:center}
.thresh-label{font-size:9pt;font-weight:700;margin-bottom:6px}
.thresh-A{border-color:#fca5a5;background:#fff1f2}.thresh-A .thresh-label{color:#991b1b}
.thresh-B{border-color:#fbbf24;background:#fffbeb}.thresh-B .thresh-label{color:#92400e}
.thresh-C{border-color:#93c5fd;background:#eff6ff}.thresh-C .thresh-label{color:#1e40af}
.coef-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

/* ===== カレンダープレビュー ===== */
.cal-prev-wrap{overflow-x:auto}
.cal-summary{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.cal-sum-chip{padding:5px 14px;border-radius:8px;font-size:10.5pt;font-weight:700}
.chip-A{background:#fee2e2;color:#991b1b}
.chip-B{background:#dbeafe;color:#1e40af}
.chip-C{background:#f1f5f9;color:#475569}
.chip-C{background:#dbeafe;color:#1e40af}
.month-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.mini-cal{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:8px}
.mini-cal-head{font-size:9pt;font-weight:700;color:#1e293b;text-align:center;margin-bottom:4px}
.mini-cal-tbl{width:100%;border-collapse:collapse;font-size:8pt}
.mini-cal-tbl th{color:#94a3b8;text-align:center;padding:2px 0;font-weight:600}
.mini-cal-tbl td{text-align:center;padding:2px 1px;border-radius:3px}
.mc-A{background:#fee2e2;color:#991b1b;font-weight:700}
.mc-B{background:#dbeafe;color:#1e40af}
.mc-C{background:#f1f5f9;color:#475569}
.mc-C{background:#dbeafe;color:#1e40af}
.mc-empty{color:transparent}

@keyframes pulseSave{0%{transform:scale(.5);opacity:.3}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#16a34a;color:#fff;padding:10px 22px;border-radius:8px;font-weight:700;font-size:11pt;box-shadow:0 4px 12px rgba(22,163,74,.4);opacity:0;transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.warn{background:#f59e0b}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="brand">B U D D I C A &nbsp; T O U R I N G</div>
    <h1>🗓 シーズナル設定</h1>
  </div>
  <div class="header-right">
    <a href="price-hub.html" class="hbtn home">🏠 ハブ</a>
    <a href="import-prices.html" class="hbtn" id="prices-link">💰 プライシングシステム</a>
    <a href="pricing.html" class="hbtn" id="calendar-link" target="_blank">📅 カレンダー確認</a>
  </div>
</div>

<div class="container">
  <div class="area-badge" id="area-badge">🏔 高松店</div>

  <!-- 年度タブ -->
  <div class="year-tabs">
    <button class="year-tab active" onclick="selYear(2026)" id="yt-2026">2026年度</button>
    <button class="year-tab" onclick="selYear(2027)" id="yt-2027">2027年度</button>
  </div>

  <!-- セクション1: 期間プリセット -->
  <div class="sec-card">
    <div class="sec-head" onclick="toggleSec('presets')" id="sh-presets">
      <h3>📅 期間プリセット（tier一括設定）</h3>
      <span class="arr" id="arr-presets">▼</span>
    </div>
    <div id="sb-presets" class="sec-body">
      <div id="period-list"></div>
      <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap">
        <button class="btn-add" onclick="addPeriod()">＋ 期間を追加</button>
        <button onclick="resetPresetsToDefault()" style="background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;padding:7px 16px;border-radius:7px;font-size:10pt;font-weight:700;cursor:pointer">↺ 初期設定に戻す</button>
      </div>
      <div class="apply-bar">
        <div class="apply-info">
          <b id="apply-year-label">2026年</b> の全日程にtierを一括適用します<br>
          <span style="font-size:8.5pt">✅のプリセットが優先順（A＞B＞C）で適用されます</span>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn-clear" onclick="clearYearTiers()">🗑 年度tier全クリア</button>
          <button class="btn-apply-all" onclick="applyAllPresets()">🚀 一括適用</button>
        </div>
      </div>
    </div>
  </div>

  <!-- セクション2: スコアリング設定 -->
  <div class="sec-card">
    <div class="sec-head" onclick="toggleSec('scoring')" id="sh-scoring">
      <h3>⚖️ E/T/R/H スコアリング設定</h3>
      <span class="arr" id="arr-scoring">▶</span>
    </div>
    <div id="sb-scoring" class="sec-body sec-hidden">
      <div style="font-size:10pt;color:#64748b;margin-bottom:12px">4要素の重みとtier判定閾値を設定します（小計100%）</div>
      <div style="font-size:10pt;font-weight:700;color:#374151;margin-bottom:8px">要素の重み</div>
      <div class="score-grid" id="weight-grid"></div>
      <div style="font-size:10pt;font-weight:700;color:#374151;margin-bottom:8px">tier判定閾値</div>
      <div class="thresh-grid" id="thresh-grid"></div>
      <div style="font-size:10pt;font-weight:700;color:#374151;margin-bottom:8px">tier係数</div>
      <div class="coef-grid" id="coef-grid"></div>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button onclick="saveScoring()" style="background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;padding:9px 20px;border-radius:7px;font-size:11pt;font-weight:700;cursor:pointer">💾 保存</button>
        <button onclick="resetScoring()" style="background:#f1f5f9;color:#475569;border:none;padding:9px 16px;border-radius:7px;font-size:10pt;font-weight:600;cursor:pointer">↺ デフォルトに戻す</button>
      </div>
    </div>
  </div>

  <!-- セクション3: カレンダープレビュー -->
  <div class="sec-card">
    <div class="sec-head" onclick="toggleSec('calendar')" id="sh-calendar">
      <h3>📅 カレンダープレビュー（tier分布）</h3>
      <span class="arr" id="arr-calendar">▶</span>
    </div>
    <div id="sb-calendar" class="sec-body sec-hidden">
      <div class="cal-summary" id="cal-summary"></div>
      <div class="month-grid" id="month-grid"></div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ===== 定数 =====
const STORAGE_KEY = 'bt_takamatsu_seasonal_v6';
const SC_KEY      = 'bt_seasonal_config_v1'; // シーズナル設定専用
const AREA_NAMES  = {tkm:'🏔 高松店', nha:'✈️ 那覹空港店', spk:'🏔 札幌デリバリー店'};
const HOLIDAYS = {
  '2026-1-1':'元日','2026-1-12':'成人の日','2026-2-11':'建国記念','2026-2-23':'天皇誕生',
  '2026-3-20':'春分の日','2026-4-29':'昭和の日','2026-5-3':'憲法記念','2026-5-4':'みどり',
  '2026-5-5':'こども','2026-5-6':'振替休日','2026-7-20':'海の日','2026-8-11':'山の日',
  '2026-9-21':'敬老','2026-9-23':'秋分','2026-10-12':'スポーツ','2026-11-3':'文化','2026-11-23':'勤労感謝',
  '2027-1-1':'元日','2027-1-11':'成人の日','2027-2-11':'建国記念','2027-2-23':'天皇誕生',
  '2027-3-21':'春分の日','2027-3-22':'振替休日','2027-4-29':'昭和の日','2027-5-3':'憲法記念',
  '2027-5-4':'みどり','2027-5-5':'こども','2027-7-19':'海の日','2027-8-11':'山の日',
  '2027-9-20':'敬老','2027-9-23':'秋分','2027-10-11':'スポーツ','2027-11-3':'文化','2027-11-23':'勤労感謝',
};

// ===== デフォルトプリセット（高松） =====
const DEFAULT_PRESETS_TKM = {
  '2026': [
    {id:1, label:'GW',          fromM:4,  fromD:27, toM:5,  toD:6,  tier:'A', enabled:true},
    {id:2, label:'お盆',        fromM:8,  fromD:10, toM:8,  toD:16, tier:'A', enabled:true},
    {id:3, label:'年末年始',    fromM:12, fromD:27, toM:12, toD:31, tier:'A', enabled:true},
    {id:4, label:'年始',        fromM:1,  fromD:1,  toM:1,  toD:4,  tier:'A', enabled:true},
    {id:5, label:'桜ピーク',    fromM:3,  fromD:28, toM:4,  toD:10, tier:'A', enabled:true},
    {id:6, label:'紅葉ピーク',  fromM:11, fromD:13, toM:11, toD:20, tier:'A', enabled:true},
    {id:7, label:'シルバーWK',  fromM:9,  fromD:19, toM:9,  toD:23, tier:'A', enabled:true},
    {id:8, label:'夏休み',      fromM:7,  fromD:21, toM:8,  toD:31, tier:'B', enabled:true},
    {id:9, label:'春（桜期）',  fromM:3,  fromD:15, toM:4,  toD:26, tier:'B', enabled:true},
    {id:10,label:'秋（紅葉期）',fromM:11, fromD:1,  toM:11, toD:12, tier:'B', enabled:true},
    {id:11,label:'梅雨',        fromM:6,  fromD:1,  toM:6,  toD:30, tier:'C', enabled:true},
    {id:12,label:'冬閑散①',    fromM:1,  fromD:5,  toM:2,  toD:28, tier:'C', enabled:true},
    {id:13,label:'冬閑散②',    fromM:12, fromD:1,  toM:12, toD:22, tier:'C', enabled:true},
    {id:14,label:'梅雨明け前',  fromM:7,  fromD:1,  toM:7,  toD:20, tier:'C', enabled:true},
  ],
  '2027': [
    {id:1, label:'GW',          fromM:4,  fromD:29, toM:5,  toD:5,  tier:'A', enabled:true},
    {id:2, label:'お盆',        fromM:8,  fromD:10, toM:8,  toD:16, tier:'A', enabled:true},
    {id:3, label:'年末年始',    fromM:12, fromD:27, toM:12, toD:31, tier:'A', enabled:true},
    {id:4, label:'年始',        fromM:1,  fromD:1,  toM:1,  toD:4,  tier:'A', enabled:true},
    {id:5, label:'桜ピーク',    fromM:4,  fromD:3,  toM:4,  toD:11, tier:'A', enabled:true},
    {id:6, label:'紅葉ピーク',  fromM:11, fromD:13, toM:11, toD:20, tier:'A', enabled:true},
    {id:7, label:'シルバーWK',  fromM:9,  fromD:18, toM:9,  toD:26, tier:'A', enabled:true},
    {id:8, label:'夏休み',      fromM:7,  fromD:19, toM:8,  toD:31, tier:'B', enabled:true},
    {id:9, label:'春（桜期）',  fromM:3,  fromD:20, toM:4,  toD:26, tier:'B', enabled:true},
    {id:10,label:'秋（紅葉期）',fromM:11, fromD:1,  toM:11, toD:12, tier:'B', enabled:true},
    {id:11,label:'梅雨',        fromM:6,  fromD:1,  toM:6,  toD:30, tier:'C', enabled:true},
    {id:12,label:'冬閑散①',    fromM:1,  fromD:5,  toM:2,  toD:28, tier:'C', enabled:true},
    {id:13,label:'冬閑散②',    fromM:12, fromD:1,  toM:12, toD:22, tier:'C', enabled:true},
  ],
};

const DEFAULT_SCORING = {
  weights: {E:0.10, T:0.40, R:0.35, H:0.15},
  thresholds: {A:5.5, B:3.0},
  coefs: {A:1.50, B:1.00, C:0.80},
};

// ===== 状態 =====
const urlParams = new URLSearchParams(location.search);
const area = urlParams.get('area') || 'tkm';
let curYear = 2026;
let scConfig = {}; // {area: {year: {periods:[...], weights:{}, thresholds:{}, coefs:{}}}}
let masterState = {};
let _nextId = 100;

// ===== ナビ更新 =====
document.getElementById('area-badge').textContent = AREA_NAMES[area]||area;
document.getElementById('prices-link').href = `import-prices.html?area=${area}`;
document.getElementById('calendar-link').href = `pricing.html?area=${area}`;

// ===== ストレージ =====
function loadScConfig(){
  try{ const r=localStorage.getItem(SC_KEY); if(r) scConfig=JSON.parse(r); }catch(e){}
}
function saveScConfig(){
  try{ localStorage.setItem(SC_KEY, JSON.stringify(scConfig)); }catch(e){}
}
function loadMasterState(){
  try{ const r=localStorage.getItem(STORAGE_KEY); if(r) masterState=JSON.parse(r); }catch(e){}
  if(!masterState.dayTiers) masterState.dayTiers={};
}
function saveMasterState(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(masterState)); }catch(e){}
}

function getAreaYear(a,y){ return (scConfig[a]||{})[y]||{}; }
function ensureAreaYear(a,y){
  if(!scConfig[a]) scConfig[a]={};
  if(!scConfig[a][y]) scConfig[a][y]={ periods: JSON.parse(JSON.stringify((DEFAULT_PRESETS_TKM[y]||[]))), scoring: JSON.parse(JSON.stringify(DEFAULT_SCORING)) };
  return scConfig[a][y];
}
function getPeriods(){ return ensureAreaYear(area, curYear).periods; }
function getScoring(){ return ensureAreaYear(area, curYear).scoring||JSON.parse(JSON.stringify(DEFAULT_SCORING)); }

// ===== 年度選択 =====
function selYear(y){
  curYear = y;
  document.querySelectorAll('.year-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('yt-'+y).classList.add('active');
  document.getElementById('apply-year-label').textContent = y+'年';
  renderPeriodList();
  renderScoring();
  if(!document.getElementById('sb-calendar').classList.contains('sec-hidden')) renderCalendarPreview();
}

// ===== セクション開閉 =====
function toggleSec(name){
  const body=document.getElementById('sb-'+name);
  const arr=document.getElementById('arr-'+name);
  const isHidden=body.classList.contains('sec-hidden');
  body.classList.toggle('sec-hidden',!isHidden);
  arr.textContent=isHidden?'▼':'▶';
  if(isHidden && name==='calendar') renderCalendarPreview();
  if(isHidden && name==='scoring') renderScoring();
}

// ===== 期間プリセット描画（A繁忙/B通常/C閑散） =====
function renderPeriodList(){
  const periods = getPeriods();
  const tierLabels={A:'A 繁忙',B:'B 通常',C:'C 閑散'};
  const tierColors={A:'#fee2e2',B:'#dbeafe',C:'#f1f5f9'};
  const tierTextColors={A:'#991b1b',B:'#1e40af',C:'#475569'};
  let html=`<table class="period-tbl">
    <thead><tr>
      <th style="width:32px" class="c">✅</th>
      <th>期間名</th>
      <th class="c">開始</th>
      <th class="c" style="width:10px"></th>
      <th class="c">終了</th>
      <th class="c">tier</th>
      <th class="c" style="width:32px"></th>
    </tr></thead><tbody>`;
  periods.forEach((p,i)=>{
    const tc=tierColors[p.tier]||'#f1f5f9';
    const ttc=tierTextColors[p.tier]||'#475569';
    html+=`<tr>
      <td class="c"><input type="checkbox" class="enabled-chk" ${p.enabled?'checked':''} onchange="togglePeriod(${i},this.checked)"></td>
      <td><input type="text" value="${escH(p.label)}" onchange="updatePeriod(${i},'label',this.value)" style="border:1px solid #d1d5db;border-radius:5px;padding:5px 8px;font-size:10pt;width:100%"></td>
      <td class="c">
        <div style="display:flex;gap:3px;align-items:center;justify-content:center">
          <input type="number" value="${p.fromM}" min="1" max="12" onchange="updatePeriod(${i},'fromM',+this.value)" style="border:1px solid #d1d5db;border-radius:5px;padding:5px 4px;font-size:10pt;width:46px;text-align:center">
          <span style="font-size:9pt;color:#64748b">/</span>
          <input type="number" value="${p.fromD}" min="1" max="31" onchange="updatePeriod(${i},'fromD',+this.value)" style="border:1px solid #d1d5db;border-radius:5px;padding:5px 4px;font-size:10pt;width:46px;text-align:center">
        </div>
      </td>
      <td class="c"><span style="color:#94a3b8">〜</span></td>
      <td class="c">
        <div style="display:flex;gap:3px;align-items:center;justify-content:center">
          <input type="number" value="${p.toM}" min="1" max="12" onchange="updatePeriod(${i},'toM',+this.value)" style="border:1px solid #d1d5db;border-radius:5px;padding:5px 4px;font-size:10pt;width:46px;text-align:center">
          <span style="font-size:9pt;color:#64748b">/</span>
          <input type="number" value="${p.toD}" min="1" max="31" onchange="updatePeriod(${i},'toD',+this.value)" style="border:1px solid #d1d5db;border-radius:5px;padding:5px 4px;font-size:10pt;width:46px;text-align:center">
        </div>
      </td>
      <td class="c">
        <select style="padding:4px 8px;border:2px solid ${tc};border-radius:6px;font-size:10pt;font-weight:700;cursor:pointer;background:${tc};color:${ttc}"
          onchange="updatePeriod(${i},'tier',this.value);this.style.background=tierColors[this.value]||'#f1f5f9';this.style.color=tierTextColors[this.value]||'#475569';this.style.borderColor=tierColors[this.value]||'#f1f5f9'">
          ${['A','B','C'].map(t=>`<option value="${t}" ${p.tier===t?'selected':''}>${tierLabels[t]}</option>`).join('')}
        </select>
      </td>
      <td class="c"><button class="btn-del" onclick="deletePeriod(${i})">×</button></td>
    </tr>`;
  });
  html+='</tbody></table>';
  document.getElementById('period-list').innerHTML=html;
}

function updatePeriod(i,key,val){ getPeriods()[i][key]=val; saveScConfig(); }
function togglePeriod(i,v){ getPeriods()[i].enabled=v; saveScConfig(); }
function deletePeriod(i){
  getPeriods().splice(i,1); saveScConfig(); renderPeriodList();
}
function addPeriod(){
  getPeriods().push({id:_nextId++,label:'新しい期間',fromM:1,fromD:1,toM:1,toD:31,tier:'B',enabled:true});
  saveScConfig(); renderPeriodList();
}
function resetPresetsToDefault(){
  if(!confirm(`${curYear}年度のプリセットを初期設定に戻しますか？\n現在の変更はすべてリセットされます。`)) return;
  const defaults = DEFAULT_PRESETS_TKM[String(curYear)];
  if(!defaults){ showToast('この年度のデフォルトがありません','warn'); return; }
  if(!scConfig[area]) scConfig[area]={};
  scConfig[area][curYear] = {
    periods: JSON.parse(JSON.stringify(defaults)),
    scoring: JSON.parse(JSON.stringify(DEFAULT_SCORING))
  };
  saveScConfig();
  renderPeriodList();
  showToast(`↺ ${curYear}年度を初期設定に戻しました`,'warn');
}
function escH(s){return String(s||'').replace(/[<>&"']/g,m=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[m]));}

// ===== 一括適用 =====
function dateInRange(date, fromM, fromD, toM, toD){
  const m=date.getMonth()+1, d=date.getDate();
  const from=fromM*100+fromD, to=toM*100+toD, cur=m*100+d;
  if(from<=to) return cur>=from && cur<=to;
  return cur>=from || cur<=to; // 年跨ぎ
}

function applyAllPresets(){
  loadMasterState();
  const periods=getPeriods().filter(p=>p.enabled);
  const y=curYear;
  if(!masterState.dayTiers) masterState.dayTiers={};
  const TIER_PRI={A:3,B:2,C:1};
  const counts={A:0,B:0,C:0};
  for(let m=1;m<=12;m++){
    const last=new Date(y,m,0).getDate();
    for(let d=1;d<=last;d++){
      const date=new Date(y,m-1,d);
      const dk=`${y}-${m}-${d}`;
      let bestTier=null,bestPri=0;
      periods.forEach(p=>{
        if(dateInRange(date,p.fromM,p.fromD,p.toM,p.toD)){
          if(TIER_PRI[p.tier]>bestPri){bestPri=TIER_PRI[p.tier];bestTier=p.tier;}
        }
      });
      if(bestTier){masterState.dayTiers[dk]=bestTier;counts[bestTier]++;}
    }
  }
  saveMasterState();
  showToast(`✅ ${y}年 一括適用（A:${counts.A}日 B:${counts.B}日 C:${counts.C}日）`);
  if(!document.getElementById('sb-calendar').classList.contains('sec-hidden')) renderCalendarPreview();
}

function clearYearTiers(){
  if(!confirm(`${curYear}年のtier設定を全てクリアしますか？\n個別設定も含め全て削除されます。`)) return;
  loadMasterState();
  const y=String(curYear);
  Object.keys(masterState.dayTiers).forEach(dk=>{
    if(dk.startsWith(y+'-')) delete masterState.dayTiers[dk];
  });
  saveMasterState();
  showToast(`🗑 ${curYear}年のtierをクリアしました`,'warn');
  if(!document.getElementById('sb-calendar').classList.contains('sec-hidden')) renderCalendarPreview();
}

// ===== スコアリング描画 =====
function renderScoring(){
  const sc=getScoring();
  const wLabels={E:'E イベント',T:'T 観光流入',R:'R レンタカー需要',H:'H 連休'};
  let wHtml='';
  ['E','T','R','H'].forEach(k=>{
    wHtml+=`<div class="score-item">
      <div class="score-label">${wLabels[k]} <span>（現在: ${sc.weights[k]}）</span></div>
      <input type="number" class="score-input" id="w-${k}" value="${sc.weights[k]}" step="0.01" min="0" max="1">
    </div>`;
  });
  document.getElementById('weight-grid').innerHTML=wHtml;

  const tLabels={A:'A 繁忙',B:'B 通常',C:'C 閑散'};
  const tColors={A:'thresh-A',B:'thresh-B',C:'thresh-C'};
  const tDesc={A:`≥ ${sc.thresholds.A} でA`,B:`≥ ${sc.thresholds.B} でB`,C:`< ${sc.thresholds.B} でC`};
  let tHtml='';
  ['A','B','C'].forEach(t=>{
    tHtml+=`<div class="thresh-item ${tColors[t]}">
      <div class="thresh-label">${tLabels[t]}</div>
      ${t!=='C'?`<input type="number" class="score-input" id="th-${t}" value="${sc.thresholds[t]}" step="0.1" min="0" max="10">`:'<div style="font-size:10pt;color:#1e40af;font-weight:700;padding:7px 0">自動（閾値以下）</div>'}
      <div style="font-size:8pt;color:#6b7280;margin-top:4px">${tDesc[t]}</div>
    </div>`;
  });
  document.getElementById('thresh-grid').innerHTML=tHtml;

  const cLabels={A:'A 係数',B:'B 係数',C:'C 係数'};
  let cHtml='';
  ['A','B','C'].forEach(t=>{
    cHtml+=`<div class="score-item">
      <div class="score-label">${cLabels[t]}</div>
      <input type="number" class="score-input" id="co-${t}" value="${sc.coefs[t]}" step="0.05" min="0" max="5">
    </div>`;
  });
  document.getElementById('coef-grid').innerHTML=cHtml;
}

function saveScoring(){
  const sc=getScoring();
  ['E','T','R','H'].forEach(k=>{ const el=document.getElementById('w-'+k); if(el) sc.weights[k]=parseFloat(el.value)||0; });
  ['A','B'].forEach(t=>{ const el=document.getElementById('th-'+t); if(el) sc.thresholds[t]=parseFloat(el.value)||0; });
  ['A','B','C'].forEach(t=>{ const el=document.getElementById('co-'+t); if(el) sc.coefs[t]=parseFloat(el.value)||0; });
  ensureAreaYear(area,curYear).scoring=sc;
  // masterState にも反映
  loadMasterState();
  masterState.weights={...sc.weights};
  masterState.thresholds={...sc.thresholds};
  masterState.tierCoef={...sc.coefs};
  saveMasterState();
  saveScConfig();
  showToast('💾 スコアリング設定を保存しました');
  renderScoring();
}

function resetScoring(){
  ensureAreaYear(area,curYear).scoring=JSON.parse(JSON.stringify(DEFAULT_SCORING));
  saveScConfig(); renderScoring();
  showToast('↺ デフォルトに戻しました','warn');
}

// ===== カレンダープレビュー =====
function renderCalendarPreview(){
  loadMasterState();
  const y=curYear;
  const counts={A:0,B:0,C:0};
  const MONTH_NAMES=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const DOW=['日','月','火','水','木','金','土'];
  let monthHtml='';
  for(let m=1;m<=12;m++){
    const last=new Date(y,m,0).getDate();
    const firstWd=new Date(y,m-1,1).getDay();
    let cells='';
    for(let i=0;i<firstWd;i++) cells+=`<td class="mc-empty">-</td>`;
    for(let d=1;d<=last;d++){
      const dk=`${y}-${m}-${d}`;
      const tier=masterState.dayTiers[dk]||null;
      if(tier) counts[tier]++;
      cells+=`<td class="${tier?'mc-'+tier:''}" title="${tier||'自動'}">${d}</td>`;
      if((firstWd+d)%7===0&&d!==last) cells+='</tr><tr>';
    }
    monthHtml+=`<div class="mini-cal">
      <div class="mini-cal-head">${MONTH_NAMES[m-1]}</div>
      <table class="mini-cal-tbl">
        <thead><tr>${DOW.map(d=>`<th>${d[0]}</th>`).join('')}</tr></thead>
        <tbody><tr>${cells}</tr></tbody>
      </table>
    </div>`;
  }
  const totalSet=counts.A+counts.B+counts.C;
  document.getElementById('cal-summary').innerHTML=`
    <div class="cal-sum-chip chip-A">A 繁忙: ${counts.A}日</div>
    <div class="cal-sum-chip chip-B">B 通常: ${counts.B}日</div>
    <div class="cal-sum-chip chip-C">C 閑散: ${counts.C}日</div>
    <div style="font-size:9.5pt;color:#64748b;padding:5px 10px">設定済み: ${totalSet}日 / 未設定: ${365-totalSet}日（自動判定）</div>`;
  document.getElementById('month-grid').innerHTML=monthHtml;
}

// ===== Toast =====
function showToast(msg,type){
  const t=document.getElementById('toast');
  t.className='toast'+(type?' '+type:'');
  t.textContent=msg;
  setTimeout(()=>t.classList.add('show'),10);
  clearTimeout(t._t);
  t._t=setTimeout(()=>t.classList.remove('show'),2500);
}

// ===== 初期化 =====
loadScConfig();
loadMasterState();
ensureAreaYear(area,'2026');
ensureAreaYear(area,'2027');
renderPeriodList();
</script>
