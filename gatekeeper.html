<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache"><title>📒 台帳</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;background:#0f1420;color:#e6ebf5;font-size:14px}
header{position:sticky;top:0;background:#0f1f45;padding:10px 14px;border-bottom:2px solid #FABE00;z-index:10}
h1{margin:0;font-size:16px;color:#FABE00}.sub{font-size:11px;color:#9fb0d0;margin-top:2px}
.bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
input,select,button{font-size:13px;padding:6px 8px;border-radius:6px;border:1px solid #2a3a5a;background:#1a2540;color:#e6ebf5}
button{cursor:pointer;background:#22346a;font-weight:600}button.on{background:#FABE00;color:#0f1f45}
.wrap{padding:8px 10px;max-width:1100px;margin:0 auto}
.row{display:flex;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:5px;background:#161e33;border-left:4px solid #2a3a5a;align-items:flex-start}
.row.gk{background:#12321f;border-left-color:#0e9f50}.row.warn{background:#3a1518;border-left-color:#e23b3b}.row.move{background:#3a2f12;border-left-color:#e0a020}
.t{color:#8fa3c8;font-size:11px;white-space:nowrap;min-width:80px}
.who{font-weight:700;min-width:84px;font-size:12px}.who.staff{color:#7fd0ff}.who.mach{color:#9fb0d0}.who.cust{color:#ffb0e0}.who.gk{color:#4ade80}
.tag{font-size:10px;padding:1px 6px;border-radius:10px;background:#2a3a5a;margin-right:5px}
.body{flex:1;word-break:break-all;font-size:12.5px}.resv{color:#FABE00;font-weight:600}
.empty{text-align:center;color:#7fa;padding:40px;font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.stat{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}.pill{background:#1a2540;padding:4px 10px;border-radius:12px;font-size:12px}
</style></head><body>
<header>
<h1 id="ttl">📒 台帳</h1>
<div class="sub">いつ・誰が・何をしたか。勝手な編集の足跡は色付き、🛡️3号が戻した動きも同じ流れに出ます。</div>
<div class="stat" id="stat"></div>
<div class="bar">
<input id="q" placeholder="予約番号で追う" style="flex:1;min-width:150px">
<button id="fWarn">⚠️ 足跡だけ</button>
<button id="fAll">🔧 全部(生ログ)</button>
<button id="reload">↻ 更新</button>
</div></header>
<div class="wrap"><div id="feed"><div class="empty">読み込み中…（本体APPにログイン済みの端末で開いてください）</div></div></div>
<script>
const MAIN='https://ckrxttbnawkclshczsia.supabase.co', MANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrcnh0dGJuYXdrY2xzaGN6c2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4Nzg1NTAsImV4cCI6MjA4NzQ1NDU1MH0.kDC_UDVWvcrS97wzqQ3NXP79ewjgYwF4vSFdV7y06S8';
const BTSB='https://ggqugvyskyiblxiycpci.supabase.co', BTANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdncXVndnlza3lpYmx4aXljcGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDc3NjksImV4cCI6MjA5MzY4Mzc2OX0.uNhWcBd_Dl5nzemZDQfJ8mQV6iY73MwystGGpTRPC18';
const CFG={spk:{sb:MAIN,anon:MANON,store:'spk',name:'札幌'},nha:{sb:MAIN,anon:MANON,store:'nha',name:'那覇'},bt:{sb:BTSB,anon:BTANON,store:null,name:'BUDDICA'}};
const STORE=(new URLSearchParams(location.search).get('store')||'spk').toLowerCase();
const C=CFG[STORE]||CFG.spk;
document.getElementById('ttl').textContent='📒 台帳（'+C.name+'）';
// テーブル日本語化
const TBL_JP={tasks:'タスク',nha_tasks:'タスク',bt_tasks:'タスク',reservations:'予約',nha_reservations:'予約',bt_reservations:'予約',fleet:'配車',nha_fleet:'配車',bt_fleet:'配車',places:'場所',nha_places:'場所',shifts:'シフト',nha_shifts:'シフト',bt_shifts:'シフト',attendance:'勤怠',nha_attendance:'勤怠',spk_attendance:'勤怠',spk_accounting:'会計',nha_accounting:'会計',bt_accounting:'会計',jalan_payment:'じゃらん決済',jalan_payments:'じゃらん決済',nha_jalan_payment:'じゃらん決済',nha_jalan_payments:'じゃらん決済',mypage_changes:'マイページ変更',vehicles:'車両',nha_vehicles:'車両',maintenance:'整備',nha_maintenance:'整備',app_settings:'設定',nha_app_settings:'設定',bt_app_settings:'設定',spk_line_links:'LINE紐付け',nha_line_links:'LINE紐付け',spk_task_assignments:'担当割当',nha_task_assignments:'担当割当'};
// 項目(field)日本語化
const FLD_JP={assignee:'担当','担当':'担当',del_place:'お届け場所',col_place:'回収場所','送迎場所':'お届け場所','集客':'回収場所',place:'場所',lend_date:'貸出日',return_date:'返却日',start_date:'貸出日',end_date:'返却日',date:'日付',lend_time:'貸出時間',return_time:'返却時間',time:'時間','時間':'時間',status:'状態',pay_status:'決済状態',vehicle:'車両',vehicle_code:'車両','クラス':'車両クラス',price:'料金',insurance:'補償','確定':'補償',deleted:'削除フラグ',people:'人数','人数':'人数',value:'設定値','内容':'種別',type:'種別','予約者':'予約者',name:'氏名',done:'完了','確認':'完了'};
// 既定で隠すノイズ(システムの自動処理・設定のハートビート等)
const NOISE_TBL=new Set(['app_settings','nha_app_settings','bt_app_settings']);
function isNoise(r){ if(NOISE_TBL.has(r.tbl))return true; const s=r.summary||''; if(/last_run|heartbeat|updated_at.*→/.test(s))return true; if(/v\d+\.\d+\.\d+/.test(s))return true; return false; }
function jpField(k){k=(k||'').trim();return FLD_JP[k]||k;}
function jpTbl(t){return TBL_JP[t]||t;}
function human(r){ // 一文で「何をしたか」
 const tbl=jpTbl(r.tbl);
 if(r.op==='DELETE')return tbl+'を<b style="color:#ff9a9a">削除した</b>';
 if(r.op==='INSERT')return tbl+'を新規追加';
 if(r.op==='GENESIS')return tbl+'（初期記録）';
 let parts=(r.summary||'').split(' / ').map(p=>{const i=p.indexOf(':');if(i<0)return p;const k=p.slice(0,i);let rest=p.slice(i+1).trim();let m=rest.split('→');let oldv=(m[0]||'').trim()||'空', newv=(m[1]!==undefined?m[1].trim():'')||'空';return jpField(k)+'を「'+oldv+'」→「'+newv+'」に変更';}).filter(Boolean);
 return tbl+'の '+(parts.join('、')||'更新');
}
function _sbToken(){try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf('sb-')===0&&k.indexOf('auth-token')>=0){let v=null;try{v=JSON.parse(localStorage.getItem(k));}catch(e){continue;}const t=(v&&v.access_token)||(v&&v.currentSession&&v.currentSession.access_token)||(v&&v.session&&v.session.access_token)||(Array.isArray(v)&&typeof v[0]==='string'?v[0]:null);if(t)return t;}}}catch(e){}return null;}
let onlyWarn=false, showAll=false;
async function rpc(fn,args){const tok=_sbToken();const H={apikey:C.anon,'Content-Type':'application/json'};if(tok)H.Authorization='Bearer '+tok;const r=await fetch(C.sb+'/rest/v1/rpc/'+fn,{method:'POST',headers:H,body:JSON.stringify(args||{})});if(!r.ok)throw new Error(fn+' '+r.status);return r.json();}
function whoClass(w){w=(w||'').toLowerCase();if(w.indexOf('gatekeeper')>=0)return'gk';if(w==='customer'||w.indexOf('mypage')>=0)return'cust';if(w==='staff')return'staff';return'mach';}
function whoLabel(w){const c=whoClass(w);if(c==='gk')return'🛡️ 3号';if(c==='cust')return'👤 顧客';if(c==='staff')return'🧑‍🔧 スタッフ';return'⚙️ システム';}
function classify(r){const s=r.summary||'';const human=(r.who==='staff'||r.who==='customer');
 // 人間(スタッフ/顧客)の編集は正当=フラグしない。機械/システムの書込だけ疑う。
 if(r.op==='DELETE')return human?'':'warn';
 if(!human&&(/→\s*$/.test((s||'').trim())||/→\s*\//.test(s)))return'warn';
 if(!human&&/date|日付|start_date|end_date|lend_date|return_date/i.test(s)&&/→/.test(s))return'move';
 return'';}
function tfmt(t){const d=new Date(t);return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
async function load(){
 const feed=document.getElementById('feed');
 try{
  const q=document.getElementById('q').value.trim();
  let led,act;
  if(q){led=await rpc('gk_reservation',{p_resv:q});act=[];}
  else{[led,act]=await Promise.all([rpc('gk_ledger',{p_limit:300,p_store:C.store}),rpc('gk_activity',{p_limit:40})]);}
  led=(led||[]).filter(r=>showAll||!isNoise(r));
  let items=led.map(r=>({kind:'led',at:r.at,r}));
  let patrolShown=false;
  (act||[]).forEach(a=>{const real=(a.fixed||0)+(a.reported||0)>0;if(real){items.push({kind:'act',at:a.at,a});}else if(a.note&&!patrolShown){patrolShown=true;items.push({kind:'act',at:a.at,a});}});
  items.sort((x,y)=>new Date(y.at)-new Date(x.at));
  const nWarn=led.filter(r=>classify(r)==='warn').length, nMove=led.filter(r=>classify(r)==='move').length;
  const nGk=(act||[]).reduce((s,a)=>s+(a.fixed||0),0);
  document.getElementById('stat').innerHTML='<span class="pill">📜 '+led.length+'件</span><span class="pill" style="color:#ff9a9a">⚠️ 足跡 '+nWarn+'</span><span class="pill" style="color:#e0a020">📅 移動 '+nMove+'</span><span class="pill" style="color:#4ade80">🛡️ 3号が戻した '+nGk+'</span>';
  let html='';
  items.slice(0,250).forEach(it=>{
   if(it.kind==='act'){const a=it.a;let bd=(a.fixed>0?'<span class="badge" style="background:#0e9f50;color:#fff">戻した '+a.fixed+'件</span> ':'')+(a.reported>0?'<span class="badge" style="background:#e0a020;color:#000">要確認 '+a.reported+'件</span> ':'');if((a.fixed||0)+(a.reported||0)>0)bd+='正常化を実行';else bd=(a.note||'巡回・異常なし ✅');html+='<div class="row gk"><div class="t">'+tfmt(it.at)+'</div><div class="who gk">🛡️ 3号</div><div class="body">'+bd+'</div></div>';return;}
   const r=it.r;const c=classify(r);if(onlyWarn&&c==='')return;
   const cls=whoClass(r.who);
   html+='<div class="row '+c+'"><div class="t">'+tfmt(r.at)+'</div><div class="who '+cls+'">'+whoLabel(r.who)+'</div><div class="body">'+(c==='warn'?'<span class="badge" style="background:#e23b3b;color:#fff">足跡</span> ':'')+(c==='move'?'<span class="badge" style="background:#e0a020;color:#000">移動</span> ':'')+(r.resv&&r.resv!=='?'?'<span class="resv">〈'+r.resv+'〉</span>':'')+human(r)+'</div></div>';
  });
  feed.innerHTML=html||'<div class="empty">✅ 記録なし（この条件では動きなし）</div>';
 }catch(e){feed.innerHTML='<div class="empty">⚠️ 読めません（本体APPにログイン済みの端末で開いてください）<br>'+e.message+'</div>';}
}
document.getElementById('reload').onclick=load;
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')load();});
document.getElementById('fWarn').onclick=function(){onlyWarn=!onlyWarn;this.classList.toggle('on',onlyWarn);load();};
document.getElementById('fAll').onclick=function(){showAll=!showAll;this.classList.toggle('on',showAll);load();};
load();setInterval(()=>{if(!document.getElementById('q').value)load();},30000);
</script></body></html>
