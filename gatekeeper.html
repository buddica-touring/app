<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache"><title>📒 台帳（gatekeeper）</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",sans-serif;background:#0f1420;color:#e6ebf5;font-size:14px}
header{position:sticky;top:0;background:#0f1f45;padding:10px 14px;border-bottom:2px solid #FABE00;z-index:10}
h1{margin:0;font-size:16px;color:#FABE00}.sub{font-size:11px;color:#9fb0d0;margin-top:2px}
.bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
input,select,button{font-size:13px;padding:6px 8px;border-radius:6px;border:1px solid #2a3a5a;background:#1a2540;color:#e6ebf5}
button{cursor:pointer;background:#22346a;font-weight:600}button.on{background:#FABE00;color:#0f1f45}
.wrap{padding:8px 10px;max-width:1100px;margin:0 auto}
.row{display:flex;gap:8px;padding:8px 10px;border-radius:8px;margin-bottom:5px;background:#161e33;border-left:4px solid #2a3a5a;align-items:flex-start}
.row.gk{background:#12321f;border-left-color:#0e9f50}
.row.warn{background:#3a1518;border-left-color:#e23b3b}
.row.move{background:#3a2f12;border-left-color:#e0a020}
.t{color:#8fa3c8;font-size:11px;white-space:nowrap;min-width:88px}
.who{font-weight:700;min-width:88px;font-size:12px}
.who.staff{color:#7fd0ff}.who.mach{color:#9fb0d0}.who.cust{color:#ffb0e0}.who.gk{color:#4ade80}
.tag{font-size:10px;padding:1px 6px;border-radius:10px;background:#2a3a5a;margin-right:5px}
.body{flex:1;word-break:break-all;font-size:12.5px}.resv{color:#FABE00;font-weight:600}
.empty{text-align:center;color:#7fa;padding:40px;font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.stat{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}.pill{background:#1a2540;padding:4px 10px;border-radius:12px;font-size:12px}
</style></head><body>
<header>
<h1 id="ttl">📒 台帳 — 人間とシステムの共有記録</h1>
<div class="sub">いつ・誰が・何を書いたか＝全部ここ。「勝手に編集の足跡」は色付き、🛡️3号が戻した動きも同じ流れに出ます。</div>
<div class="stat" id="stat"></div>
<div class="bar">
<input id="q" placeholder="予約番号で追う" style="flex:1;min-width:150px">
<button id="fWarn">⚠️ 足跡だけ</button>
<button id="reload">↻ 更新</button>
</div></header>
<div class="wrap"><div id="feed"><div class="empty">読み込み中…（本体APPにログイン済みの端末で開いてください）</div></div></div>
<script>
const MAIN='https://ckrxttbnawkclshczsia.supabase.co', MANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrcnh0dGJuYXdrY2xzaGN6c2lhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4Nzg1NTAsImV4cCI6MjA4NzQ1NDU1MH0.kDC_UDVWvcrS97wzqQ3NXP79ewjgYwF4vSFdV7y06S8';
const BTSB='https://ggqugvyskyiblxiycpci.supabase.co', BTANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdncXVndnlza3lpYmx4aXljcGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDc3NjksImV4cCI6MjA5MzY4Mzc2OX0.uNhWcBd_Dl5nzemZDQfJ8mQV6iY73MwystGGpTRPC18';
const CFG={spk:{sb:MAIN,anon:MANON,store:'spk',name:'札幌'},nha:{sb:MAIN,anon:MANON,store:'nha',name:'那覇'},bt:{sb:BTSB,anon:BTANON,store:null,name:'BUDDICA'}};
const STORE=(new URLSearchParams(location.search).get('store')||'spk').toLowerCase();
const C=CFG[STORE]||CFG.spk;
document.getElementById('ttl').textContent='📒 台帳（'+C.name+'）— 人間とシステムの共有記録';
function _sbToken(){try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf('sb-')===0&&k.indexOf('auth-token')>=0){let v=null;try{v=JSON.parse(localStorage.getItem(k));}catch(e){continue;}const t=(v&&v.access_token)||(v&&v.currentSession&&v.currentSession.access_token)||(v&&v.session&&v.session.access_token)||(Array.isArray(v)&&typeof v[0]==='string'?v[0]:null);if(t)return t;}}}catch(e){}return null;}
let onlyWarn=false;
async function rpc(fn,args){const tok=_sbToken();const H={apikey:C.anon,'Content-Type':'application/json'};if(tok)H.Authorization='Bearer '+tok;const r=await fetch(C.sb+'/rest/v1/rpc/'+fn,{method:'POST',headers:H,body:JSON.stringify(args||{})});if(!r.ok)throw new Error(fn+' '+r.status);return r.json();}
function whoClass(w){w=(w||'').toLowerCase();if(w.indexOf('gatekeeper')>=0)return'gk';if(w==='customer'||w.indexOf('mypage')>=0)return'cust';if(w==='staff')return'staff';return'mach';}
function whoLabel(w){const c=whoClass(w);if(c==='gk')return'🛡️ 3号';if(c==='cust')return'👤 顧客';if(c==='staff')return'🧑‍🔧 スタッフ';return'⚙️ '+(w||'システム');}
function classify(r){const s=r.summary||'';if(r.op==='DELETE')return'warn';if(/→\s*$/.test((s||'').trim())||/→\s*\//.test(s))return'warn';if(/date|日付|start_date|end_date|lend_date|return_date/i.test(s)&&/→/.test(s))return'move';return'';}
function tfmt(t){const d=new Date(t);return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
async function load(){
 const feed=document.getElementById('feed');
 try{
  const q=document.getElementById('q').value.trim();
  let led,act;
  if(q){led=await rpc('gk_reservation',{p_resv:q});act=[];}
  else{[led,act]=await Promise.all([rpc('gk_ledger',{p_limit:200,p_store:C.store}),rpc('gk_activity',{p_limit:40})]);}
  let items=(led||[]).map(r=>({kind:'led',at:r.at,r}));
  (act||[]).forEach(a=>{if((a.fixed||0)+(a.reported||0)>0)items.push({kind:'act',at:a.at,a});});
  items.sort((x,y)=>new Date(y.at)-new Date(x.at));
  const nWarn=(led||[]).filter(r=>classify(r)==='warn').length;
  const nMove=(led||[]).filter(r=>classify(r)==='move').length;
  const nGk=(act||[]).reduce((s,a)=>s+(a.fixed||0),0);
  document.getElementById('stat').innerHTML='<span class="pill">📜 直近'+((led||[]).length)+'</span><span class="pill" style="color:#ff9a9a">⚠️ 足跡 '+nWarn+'</span><span class="pill" style="color:#e0a020">📅 移動 '+nMove+'</span><span class="pill" style="color:#4ade80">🛡️ 3号が戻した '+nGk+'</span>';
  let html='';
  items.forEach(it=>{
   if(it.kind==='act'){html+='<div class="row gk"><div class="t">'+tfmt(it.at)+'</div><div class="who gk">🛡️ 3号</div><div class="body">'+(it.a.fixed>0?'<span class="badge" style="background:#0e9f50;color:#fff">戻した '+it.a.fixed+'件</span> ':'')+(it.a.reported>0?'<span class="badge" style="background:#e0a020;color:#000">要確認 '+it.a.reported+'件</span>':'')+' 正常化を実行</div></div>';return;}
   const r=it.r;const c=classify(r);if(onlyWarn&&c==='')return;
   const cls=whoClass(r.who);
   html+='<div class="row '+c+'"><div class="t">'+tfmt(r.at)+'</div><div class="who '+cls+'">'+whoLabel(r.who)+'</div><div class="body">'+(c==='warn'?'<span class="badge" style="background:#e23b3b;color:#fff">足跡</span> ':'')+(c==='move'?'<span class="badge" style="background:#e0a020;color:#000">移動</span> ':'')+'<span class="tag">'+r.tbl+'</span>'+(r.resv?'<span class="resv">'+r.resv+'</span> ':'')+(r.summary||'')+'</div></div>';
  });
  feed.innerHTML=html||'<div class="empty">✅ 記録なし（この条件では動きなし）</div>';
 }catch(e){feed.innerHTML='<div class="empty">⚠️ 読めません（本体APPにログイン済みの端末で開いてください）<br>'+e.message+'</div>';}
}
document.getElementById('reload').onclick=load;
document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')load();});
document.getElementById('fWarn').onclick=function(){onlyWarn=!onlyWarn;this.classList.toggle('on',onlyWarn);load();};
load();setInterval(()=>{if(!document.getElementById('q').value)load();},30000);
</script></body></html>
