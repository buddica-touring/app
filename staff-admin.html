<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>バイトURL一覧 - BUDDICA TOURISM 高松空港店</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;background:#f1f5f9;color:#0f172a;font-size:14px;max-width:720px;margin:0 auto;padding-bottom:40px}
.bar{background:linear-gradient(135deg,#0f172a,#7c2d12);color:#fff;padding:14px 16px;font-weight:800;font-size:17px;position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px}
.bar a{margin-left:auto;color:#fff;background:rgba(255,255,255,.18);padding:6px 12px;border-radius:8px;text-decoration:none;font-size:12px}
.wrap{padding:12px}
.note{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12px;border-radius:10px;padding:9px 12px;margin-bottom:12px}
.card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.nm{font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
.tp{font-size:10px;font-weight:700;padding:1px 8px;border-radius:10px;background:#dbeafe;color:#1d4ed8}
.tp.pt{background:#fef3c7;color:#92400e}
.cnt{margin-left:auto;font-size:11px;color:#64748b;font-weight:700}
.urlrow{display:flex;gap:6px;margin-top:8px;align-items:center}
.urlrow input{flex:1;font-size:11px;padding:7px 9px;border:1px solid #cbd5e1;border-radius:8px;background:#f8fafc;color:#475569}
.btn{font-size:12px;font-weight:800;padding:7px 12px;border-radius:8px;border:none;cursor:pointer;white-space:nowrap}
.btn.cp{background:#7c2d12;color:#fff}.btn.op{background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}
.badge{font-size:10px;font-weight:800;border-radius:8px;padding:2px 7px}
.badge.t{background:#dbeafe;color:#1d4ed8}
.loading{text-align:center;padding:60px;color:#64748b}
.spin{width:32px;height:32px;border:4px solid #e2e8f0;border-top-color:#7c2d12;border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:12px;padding:20px;margin:16px;text-align:center}
</style></head>
<body>
<div class="bar">🔗 バイトURL一覧<a href="./">← APPに戻る</a></div>
<div id="app"><div class="loading"><div class="spin"></div>読み込み中…</div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB="https://ggqugvyskyiblxiycpci.supabase.co";
var ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdncXVndnlza3lpYmx4aXljcGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDc3NjksImV4cCI6MjA5MzY4Mzc2OX0.uNhWcBd_Dl5nzemZDQfJ8mQV6iY73MwystGGpTRPC18";
var app=document.getElementById("app");
function esc(s){return String(s==null?"":s).replace(/[&<>"]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
function appToken(){try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(/sb-.*-auth-token/.test(k)){var v=JSON.parse(localStorage.getItem(k));var t=(v&&(v.access_token||(v.currentSession&&v.currentSession.access_token)||(v.session&&v.session.access_token)))||(Array.isArray(v)&&v[0]);if(t)return t;}}}catch(e){}return null;}
var TK=appToken();
function urlOf(tok){return location.origin+location.pathname.replace(/[^/]*$/,"")+"staff.html?t="+tok;}
function copy(id){var el=document.getElementById(id);el.select();try{navigator.clipboard.writeText(el.value);}catch(e){document.execCommand("copy");}var b=document.getElementById(id+"b");if(b){var o=b.textContent;b.textContent="✓";setTimeout(function(){b.textContent=o;},1200);}}
window.copy=copy;

function render(staff,taskCounts){
  var h='<div class="wrap"><div class="note">各スタッフの個別URL（ログイン不要・自分の担当タスク＋対応履歴）。コピーして本人に配布してください。</div>';
  staff.forEach(function(s,i){
    var tok=s.share_token;var u=urlOf(tok);var id="u"+i;
    var c=taskCounts[s.name]||{t:0};
    var isPt=(s.type==="アルバイト");
    h+='<div class="card"><div class="nm">'+esc(String(s.name).replace(/\s*さん\s*$/,""))+' さん'
      +'<span class="tp'+(isPt?" pt":"")+'">'+esc(s.type||"")+'</span>'
      +'<span class="cnt">担当 <span class="badge t">'+c.t+'</span></span></div>'
      +'<div class="urlrow"><input id="'+id+'" readonly value="'+esc(u)+'">'
      +'<button class="btn cp" id="'+id+'b" onclick="copy(\''+id+'\')">📋コピー</button>'
      +'<a class="btn op" href="'+esc(u)+'" target="_blank">開く</a></div></div>';
  });
  if(!staff.length)h+='<div class="err">アクティブなスタッフがいません</div>';
  h+='</div>';app.innerHTML=h;
}
function showErr(m){app.innerHTML='<div class="err">⚠️ '+esc(m)+'<br><span style="font-size:12px;font-weight:400">APPにログインした状態で開いてください</span></div>';}

function hdr(tok){return {apikey:ANON,Authorization:"Bearer "+(tok||ANON)};}
async function fetchOk(path){
  var r=await fetch(SB+path,{headers:hdr(TK)});
  if(!r.ok && TK){ r=await fetch(SB+path,{headers:hdr(null)}); }
  return r;
}
async function load(){
  try{
    var r=await fetchOk("/rest/v1/bt_staff?select=name,type,share_token,active,sort_order&order=sort_order");
    if(!r.ok){showErr("スタッフ取得に失敗（HTTP "+r.status+"）");return;}
    var staff=(await r.json()).filter(function(s){return s.active!==false&&s.share_token;});
    var counts={};
    try{
      var today=new Date(Date.now()+9*3600*1000).toISOString().slice(0,10);
      var tr=await fetchOk("/rest/v1/bt_tasks?select="+encodeURIComponent("担当,date,deleted")+"&date=gte."+today);
      if(tr.ok){var ts=await tr.json();ts.forEach(function(t){if(t.deleted)return;
        var n=t["担当"];if(n){counts[n]=counts[n]||{t:0};counts[n].t++;}
      });}
    }catch(e){}
    render(staff,counts);
  }catch(e){showErr("通信エラー");}
}
load();
</script>
</body></html>
