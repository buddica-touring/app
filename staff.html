<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<title>スタッフ専用ページ - BUDDICA TOURISM 高松空港店</title>
<style>
:root{--blue:#2563eb;--red:#dc2626;--teal:#0d9488;--green:#059669;--amber:#d97706;--slate:#64748b}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;background:#f1f5f9;color:#0f172a;font-size:15px;max-width:560px;margin:0 auto;padding-bottom:40px}
.hero{background:linear-gradient(135deg,#0f172a,#7c2d12);color:#fff;padding:16px 16px 14px;position:sticky;top:0;z-index:5;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.hero .brand{font-size:12px;opacity:.8;letter-spacing:1px}
.hero .name{font-size:22px;font-weight:800;margin-top:2px}
.hero .sub{font-size:12px;opacity:.85;margin-top:3px}
.wrap{padding:12px}
.parkbtn{display:block;width:100%;text-align:center;background:#fff;border:2px solid var(--slate);color:#475569;font-weight:800;font-size:15px;padding:12px;border-radius:12px;margin:4px 0 14px;text-decoration:none;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer}
.sechd{display:flex;align-items:center;gap:8px;margin:14px 2px 8px;font-weight:800;font-size:15px}
.sechd .cnt{margin-left:auto;font-size:12px;color:var(--slate);font-weight:700}
.card{background:#fff;border-radius:12px;padding:11px 12px;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.07);border-left:5px solid var(--slate)}
.card.DEL,.card.PU,.card.PUB,.card.来店{border-left-color:var(--blue)}
.card.COL,.card.BD,.card.BDB,.card.返却{border-left-color:var(--red)}
.card.洗車{border-left-color:var(--teal)}
.card.done{opacity:.5}
.r1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-weight:800;color:#fff;border-radius:6px;padding:3px 9px;font-size:14px;background:var(--slate)}
.badge.DEL,.badge.PU,.badge.PUB,.badge.来店{background:var(--blue)}
.badge.COL,.badge.BD,.badge.BDB,.badge.返却{background:var(--red)}
.badge.洗車{background:var(--teal)}
.tm{font-size:19px;font-weight:800}
.cust{font-size:15px;font-weight:700}
.r2{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-top:6px}
.veh{background:#ecfdf5;border:1px solid #a7f3d0;color:#065f46;font-weight:800;border-radius:7px;padding:3px 9px;font-size:14px}
.veh.nov{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.place{color:#334155;font-size:13px}
.r3{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px}
.abtn{font-size:13px;font-weight:800;padding:8px 12px;border-radius:8px;border:none;cursor:pointer;color:#fff}
.abtn.done{background:#0f172a;color:#fff;margin-left:auto}
a.place{color:#1d4ed8;text-decoration:underline;font-size:13px}
a.myp{background:#7c2d12;color:#fff;font-size:11px;font-weight:800;border-radius:6px;padding:3px 8px;text-decoration:none;white-space:nowrap;margin-left:auto}
.tabs{display:flex;gap:4px;padding:8px 8px 0;background:#0f172a;position:sticky;top:0;z-index:6;overflow-x:auto}
.tab{flex:0 0 auto;background:none;border:none;color:#94a3b8;font-weight:700;font-size:12px;padding:9px 10px;border-radius:8px 8px 0 0;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:4px}
.tab.on{background:#f1f5f9;color:#0f172a}
.tab .tb{font-size:10px;font-weight:800;background:#475569;color:#fff;border-radius:8px;padding:1px 6px}
.tab.on .tb{background:#cbd5e1;color:#0f172a}
.dayhd{position:sticky;top:0;z-index:2;display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;color:#1e293b;background:#e2e8f0;border-radius:8px;padding:7px 11px;margin:14px 0 8px}
.dayhd .ttag{font-size:10px;font-weight:800;color:#fff;background:#059669;border-radius:6px;padding:2px 8px}
.empty{text-align:center;color:var(--slate);padding:20px;font-size:14px}
.loading{text-align:center;padding:50px 20px;color:var(--slate)}
.spin{width:34px;height:34px;border:4px solid #e2e8f0;border-top-color:var(--amber);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.err{background:#fef2f2;border:1px solid #fecaca;color:#991b1b;border-radius:12px;padding:16px;margin:16px;text-align:center}
.err button{margin-top:10px;background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-weight:700;font-size:14px}
.ver{text-align:center;color:#94a3b8;font-size:10px;margin-top:16px}
.note{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-size:12px;border-radius:10px;padding:9px 11px;margin-bottom:12px}
</style></head>
<body>
<div id="app"><div class="loading"><div class="spin"></div>読み込み中…</div></div>
<script>
var SB="https://ggqugvyskyiblxiycpci.supabase.co";
var ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdncXVndnlza3lpYmx4aXljcGNpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgxMDc3NjksImV4cCI6MjA5MzY4Mzc2OX0.uNhWcBd_Dl5nzemZDQfJ8mQV6iY73MwystGGpTRPC18";
var STORE="bt";
var VER="staff-v1.0-bt";
var TOKEN=new URLSearchParams(location.search).get("t")||"";
var app=document.getElementById("app");

function esc(s){return String(s==null?"":s).replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
function shortDate(d){var p=(d||"").split("-");return p.length===3?(+p[1])+"/"+(+p[2]):d;}
function jstToday(){var n=new Date(Date.now()+9*3600*1000);return n.toISOString().slice(0,10);}
function jpWd(d){var p=(d||"").split("-");if(p.length!==3)return"";return "日月火水木金土"[new Date(+p[0],+p[1]-1,+p[2]).getDay()];}
function addDays(d,n){var p=(d||"").split("-");if(p.length!==3)return d;var dt=new Date(+p[0],+p[1]-1,+p[2]+n);return dt.getFullYear()+"-"+("0"+(dt.getMonth()+1)).slice(-2)+"-"+("0"+dt.getDate()).slice(-2);}
function dayHead(d,today){var tag=(d===today)?'<span class="ttag">本日</span>':(d===addDays(today,1))?'<span class="ttag" style="background:#0284c7">明日</span>':'';return '<div class="dayhd">📅 '+shortDate(d)+'（'+jpWd(d)+'）'+tag+'</div>';}
function groupByDate(list,cardFn,today){var by={},order=[];list.forEach(function(x){var d=x.date||"";if(!by[d]){by[d]=[];order.push(d);}by[d].push(x);});order.sort();return order.map(function(d){return dayHead(d,today)+by[d].map(cardFn).join("");}).join("");}

function typeLabel(t){var m={DEL:"お届け",PU:"送迎お迎え",PUB:"バスお迎え",COL:"回収",BD:"お見送り",BDB:"バスお見送り","返却":"返却","洗車":"洗車","来店":"来店"};return m[t]||t;}
function mypLink(x){return x.mypage?('<a class="myp" href="guide/?t='+encodeURIComponent(x.mypage)+'&ro=1" target="_blank" rel="noopener">📄 ご利用ガイド</a>'):'';}

function taskCard(x){
  var t=x.type||"";
  var plate=x.plate?(" "+x.plate):"";
  var veh=x.vehicle?('<span class="veh">🚗 '+esc(x.vehicle)+esc(plate)+'</span>'):'<span class="veh nov">未配車</span>';
  var tm=x.time||"";
  var pl=x.place?('<a class="place" href="https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(x.place)+'" target="_blank" rel="noopener">📍 '+esc(x.place)+'</a>'):'';
  var cust=x.customer?('<span class="cust">'+esc(x.customer)+'</span>'):'';
  var tid=esc(x._id||"");
  var btns='<div class="r3">';
  if(tid&&!x.done){ btns+='<button class="abtn done" onclick="saDone(\''+tid+'\')">✅完了</button>'; }
  btns+='</div>';
  return '<div class="card '+esc(t)+(x.done?' done':'')+'">'
    +'<div class="r1"><span class="badge '+esc(t)+'">'+esc(typeLabel(t))+'</span>'
    +(tm?'<span class="tm">'+esc(tm)+'</span>':'')+cust+(x.done?' <span style="color:#059669;font-weight:800;font-size:13px">✓済</span>':'')+mypLink(x)+'</div>'
    +'<div class="r2">'+veh+pl+'</div>'+btns+'</div>';
}
function ymShift(ym,delta){var p=(ym||jstToday().slice(0,7)).split("-");var y=+p[0],m=+p[1]-1+delta;var d=new Date(Date.UTC(y,m,1));return d.getUTCFullYear()+"-"+String(d.getUTCMonth()+1).padStart(2,"0");}
window.openHistory=function(ym){
  ym=ym||jstToday().slice(0,7);
  app.innerHTML='<div class="loading"><div class="spin"></div>対応履歴を読み込み中…</div>';
  fetch(SB+"/rest/v1/rpc/bt_staff_history",{method:"POST",headers:{"apikey":ANON,"Authorization":"Bearer "+ANON,"Content-Type":"application/json"},body:JSON.stringify({p_token:TOKEN,p_ym:ym})})
    .then(function(r){return r.json();})
    .then(function(d){ if(!d||d.ok===false){showErr("履歴の読み込みに失敗しました");return;} renderHistory(d); })
    .catch(function(){showErr("通信エラー");});
};
function renderHistory(d){
  var ym=d.ym||jstToday().slice(0,7);var tk=(d.tasks||[]);
  var name=String(d.staff||"").replace(/\s*さん\s*$/,"");
  var h='<div class="hero" style="background:linear-gradient(135deg,#7c2d12,#b45309)"><div class="brand">対応履歴（給与の基礎）</div>'
    +'<div class="name">'+esc(name)+' さん</div></div>';
  h+='<div class="wrap">';
  h+='<button class="parkbtn" onclick="load()">← タスクに戻る</button>';
  h+='<div style="display:flex;align-items:center;gap:8px;margin:10px 0">'
    +'<button class="abtn" style="background:#e2e8f0;color:#334155" onclick="openHistory(\''+ymShift(ym,-1)+'\')">‹ 前月</button>'
    +'<div style="flex:1;text-align:center;font-weight:800;font-size:16px">'+ym.replace("-","年")+'月</div>'
    +'<button class="abtn" style="background:#e2e8f0;color:#334155" onclick="openHistory(\''+ymShift(ym,1)+'\')">翌月 ›</button></div>';
  h+='<div style="background:linear-gradient(135deg,#fffbeb,#fef3c7);border:1px solid #fcd34d;border-radius:12px;padding:16px;text-align:center;margin-bottom:12px">'
    +'<div style="font-size:12px;color:#92400e;font-weight:700">今月の対応（完了）件数</div>'
    +'<div style="font-size:36px;font-weight:900;color:#b45309;line-height:1.1">'+(d.count||0)+'<span style="font-size:16px"> 件</span></div>'
    +'<div style="font-size:11px;color:#a16207;margin-top:4px">※この件数が給与明細の基礎になります</div></div>';
  h+='<div class="sechd">✅ 完了したタスク<span class="cnt">'+tk.length+'件</span></div>';
  if(!tk.length){h+='<div class="empty">この月の完了タスクはありません</div>';}
  else{h+=tk.map(function(x){
    return '<div class="card '+esc(x.type)+'"><div class="r1"><span class="badge '+esc(x.type)+'">'+esc(typeLabel(x.type))+'</span>'
      +'<span style="font-size:12px;color:#64748b;font-weight:700">'+shortDate(x.date)+(x.time?" "+esc(x.time):"")+'</span>'
      +(x.customer?'<span class="cust">'+esc(x.customer)+'</span>':'')+'</div>'
      +(x.vehicle?'<div class="r2"><span class="veh">🚗 '+esc(x.vehicle)+(x.plate?" "+esc(x.plate):"")+'</span></div>':'')+'</div>';
  }).join("");}
  h+='<div class="ver">'+VER+'</div></div>';
  app.innerHTML=h;
}
window.saDone=function(tid){
  if(!confirm("このタスクを完了にしますか？"))return;
  fetch(SB+"/rest/v1/rpc/bt_staff_done",{method:"POST",headers:{"apikey":ANON,"Authorization":"Bearer "+ANON,"Content-Type":"application/json"},body:JSON.stringify({p_token:TOKEN,p_task_id:tid})})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d||d.ok===false){alert("⚠️ 完了にできませんでした（"+((d&&d.error)||"エラー")+"）");return;}
      alert("✅ 完了しました");
      load();
    })
    .catch(function(){alert("⚠️ 通信エラー。電波を確認してください");});
};

var STAB="today";var LASTD=null;
window.setTab=function(tab){
  if(tab==="history"){ openHistory(""); return; }
  STAB=tab;if(LASTD)render(LASTD);
};
function render(d){
  LASTD=d;
  var today=jstToday();
  var tk=(d.tasks||[]);
  var tdy=tk.filter(function(x){return x.date===today;});
  var fut=tk.filter(function(x){return x.date>today;});
  var name=esc(String(d.staff||"").replace(/\s*さん\s*$/,""));
  var h='<div class="hero"><div class="brand">BUDDICA TOURISM 高松空港店</div>'
    +'<div class="name">'+name+' さん</div>'
    +'<div class="sub">本日 '+tdy.length+'件 ／ 未来 '+fut.length+'件</div></div>';
  function tab(id,label,cnt){return '<button class="tab'+(STAB===id?" on":"")+'" onclick="setTab(\''+id+'\')">'+label+(cnt!=null?'<span class="tb">'+cnt+'</span>':'')+'</button>';}
  h+='<div class="tabs">'
    +tab("today","📋本日",tdy.length)
    +tab("future","🗓未来",fut.length)
    +tab("history","📋履歴")
    +'</div>';
  h+='<div class="wrap">';
  if(STAB==="future"){
    h+='<div class="sechd">🗓 未来の担当タスク（本日以外）<span class="cnt">'+fut.length+'件</span></div>';
    h+= fut.length?groupByDate(fut,taskCard,today):'<div class="empty">本日以外の担当タスクはありません</div>';
  }else{
    h+='<div class="note">OPシートで担当・時間が変わると、この画面も自動で最新になります（30秒ごと）。</div>';
    h+='<div class="sechd">📋 本日 <span style="color:#94a3b8;font-weight:600;font-size:12px">'+shortDate(today)+'</span><span class="cnt">'+tdy.length+'件</span></div>';
    h+= tdy.length?tdy.map(taskCard).join(""):'<div class="empty">本日の担当タスクはありません</div>';
  }
  h+='<div class="ver">'+VER+'</div></div>';
  app.innerHTML=h;
}

function showErr(msg){
  app.innerHTML='<div class="err">⚠️ '+esc(msg)+'<br><button onclick="load()">再読み込み</button></div>';
}

function load(){
  if(!TOKEN){showErr("URLが正しくありません（token無し）");return;}
  var ctrl=new AbortController();var to=setTimeout(function(){ctrl.abort();},15000);
  fetch(SB+"/rest/v1/rpc/bt_staff_view",{method:"POST",signal:ctrl.signal,
    headers:{"apikey":ANON,"Authorization":"Bearer "+ANON,"Content-Type":"application/json"},
    body:JSON.stringify({p_token:TOKEN})})
  .then(function(r){return r.json();})
  .then(function(d){clearTimeout(to);
    if(!d||d.ok===false){showErr(d&&d.error==="invalid_token"?"このURLは無効です（担当者へ連絡してください）":"読み込みに失敗しました");return;}
    render(d);})
  .catch(function(e){clearTimeout(to);showErr("通信エラー。電波を確認して再読み込みしてください");});
}
load();
setInterval(function(){if(!document.hidden&&TOKEN)load();},30000);
document.addEventListener("visibilitychange",function(){if(!document.hidden)load();});
</script>
</body></html>
